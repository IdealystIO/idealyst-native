[package]
name = "aas-shell-native"
version.workspace = true
edition.workspace = true
license.workspace = true

# Native-target transport + discovery + worker shell for the AAS
# dev-client. Pulls `tungstenite` (sync blocking WebSocket) and
# `mdns-sd` (multicast DNS-SD discovery). These crates compile on
# every non-wasm target — iOS, Android, desktop — so this crate
# is the shared native AAS-shell impl that backends pick up via
# their `aas-shell` feature.
#
# Web targets have their own AAS-shell implementation living in
# `backend-web` (it uses `web_sys::WebSocket` and reads the page's
# origin for discovery).

[lib]
path = "src/lib.rs"

[features]
default = []
# Opt-in compile of the shell. Without this feature the crate is a
# pure metadata declaration — the platform deps are gated behind
# `dep:` activations in the feature list. Backends activate it via
# their own `aas-shell` feature.
aas-shell = ["dep:tungstenite", "dep:mdns-sd", "dev-client/dev-hot-reload"]

[dependencies]
framework-core = { workspace = true }
dev-client = { workspace = true }
wire = { workspace = true }
serde_json = "1"

# Sync blocking transport. Acceptable on native because each
# backend dedicates a worker thread to the dev-client read loop.
tungstenite = { version = "0.24", default-features = false, features = ["handshake"], optional = true }

# Pure-Rust mDNS / DNS-SD ("Bonjour") for locating the dev-server
# on the LAN. Cross-platform across native targets; iOS still needs
# `NSBonjourServices` in Info.plist to permit multicast.
mdns-sd = { version = "0.10", default-features = false, optional = true }
