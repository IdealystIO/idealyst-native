[package]
name = "backend-web"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Forwards to framework-core's `debug-stats`. When on, the web
# backend reports per-phase timings (`set_attribute`, `insert_rule`,
# etc.) into the framework's phase-counter aggregator so apply-style
# hot paths can be profiled from JS via `dump_debug_events`.
debug-stats = ["framework-core/debug-stats"]
# Compile in this backend's `requestAnimationFrame`-based
# `RenderLoopDriver` and `wasm_bindgen_futures`-based `AsyncExecutor`.
# Forwards to `framework-core/async-driver` so `render_loop` /
# `spawn_async` resolve. Host calls `install_render_loop()` and
# `install_async_executor()` once at init.
async-driver = ["framework-core/async-driver", "dep:wasm-bindgen-futures"]
# Compile in the AAS-client browser transport (`connect_web` +
# `WebClientHandle`). Forwards to `dev-client/dev-hot-reload` so the
# `WireBackend` replay engine is available. Off by default — the
# native-rendering build path pays no cost.
aas-shell = ["dep:dev-client", "dep:wire", "dev-client/dev-hot-reload"]

[dependencies]
framework-core = { workspace = true }
wasm-bindgen = "0.2"
js-sys = "0.3"
serde_json = "1"
# Drives `framework_core::driver::spawn_async` on web. Only required
# when this backend's `async-driver` feature is on (the host opts in).
wasm-bindgen-futures = { version = "0.4", optional = true }
# AAS dev-client replay engine + wire protocol. Only pulled in when
# the `aas-shell` feature is on; the WebSocket transport itself
# lives in this crate's `dev_transport` module.
dev-client = { workspace = true, optional = true }
wire = { workspace = true, optional = true }
# Used by the Graphics primitive to expose the `<canvas>` as a
# standard `WebCanvasWindowHandle` + `WebDisplayHandle` for any GPU
# library the author chooses (wgpu, glow, vello, ...). Tiny dep
# (a handful of enums + traits, no platform code).
raw-window-handle = "0.6"

[dependencies.web-sys]
version = "0.3"
features = [
    "BinaryType",
    "CloseEvent",
    "console",
    "CssRule",
    "CssRuleList",
    "CssStyleDeclaration",
    "CssStyleRule",
    "CssStyleSheet",
    "Document",
    "DocumentFragment",
    "DomRect",
    "Element",
    "ErrorEvent",
    "Event",
    "History",
    "HtmlAnchorElement",
    "HtmlElement",
    "HtmlHeadElement",
    "HtmlCanvasElement",
    "HtmlInputElement",
    "HtmlMediaElement",
    "HtmlStyleElement",
    "KeyboardEvent",
    "Location",
    "MediaQueryList",
    "MessageEvent",
    "MouseEvent",
    "Node",
    "PopStateEvent",
    "ResizeObserver",
    "WebSocket",
    "Window",
]
