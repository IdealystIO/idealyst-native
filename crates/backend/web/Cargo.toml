[package]
name = "backend-web"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Compile in the in-place hydration machinery: cursor + remount
# bookkeeping in `WebBackend::hydrate`, the `hydrate_next` /
# `hydrate_note_fresh` cursor-aware paths in every primitive, the
# adopt/suspend helpers SDK navigators use, and the diagnostic
# `console.warn` divergence reporter. Adds a few KB of wasm — worth it
# when serving SSG/SSR HTML so the bundle adopts the server's DOM
# instead of clearing + rebuilding. SPA-only apps that don't ship
# pre-rendered HTML leave it off — the stubs in this crate make
# `WebBackend::hydrate(...)` fall back to the clear-and-rebuild path
# (same flicker as a fresh boot, but smaller bundle).
#
# OFF by default so an SDK crate's `backend-web = { workspace = true }`
# (which carries no explicit feature opt-ins) doesn't drag the
# machinery into every consumer. The CLI's `build_web` enables it
# explicitly on the generated wrapper when SSG/SSR is being built
# alongside; SPA-only wrappers leave it off and DCE removes the
# cursor + diagnostic + remount code from the wasm.
hydrate = []
# Forwards to runtime-core's `debug-stats`. When on, the web
# backend reports per-phase timings (`set_attribute`, `insert_rule`,
# etc.) into the framework's phase-counter aggregator so apply-style
# hot paths can be profiled from JS via `dump_debug_events`.
debug-stats = ["runtime-core/debug-stats"]
# Compile in this backend's `requestAnimationFrame`-based
# `RenderLoopDriver` and `wasm_bindgen_futures`-based `AsyncExecutor`.
# Forwards to `runtime-core/async-driver` so `render_loop` /
# `spawn_async` resolve. Host calls `install_render_loop()` and
# `install_async_executor()` once at init.
async-driver = ["runtime-core/async-driver", "dep:wasm-bindgen-futures"]
# Compile in the runtime-server-client browser transport (`connect_web` +
# `WebClientHandle`). Forwards to `dev-client/dev-hot-reload` so the
# `WireBackend` replay engine is available. Off by default — the
# native-rendering build path pays no cost.
runtime-server = ["dep:dev-client", "dep:wire", "dev-client/dev-hot-reload"]
# Stamp a `data-idealyst-id="N"` attribute on every Element the
# framework has minted a node id for. Pure developer ergonomic —
# makes the per-node id visible in browser devtools and e2e
# selectors. Off by default so production builds don't pollute the
# DOM. Identity itself doesn't depend on this attribute (a JS-side
# `WeakMap` is the source of truth either way); this just mirrors
# the id outwards for inspection.
debug-node-ids = []
# Compile in the web Robot transport (`install_robot_relay_client`): a
# WebSocket dial-out to a `robot-relay` so a browser app exposes the Robot
# bridge it can't host itself. Forwards to `runtime-core/robot` for the
# dispatch core. Off by default; `idealyst dev --web` enables it.
robot = ["runtime-core/robot"]

[dependencies]
runtime-core = { workspace = true }
css = { workspace = true }
inventory = "0.3"
wasm-bindgen = "0.2"
js-sys = "0.3"
serde_json = "1"
# Drives `runtime_core::driver::spawn_async` on web. Only required
# when this backend's `async-driver` feature is on (the host opts in).
wasm-bindgen-futures = { version = "0.4", optional = true }
# runtime-server dev-client replay engine + wire protocol. Only pulled in when
# the `runtime-server` feature is on; the WebSocket transport itself
# lives in this crate's `dev_transport` module.
dev-client = { workspace = true, optional = true }
wire = { workspace = true, optional = true }
# Used by the Graphics primitive to expose the `<canvas>` as a
# standard `WebCanvasWindowHandle` + `WebDisplayHandle` for any GPU
# library the author chooses (wgpu, glow, vello, ...). Tiny dep
# (a handful of enums + traits, no platform code).
raw-window-handle = "0.6"

[dev-dependencies]
# Browser-side test harness for `WebBackend` unit tests. Runs via
# `wasm-pack test --headless --chrome --package backend-web`. Required
# for tests that need real DOM (the `node_id` identity invariant
# can't be verified without it).
wasm-bindgen-test = "0.3"
# Await a `requestAnimationFrame` in async browser tests (the textarea
# autosize regression needs to observe the deferred post-attach measure).
wasm-bindgen-futures = "0.4"

[dependencies.web-sys]
version = "0.3"
features = [
    "BinaryType",
    "Blob",
    "BlobPropertyBag",
    "CloseEvent",
    "console",
    "CssRule",
    "CssRuleList",
    "CssStyleDeclaration",
    "CssStyleRule",
    "CssStyleSheet",
    "Document",
    "DocumentFragment",
    "DomRect",
    "Element",
    "ErrorEvent",
    "Event",
    "History",
    "HtmlAnchorElement",
    "HtmlElement",
    "HtmlHeadElement",
    "HtmlCanvasElement",
    # Robot DOM screenshot: serialize #app → SVG <foreignObject> → <img> →
    # <canvas> 2d → PNG. `CanvasRenderingContext2d` draws the snapshot image,
    # `HtmlImageElement` loads the SVG, `XmlSerializer` serializes the subtree,
    # `StyleSheet`/`CssStyleSheet` read the class rules to embed inline.
    "CanvasRenderingContext2d",
    "HtmlImageElement",
    "XmlSerializer",
    "StyleSheet",
    # Fetch + inline @font-face fonts as data URLs (a foreignObject SVG renders
    # in an isolated context without the page's loaded web fonts → falls back to
    # a default). Synchronous XHR keeps this inside the non-async capture path.
    "XmlHttpRequest",
    "HtmlIFrameElement",
    "HtmlInputElement",
    "HtmlStyleElement",
    "HtmlTextAreaElement",
    "KeyboardEvent",
    "Location",
    "MediaQueryList",
    "MessageEvent",
    "MouseEvent",
    "Node",
    # `NodeList` + `Node::child_nodes` resolve the reference node for
    # `insert_at` (keyed `Each` reconciliation splicing).
    "NodeList",
    "Performance",
    "PointerEvent",
    "PointerEventInit",
    "WheelEvent",
    "Text",
    "PopStateEvent",
    "Url",
    "ResizeObserver",
    "ResizeObserverEntry",
    "DomRectReadOnly",
    # `Response` powers the `Primitive::Lazy` web loader's
    # `chunk_manifest.json` fetch.
    "Response",
    "WebSocket",
    "Window",
    # `Navigator` powers `browser_device_label()`'s `userAgent` read;
    # `EventTarget` is what the runtime-server resize listener attaches to
    # (Window implements EventTarget).
    "Navigator",
    "EventTarget",
]
