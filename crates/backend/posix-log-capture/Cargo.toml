[package]
name = "posix-log-capture"
version.workspace = true
edition.workspace = true
license.workspace = true

# POSIX implementation of `runtime_core::robot::logs::LogCapture`.
# Splices stdout/stderr through pipes via `libc::dup`/`pipe`/`dup2`,
# reads each line on a worker thread, pushes it into the framework's
# robot log buffer, and mirrors bytes back to the original fd so the
# Xcode console / adb logcat / terminal still shows them.
#
# Sits under `crates/backend/` rather than `crates/framework/`
# because raw POSIX FD manipulation is a platform implementation
# choice; the framework declares the `LogCapture` trait and this
# crate implements it for every unix-derived target (iOS, Android,
# macOS, Linux).

[lib]
path = "src/lib.rs"

[features]
default = []
# Opt-in compile of the impl. Forwards to `runtime-core/robot` so
# the `LogCapture` trait + `install_log_capture` registry resolve.
# Backends activate this via their own `robot` feature, or hosts
# pull it in directly.
log-capture = ["dep:libc", "runtime-core/robot"]

[dependencies]
runtime-core = { workspace = true }

# Optional: only pulled in when this crate's `log-capture` feature
# is on, AND only used on unix targets. Non-unix builds get a no-op
# stub install that compiles without `libc`.
libc = { version = "0.2", optional = true }
