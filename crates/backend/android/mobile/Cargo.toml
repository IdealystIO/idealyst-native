[package]
name = "backend-android-mobile"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# Preserve the historical lib filename (`libbackend_android.so`) so
# the Gradle/JNI `System.loadLibrary("backend_android")` call keeps
# resolving without edits, even though the cargo package was renamed
# `backend-android` -> `backend-android-mobile`.
name = "backend_android"
crate-type = ["cdylib", "rlib"]

[features]
# Optional AAS-client glue. When enabled, this crate pulls in
# `dev-client` (native transport) and exposes Rust-level
# `aas::{attach, drain, detach}` helpers the consuming staticlib
# crate wires into JNI exports. Without this feature the crate is a
# plain native backend (zero extra binary cost).
aas-shell = ["dep:aas-shell-native", "aas-shell-native/aas-shell"]
# Compile in this backend's render-thread `RenderLoopDriver`. The
# driver itself lives in `backend-android-core` (shared with TV);
# this feature just turns it on and forwards
# `framework-core/async-driver` so `render_loop` / `spawn_async`
# resolve. Host calls `install_render_loop()` once at init.
async-driver = ["framework-core/async-driver", "backend-android-core/async-driver"]

[dependencies]
framework-core = { workspace = true }
# Shared Android helpers (JNI utilities + render loop driver). Same
# crate is consumed by `backend-android-tv`.
backend-android-core = { workspace = true }
# Used by the Graphics primitive to expose the SurfaceView's
# `Surface` as a standard raw-window-handle so any GPU library
# (wgpu, etc.) can plug in. Tiny dep; trait + enum definitions only.
raw-window-handle = "0.6"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
log = "0.4"
android_logger = "0.13"
# `ndk-sys` exposes `ANativeWindow_fromSurface` etc., which we need
# to convert the Java-side `android.view.Surface` into the native
# window pointer wgpu expects in `AndroidNdkWindowHandle`.
ndk-sys = "0.6"
# AAS-client wire transport + worker thread. Pulled in only when
# the `aas-shell` feature is on. The shared crate carries
# tungstenite + mdns-sd + the AasShell worker for every native
# target.
aas-shell-native = { workspace = true, optional = true }
