[package]
name = "backend-android-mobile"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# Preserve the historical lib filename (`libbackend_android.so`) so
# the Gradle/JNI `System.loadLibrary("backend_android")` call keeps
# resolving without edits, even though the cargo package was renamed
# `backend-android` -> `backend-android-mobile`.
name = "backend_android"
crate-type = ["cdylib", "rlib"]

[features]
# Optional runtime-server-client glue. When enabled, this crate pulls in
# `runtime-server-shell-native` (native transport) and exposes
# `runtime_server::{attach_with_url, drain, detach}` helpers the
# consuming staticlib crate wires into JNI exports. Without this
# feature the crate is a plain native backend (zero extra binary cost).
runtime-server = ["dep:runtime-server-shell-native", "runtime-server-shell-native/runtime-server"]
# Compile in this backend's render-thread `RenderLoopDriver`. The
# driver itself lives in `backend-android-core` (shared with TV);
# this feature just turns it on and forwards
# `runtime-core/async-driver` so `render_loop` / `spawn_async`
# resolve. Host calls `install_render_loop()` once at init.
async-driver = ["runtime-core/async-driver", "backend-android-core/async-driver"]
# Per-phase timing counters drained + logged after every layout pass.
# `phase_timer::PhaseTimer::start("name")` becomes a real RAII guard
# (now_micros snapshot + record_apply_phase on drop) when this
# feature is on, and a zero-sized stub the optimizer strips when off.
# The variant crate enables this through its OWN `debug-stats` feature
# forwarding here — see CLAUDE.md for the variant-vs-dep gotcha.
debug-stats = ["runtime-core/debug-stats"]

[dependencies]
# `embed-font-bytes`: Android loads fonts by writing the raw bytes to
# the cache dir and calling `Typeface.createFromFile`, so it needs the
# bytes embedded. See `runtime_core::assets`.
runtime-core = { workspace = true, features = ["embed-font-bytes"] }
# Shared Android helpers (JNI utilities + render loop driver). Same
# crate is consumed by `backend-android-tv`.
backend-android-core = { workspace = true }
# Taffy wrapper used to compute every node's `(x, y, w, h)` frame
# from CSS-style style rules (flex direction + gap + position absolute
# + insets + percent dimensions). The iOS backend uses the same
# crate; Android applies the computed frames via per-child
# `FrameLayout.LayoutParams` margins.
runtime-layout = { workspace = true }
# Used by the Graphics primitive to expose the SurfaceView's
# `Surface` as a standard raw-window-handle so any GPU library
# (wgpu, etc.) can plug in. Tiny dep; trait + enum definitions only.
raw-window-handle = "0.6"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
log = "0.4"
android_logger = "0.13"
# `ndk-sys` exposes `ANativeWindow_fromSurface` etc., which we need
# to convert the Java-side `android.view.Surface` into the native
# window pointer wgpu expects in `AndroidNdkWindowHandle`.
ndk-sys = "0.6"
# runtime-server-client wire transport + worker thread. Pulled in only when
# the `runtime-server` feature is on. The shared crate carries
# tungstenite + the RuntimeServerShell worker for every native target.
runtime-server-shell-native = { workspace = true, optional = true }
