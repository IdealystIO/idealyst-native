[package]
name = "backend-android-core"
version.workspace = true
edition.workspace = true
license.workspace = true

# Shared Android substrate (phone/tablet + TV). Holds the JNI
# plumbing, view-tree bookkeeping, rendering, and base Android SDK
# helpers that both `backend-android-mobile` and
# `backend-android-tv` (Leanback / D-pad focus) depend on.
# Currently a skeleton.

[lib]
crate-type = ["rlib"]

[features]
# Compile in the render-thread `RenderLoopDriver`. Forwards to
# `runtime-core/async-driver` so `runtime_core::driver::*` is
# in scope. The leaf crates' `async-driver` feature turns this on.
async-driver = ["runtime-core/async-driver"]

[dependencies]
runtime-core = { workspace = true }
raw-window-handle = "0.6"

[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
log = "0.4"
android_logger = "0.13"
ndk-sys = "0.6"
