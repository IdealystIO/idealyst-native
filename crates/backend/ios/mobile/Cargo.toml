[package]
name = "backend-ios-mobile"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# Preserve the historical lib filename (`libbackend_ios.a`) so the
# Xcode project's link step keeps working without edits, even though
# the cargo package was renamed `backend-ios` -> `backend-ios-mobile`.
name = "backend_ios"
crate-type = ["staticlib", "rlib"]

[features]
debug-stats = ["framework-core/debug-stats"]
# Optional: compile in the AAS-client entry point + main-thread
# scheduler so the iOS app can run as a thin client of an AAS
# dev-server (instead of mounting the user's tree locally). When
# off, the crate is a pure native backend with no transport code.
# When on, it pulls `dev-client` and exposes `ios_main` + supporting
# C-ABI entry points the Swift host uses.
aas-shell = ["dep:aas-shell-native", "aas-shell-native/aas-shell"]
# Compile in this backend's NSTimer-based `RenderLoopDriver`. The
# driver itself lives in `backend-ios-core` (shared with TV); this
# feature just turns it on and forwards `framework-core/async-driver`
# so `render_loop` / `spawn_async` resolve. Host calls
# `install_render_loop()` once at init.
async-driver = ["framework-core/async-driver", "backend-ios-core/async-driver"]

[dependencies]
framework-core = { workspace = true }
framework-theme = { workspace = true }
native-layout = { workspace = true }
# Shared iOS/tvOS helpers (style + render loop driver). Same crate
# is consumed by `backend-ios-tv`.
backend-ios-core = { workspace = true }
# Only used when `aas-shell` is on. Pulls tungstenite + mdns-sd +
# the worker-thread `AasShell` from the shared native-shell crate
# (also consumed by Android, TV, desktop AAS hosts).
aas-shell-native = { workspace = true, optional = true }

[target.'cfg(target_os = "ios")'.dependencies]
block2 = "0.5"
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSArray",
    "NSEnumerator",
    "NSObject",
    "NSSet",
] }
objc2-ui-kit = { version = "0.2", features = [
    "UIResponder",
    "UIView",
    "UILabel",
    "UIButton",
    "UIControl",
    "UITextField",
    "UISwitch",
    "UISlider",
    "UIScrollView",
    "UIActivityIndicatorView",
    "UIStackView",
    "UIViewController",
    "UINavigationController",
    "UIColor",
    "UIGestureRecognizer",
    "UITapGestureRecognizer",
    "UITextInputTraits",
    "UITouch",
    "UIEvent",
] }
raw-window-handle = "0.6"
