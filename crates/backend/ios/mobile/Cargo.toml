[package]
name = "backend-ios-mobile"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# Preserve the historical lib filename (`libbackend_ios.a`) so the
# Xcode project's link step keeps working without edits, even though
# the cargo package was renamed `backend-ios` -> `backend-ios-mobile`.
name = "backend_ios"
crate-type = ["staticlib", "rlib"]

[features]
debug-stats = ["runtime-core/debug-stats"]
# Optional: compile in the runtime-server-client entry point + main-thread
# scheduler so the iOS app can run as a thin client of an runtime-server
# dev-server (instead of mounting the user's tree locally). When
# off, the crate is a pure native backend with no transport code.
# When on, it pulls `dev-client` and exposes `ios_main` + supporting
# C-ABI entry points the Swift host uses.
runtime-server = ["dep:runtime-server-shell-native", "runtime-server-shell-native/runtime-server"]
# Compile in this backend's NSTimer-based `RenderLoopDriver`. The
# driver itself lives in `backend-ios-core` (shared with TV); this
# feature just turns it on and forwards `runtime-core/async-driver`
# so `render_loop` / `spawn_async` resolve. Host calls
# `install_render_loop()` once at init.
async-driver = ["runtime-core/async-driver", "backend-ios-core/async-driver"]

[dependencies]
runtime-core = { workspace = true }
runtime-layout = { workspace = true }
# Cross-Apple substrate. Holds the shared SVG path parser used by
# both `imp/icon.rs` here and the macOS Icon impl in
# `backend-macos`. iOS/macOS render identical icons through this
# single parser.
backend-apple-core = { workspace = true }
# Shared iOS/tvOS helpers (style + render loop driver). Same crate
# is consumed by `backend-ios-tv`.
backend-ios-core = { workspace = true }
# Only used when `runtime-server` is on. Pulls tungstenite + the
# worker-thread `RuntimeServerShell` from the shared native-shell crate
# (also consumed by Android, TV, desktop runtime-server hosts).
runtime-server-shell-native = { workspace = true, optional = true }

[target.'cfg(target_os = "ios")'.dependencies]
block2 = "0.5"
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSArray",
    "NSEnumerator",
    "NSObject",
    "NSSet",
    # iOS 17+ `announce_for_accessibility` builds an
    # `NSMutableAttributedString` with the
    # `UIAccessibilitySpeechAttributeAnnouncementPriority` attribute
    # so VoiceOver honors Polite vs Assertive. The attribute setter is
    # `addAttribute:value:range:`, which pulls in `NSRange`. The
    # iOS-version gate uses `NSProcessInfo.isOperatingSystemAtLeastVersion:`.
    "NSAttributedString",
    "NSRange",
    "NSProcessInfo",
] }
objc2-ui-kit = { version = "0.2", features = [
    "UIResponder",
    "UIView",
    "UILabel",
    "UIButton",
    "UIControl",
    "UITextField",
    "UITextView",
    "UITextInput",
    "UISwitch",
    "UISlider",
    "UIScrollView",
    "UIActivityIndicatorView",
    "UIStackView",
    "UIViewController",
    "UINavigationController",
    "UIColor",
    "UIGestureRecognizer",
    "UITapGestureRecognizer",
    "UITextInputTraits",
    "UITouch",
    "UIEvent",
    # UICollectionView family — gates the constants + class bindings
    # the `Primitive::Virtualizer` impl pulls in via msg_send. We
    # bind the runtime via `objc2::class!(UICollectionView)`, but
    # the feature flags enable bitflags / type re-exports the
    # imp/virtualizer.rs module touches indirectly through
    # `UIViewAutoresizing`.
    "UICollectionView",
    "UICollectionViewFlowLayout",
    "UICollectionViewCell",
    "UICollectionViewLayout",
    # UIAccessibility wiring used by `imp/a11y.rs`. `UIAccessibility`
    # gates the `UIAccessibilityPostNotification` extern + the
    # `setIs/AccessibilityElement` / `setAccessibilityViewIsModal:` /
    # `setAccessibilityElementsHidden:` methods on UIView, while
    # `UIAccessibilityConstants` gates the
    # `UIAccessibilityAnnouncementNotification` notification ID
    # static + `UIAccessibilityTraits` constants.
    "UIAccessibility",
    "UIAccessibilityConstants",
] }
raw-window-handle = "0.6"
