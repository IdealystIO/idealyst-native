[package]
name = "backend-apple-core"
version.workspace = true
edition.workspace = true
license.workspace = true

# Cross-Apple substrate shared by the UIKit-flavored backends
# (`backend-ios-core` + `backend-ios-mobile` + `backend-ios-tv`) and
# the AppKit-flavored backend (`backend-macos`). Holds only the bits
# that don't depend on UIKit OR AppKit — CoreText font registration,
# Foundation/CoreGraphics color helpers, the NSTimer + main-queue
# scheduler, and the NSLog shim.
#
# Anything that touches `UIView` / `UIColor` / `UIFont` stays in
# `backend-ios-core`; anything touching `NSView` / `NSColor` /
# `NSFont` lives in `backend-macos`. This crate is the substrate.

[lib]
crate-type = ["rlib"]

[features]
default = []
# Forwards to `runtime-core/async-driver` so `runtime_core::driver::*` is in
# scope, enabling the cooperative main-thread `async_executor`. The leaf
# backends' own `async-driver` feature turns this on (ios-core → apple-core).
async-driver = ["runtime-core/async-driver"]

[dependencies]
# `embed-font-bytes`: CoreText registers fonts from their raw bytes
# (`CTFontManagerRegisterGraphicsFont`), so iOS/macOS builds need the
# bytes embedded. See `runtime_core::assets`.
runtime-core = { workspace = true, features = ["embed-font-bytes"] }

[target.'cfg(any(target_os = "ios", target_os = "tvos", target_os = "macos"))'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSObject",
    # `CGFloat` lives behind the `NSGeometry` feature gate; the color
    # parsing helper needs it to coerce sRGB floats into the platform's
    # native CGFloat (f32 on 32-bit, f64 on 64-bit).
    "NSGeometry",
] }
block2 = "0.5"
