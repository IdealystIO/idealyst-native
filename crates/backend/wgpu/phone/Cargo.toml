[package]
name = "backend-wgpu-phone"
version.workspace = true
edition.workspace = true
license.workspace = true

# Phone-sized preview variant. The window size + simulated
# platform are configured here; all rendering + event handling
# comes from `backend-wgpu-native` (winit shell) +
# `backend-wgpu-core` (platform-agnostic rendering).

[dependencies]
backend-wgpu-native = { workspace = true }
framework-core = { workspace = true }
