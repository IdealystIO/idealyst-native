[package]
name = "backend-wgpu-native"
version.workspace = true
edition.workspace = true
license.workspace = true

# winit-driven native shell for the wgpu preview backend.
#
# Translates `winit::event::WindowEvent` values into the
# normalized `PointerEvent` / `ScrollEvent` / `KeyEvent` types
# defined by `backend-wgpu-core`, drives a wgpu surface against a
# winit window, and re-exports the public surface the variant
# crates (`backend-wgpu-phone`, `-tablet`, `-tv`) consume.

[dependencies]
backend-wgpu-api = { workspace = true }
backend-wgpu-core = { workspace = true }
framework-core = { workspace = true }

wgpu = "22"
winit = { version = "0.30", features = ["rwh_06"] }
raw-window-handle = "0.6"
log = "0.4"
pollster = "0.4"
