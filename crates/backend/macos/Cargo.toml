[package]
name = "backend-macos"
version.workspace = true
edition.workspace = true
license.workspace = true

# Native macOS backend via AppKit. Implements `runtime_core::Backend`
# using real NSView / NSButton / NSScrollView / NSTextField / NSImageView
# widgets with a Taffy-backed flex layout pass.
#
# Compiles to an empty stub on non-macOS hosts so workspace-wide
# `cargo check` works from any platform. The real implementation
# lives under `cfg(target_os = "macos")` in `src/imp/`.
#
# See `docs/macos-backend-plan.md` for the design and scope.

[lib]
crate-type = ["rlib"]

[features]
default = []
# Forward `runtime-core/debug-stats` so PhaseTimer counters exist
# in this crate's hot paths (apply-style, layout, batched insert).
debug-stats = ["runtime-core/debug-stats"]
# Optional: compile in the runtime-server-client entry point + main-thread
# drain helper so the macOS app can run as a thin client of an runtime-server
# dev-server (instead of mounting the user's tree locally). When
# off, the crate is a pure native backend with no transport code.
# Mirrors `backend-ios-mobile`'s `runtime-server` feature; pulls in the
# shared `runtime-server-shell-native` worker.
runtime-server = ["dep:runtime-server-shell-native", "runtime-server-shell-native/runtime-server"]

[dependencies]
runtime-core = { workspace = true }
runtime-layout = { workspace = true }
inventory = "0.3"
# Cross-Apple substrate (NSLog, scheduler, CoreText font registry,
# color parsing). Shared with backend-ios-core; same Phase 0 lift.
backend-apple-core = { workspace = true }
# Only used when `runtime-server` is on. Pulls tungstenite + the
# worker-thread `RuntimeServerShell` from the shared native-shell crate
# (also consumed by iOS, Android).
runtime-server-shell-native = { workspace = true, optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.5"
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSArray",
    "NSEnumerator",
    "NSObject",
    "NSSet",
    "NSGeometry",
    "NSValue",
    "NSDictionary",
] }
objc2-app-kit = { version = "0.2", features = [
    "NSResponder",
    "NSView",
    "NSWindow",
    "NSApplication",
    "NSColor",
    "NSButton",
    "NSControl",
    "NSCell",
    "NSTextField",
    "NSTextFieldCell",
    "NSTextView",
    "NSText",
    "NSScrollView",
    "NSImageView",
    "NSImage",
    "NSEvent",
    "NSSlider",
    "NSSwitch",
    "NSProgressIndicator",
    # NSWindowOrderingMode + NSBackingStoreType for the screen_recorder
    # PrivateLayer overlay child-window (addChildWindow:ordered: + init backing).
    "NSGraphics",
    "NSGraphicsContext",
    "NSTrackingArea",
    "NSCursor",
    "NSFont",
    "NSAppearance",
    "NSAccessibilityConstants",
] }
raw-window-handle = "0.6"
