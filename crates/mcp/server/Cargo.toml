[package]
name = "mcp-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Stdio MCP server that surfaces the framework's component catalog. Provides list_components / describe_component / find_uses / find_dependencies tools, plus the `idealyst://catalog` resource. Consumes the `mcp-catalog` ResolvedCatalog built from the linked-in inventory."

[dependencies]
# `mcp-catalog` provides the catalog data; consumers of this crate
# also need to enable `runtime-core/mcp` so their `#[component]`
# expansions actually populate the inventory slice.
mcp-catalog = { workspace = true }

# rmcp 1.x — the official Rust MCP SDK. Features:
# - `server` enables the ServerHandler + ServiceExt machinery
# - `macros` enables `#[tool_router]` / `#[tool]` / `#[tool_handler]`
# - `transport-io` enables `transport::stdio()`
rmcp = { version = "1", features = ["server", "macros", "transport-io"] }

# rmcp's async runtime — only `rt-multi-thread` + `macros` are
# strictly required for stdio, but `full` is fine for a dev tool.
tokio = { version = "1", features = ["full"] }

anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# File-watch (phase 5). Reuses `notify-debouncer-mini` — same crate
# the existing `dev-reload` uses, so we don't introduce a second
# file-watch implementation in the tree.
notify-debouncer-mini = { version = "0.4", default-features = false }

# stderr logging (rmcp examples use it; not strictly required).
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Liveness checks on discovered apps: the file-based discovery scanner
# uses `kill(pid, 0)` on POSIX to drop registration files left by
# crashed processes.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
# `runtime-core` + `runtime-macros` provide `#[component]` for the
# `catalog_service::tests` module, which mounts a few synthetic
# components and asserts they round-trip through the
# `list_components` tool's in-process catalog fallback path. The
# `mcp` feature is what makes `#[component]` emit `inventory::submit!`
# entries — without it, the test binary's catalog is empty even
# though the components compile.
runtime-core = { workspace = true, features = ["mcp"] }
runtime-macros = { workspace = true, features = ["mcp"] }
