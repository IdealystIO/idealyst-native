[package]
name = "mcp-catalog"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []

[dependencies]
inventory = "0.3"
serde_json = "1"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
# Integration tests define `#[component]` functions to verify the
# distributed-slice registration round-trips. The `mcp` feature on
# runtime-core forwards to `runtime-macros/mcp` (the emission
# gate) and re-exports this crate as `runtime_core::__mcp`, which
# is what `#[component]`'s emission references.
runtime-core = { workspace = true, features = ["mcp"] }
runtime-macros = { workspace = true, features = ["mcp"] }
