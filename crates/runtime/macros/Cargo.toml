[package]
name = "runtime-macros"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
proc-macro = true

[features]
# Forwarded from runtime-core's debug-stats. Toggles whether
# `#[component]` emits enter/exit instrumentation calls into the
# generated component function bodies. When off, the macro emits
# no instrumentation at all.
debug-stats = []

# Forwarded from runtime-core's `hot-reload`. When on, `#[component]`
# rewrites the function body to dispatch through
# `dev_hot::call(impl_fn, args_tuple)` so a hot-reloaded
# replacement can be jump-table-swapped at runtime. When off, the
# macro emits the function exactly as the author wrote it â€” no
# wrapper, no indirection, zero production overhead.
hot-reload = []

# Catalog capture â€” when on, `#[component]`, `#[derive(IdealystSchema)]`,
# and `#[idealyst_tool]` additionally emit `inventory::submit!` calls
# that register the item (name, docs, props, composes graph, â€¦) into
# `mcp-catalog`'s distributed slice. This is the project's introspection
# surface: the MCP server is one consumer, a docs renderer is another.
# When off, the macros emit zero catalog code â€” no inventory entry, no
# dependency on `mcp-catalog`. See `docs/mcp-catalog-spec.md`.
#
# Pulls `prettyplease` â€” used only by `recipe!` to format captured
# recipe source for the catalog â€” so it compiles only in catalog builds.
catalog = ["dep:prettyplease"]

# Backward-compatible alias. The catalog used to be called "mcp" (after
# its first consumer); the gate is now `catalog` since the data feeds
# docs/tooling too, and MCP merely relies on it. `runtime-macros/mcp`
# still works and just turns on `catalog`.
mcp = ["catalog"]

# Compile-time documentation enforcement. When on, `#[component]` errors
# if the component fn has no `///` doc comment, and
# `#[derive(IdealystSchema)]` errors on any undocumented prop field / enum
# variant. Independent of `mcp` (you can enforce docs without building a
# catalog), though the two pair naturally. Forwarded from
# `runtime-core/strict-docs`. Off by default; opt in per build.
strict-docs = []

# Compile-time naming enforcement. When on, `#[component]` errors if the
# component fn name isn't PascalCase â€” the convention `ui!`/`jsx!` rely on
# to tell a component tag (`Button`) from a primitive (`view`). This is the
# hard-stop sibling of the `component-pascal-case` lint rule (`idealyst
# lint`): the lint warns during editing, the feature fails the build.
# Forwarded from `runtime-core/strict-naming`. Off by default.
strict-naming = []

[dependencies]
syn = { version = "2", features = ["full", "visit", "visit-mut", "extra-traits"] }
quote = "1"
# `span-locations` gives us `Span::start()` so the `mcp` feature can
# capture per-edge source lines when walking `ui!`/`jsx!` bodies. On
# stable Rust inside a real proc-macro context, the line is `0` (the
# proc_macro crate doesn't expose source locations on stable); the
# field is still emitted so a future stable Rust will light it up
# automatically. See mcp_emit.rs / mcp_catalog::EdgeRef.
proc-macro2 = { version = "1", features = ["span-locations"] }
# Stable hashing for `lazy! { â€¦ }`'s generated function / split-module
# names. Per-call-site uniqueness comes from the block's token text.
sha2 = "0.10"
# Formats captured `recipe!` source into readable, exact Rust for the
# catalog. Optional â€” only pulled in by the `catalog` feature.
prettyplease = { version = "0.2", optional = true }
