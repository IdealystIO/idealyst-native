[package]
name = "runtime-layout"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Flex layout utility for native backends (iOS, Android). Wraps Taffy and translates runtime-core styles into Taffy styles."

[dependencies]
runtime-core = { workspace = true }
# Pure-Rust flex/grid layout engine. Matches CSS flex semantics so
# native backends produce the same output as the web backend's
# native CSS-flex layout, given the same framework styles.
taffy = { version = "0.7", default-features = false, features = ["std", "flexbox", "block_layout", "taffy_tree"] }
