[package]
name = "runtime-core"
version.workspace = true
edition.workspace = true
license.workspace = true

# Crate-type stays the cargo default (rlib only). The runtime-server dylib
# hot-reload mode now uses a "fat bin + thin patch" architecture
# (dx-style): the host bin statically links every framework crate
# and is linked with `-Wl,-export_dynamic` so every internal
# symbol is visible to the patch linker. Patches are dylibs whose
# external references are resolved as ABSOLUTE jumps to the host
# bin's symbol addresses — no dynamic linking against framework
# crates at all. So no separate dylib output is needed here.

[features]
# When enabled, the framework records component/build/backend timing
# events into an in-memory log. Author-facing API lives in
# `runtime_core::debug`. Off by default — when off, the `debug`
# module + all instrumentation are entirely compiled out (no atomic
# check, no symbol pollution, no binary growth).
#
# Forwards to the matching feature on `runtime-macros` so the
# `#[component]` macro emits the corresponding enter/exit calls.
# Timing reads go through the platform-agnostic `runtime_core::time`
# source (installed by each backend); this crate links no `js-sys` /
# `wasm-bindgen` itself.
debug-stats = ["runtime-macros/debug-stats"]

# Dev-time hot-reload substrate. Pulls in `dev-hot` (the
# subsecond-backed jump-table runtime) and tells the `#[component]`
# macro to emit a thin `hot::call(...)` wrapper around every
# user-authored component body. Production builds (where this is
# off — the default) emit components with no wrapper, no
# indirection, zero overhead — `dev-hot` itself doesn't even
# get compiled.
#
# Turn on for: runtime-server dylib-mode host builds, and any dev-time native
# platform build (Android, iOS) where the dev-server will ship
# patch dylibs over the wire.
hot-reload = ["runtime-macros/hot-reload", "dep:dev-hot", "dev-hot/hot"]

# Project catalog capture. When enabled, the macros emit
# `inventory::submit!`s registering each component / props struct /
# tool into `mcp-catalog`'s distributed slice; the catalog surfaces via
# `runtime_core::__mcp` (a hidden re-export of `mcp-catalog`). This is
# the project's introspection interface — the MCP server renders it for
# AI, a docs generator renders it for humans. Off by default —
# production builds carry zero catalog code. Forwards to
# `runtime-macros/catalog` (the emission gate) and pulls `mcp-catalog`
# in as an optional dep so user crates never declare it directly.
# See `docs/mcp-catalog-spec.md`.
catalog = ["runtime-macros/catalog", "dep:mcp-catalog"]

# Backward-compatible alias. The catalog feature used to be named `mcp`
# (after its first consumer). MCP now *relies on* the catalog rather than
# being the gate, so the gate is `catalog`; `runtime-core/mcp` stays as
# an alias that just turns it on. Existing consumers keep working.
mcp = ["catalog"]

# Compile-time documentation enforcement. When on, the compiler rejects
# any `#[component]` without a `///` doc comment and any
# `#[derive(IdealystSchema)]` prop field / enum variant without one.
# A deliberately strict gate — not the everyday workflow — for catching
# undocumented public surface at build time instead of in a later catalog
# audit. Independent of `mcp`; forwards to `runtime-macros/strict-docs`.
# Off by default. See `docs/mcp-catalog-spec.md`.
strict-docs = ["runtime-macros/strict-docs"]

# Compile-time component-naming enforcement. When on, the compiler rejects
# any `#[component]` whose fn name isn't PascalCase — the convention
# `ui!`/`jsx!` use to route a tag to component dispatch vs. a primitive.
# The build-failing counterpart to the `component-pascal-case` lint rule.
# Independent of the other gates; forwards to `runtime-macros/strict-naming`.
# Off by default.
strict-naming = ["runtime-macros/strict-naming"]

# Programmatic introspection and control of the running UI. When
# enabled, the render walker registers every mounted primitive into a
# thread-local registry that can be queried and controlled via the
# `robot` module's API. Designed as the foundation for:
# - Cross-platform E2E testing
# - MCP server for AI-driven in-app control
# - Live debugging / inspection tools
#
# Off by default — adds per-node overhead (one registry entry per
# mounted element + retained action closures). Production builds
# should leave this off.
# `dep:base64` powers the Robot bridge's `"screenshot"` verb, which
# returns the captured PNG as base64 in its JSON response.
# `dep:libc` is the unix `kill(pid, 0)` liveness check the bridge uses to
# sweep dead-pid registration files from `~/.idealyst/apps/` on bind (so
# a crashed prior run doesn't leave a ghost the MCP server tries to dial).
robot = ["dep:base64", "dep:libc"]

# `dev` umbrella feature — the one `idealyst dev` flips. Bundles
# every feature that "the user is running locally for development"
# implies. Today: `robot` (so the MCP server's runtime tools can
# attach) + `catalog` (so the component catalog is populated). When
# `dev` is on, `runtime_core::mount()` auto-starts the Robot bridge on
# the default port — no user code needed. Production builds leave this
# off; they never link `mcp-catalog` or the bridge thread.
dev = ["robot", "catalog"]

# Platform-agnostic async + per-frame primitives:
#
# - `render_loop(|elapsed| ...)`  ticks a closure once per frame.
# - `spawn_async(future)`         drives a future to completion.
#
# Both are defined here as platform-agnostic traits (`RenderLoopDriver`,
# `AsyncExecutor` in `driver.rs`); each `backend/*` crate installs the
# implementation appropriate to its platform (rAF/spawn_local on web,
# a render thread on Android, CADisplayLink on iOS). This crate links
# NO platform deps for them — no `wasm-bindgen-futures`, no
# `objc2`/`block2`. The only target-gated dep is `pollster`, a portable
# native fallback so `spawn_async` works before a backend installs an
# executor (and `log` for the desktop-fallback warning).
#
# Off by default because that native fallback is dead weight for apps
# that never need a frame ticker. Enabling this feature does NOT pull
# in any GPU library — that's the author's call, kept in the author's
# own Cargo.toml. The `Graphics` surface primitive is unconditional.
async-driver = [
    "dep:pollster",
    "dep:log",
]

# When on, the `face!` macro embeds each font file's bytes into the
# binary via `include_bytes!` (emitting `AssetSource::BundledEmbedded`,
# which carries the bytes alongside the bundle path). When off, `face!`
# emits a bytes-free `AssetSource::Bundled` carrying only the path.
#
# The decision is made by the dep graph, not the author: backends that
# consume font *bytes* (cosmic-text/wgpu Simulator, CoreText on
# iOS/macOS, Android `Typeface`) turn this on through their own
# `runtime-core` dep, so any build containing one of them embeds the
# fonts. A pure web (DOM) build links none of those backends, leaves
# this off, and resolves every font to a served-file URL via
# `@font-face { src: url(...) }` — keeping the fonts out of the wasm.
#
# This is why the `#[cfg]` split lives on the `__face_source!` helper
# *defined here in runtime-core* (evaluated against runtime-core's own
# unified feature set) rather than inside the `face!` expansion (which
# would be evaluated against the author crate's features).
embed-font-bytes = []

[dependencies]
runtime-macros = { workspace = true }
# `dev-hot` is only linked in when the `hot-reload` cargo
# feature is on (typically by the runtime-server dylib-mode host wrapper). Off
# by default — production builds don't compile it.
dev-hot = { workspace = true, optional = true }
# `mcp-catalog` is only linked in when the `mcp` cargo feature is
# on. Same pattern as `dev-hot`: hidden re-export via
# `runtime_core::__mcp` so consumer crates' `#[component]`
# expansions can reach the catalog crate without declaring it as a
# direct dep.
mcp-catalog = { workspace = true, optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Only linked under the `robot` feature — encodes captured screenshot
# PNGs as base64 for the bridge's `"screenshot"` JSON response.
base64 = { version = "0.22", optional = true }
# Bitflags for `AccessibilityTraits` (one u16 of orthogonal a11y flags
# per primitive). Already transitively pulled by several deps; declaring
# it directly here so the module owns the version pin.
bitflags = "2"
# The `Graphics` primitive exposes its surface as a standard
# `raw_window_handle` handle so authors can plug any GPU library
# (wgpu, glow, vello, softbuffer, …) on top. Tiny dep — a handful of
# enums and traits, no platform code.
raw-window-handle = "0.6"
# Fast FxHash hasher for the reactive core's hot-path collections
# (`signal_subscribers`, `effect_dependencies`, the RUNNING set, etc.).
# Keys are internal Signal/Effect integer ids — never attacker-controlled —
# so the default SipHash's cryptographic resistance is wasted cost on the
# framework's hottest path (a HashSet insert per signal read inside an effect).
rustc-hash = { workspace = true }
# Runtime for `lazy! { ... }` — see the workspace dep declaration for
# the alias rationale. Re-exported below as `__wasm_split` so the
# `lazy!` macro's expansion in author crates can reach it.
wasm-split = { workspace = true }

# Native deps for the optional `async-driver` feature. `pollster`
# drives the future returned from `spawn_async` on every non-wasm
# target so authors can write the same `async fn build_renderer(...)`
# everywhere. `log` is reserved for desktop-fallback warnings.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
pollster = { version = "0.4", optional = true }
log = { version = "0.4", optional = true }
# `kill(pid, 0)` for the Robot bridge's stale-registration sweep. Only
# linked under `robot` (non-wasm); ordinary app builds don't pull it.
libc = { version = "0.2", optional = true }

