[package]
name = "screen-recorder"
version.workspace = true
edition.workspace = true
license.workspace = true

# Cross-platform screen / window recording SDK.
#
# One small capability — `ScreenRecorder::start(config).await` — that
# establishes a live frame stream from the screen, a window, or this
# app on each target using the platform's own capture stack, and fires
# a raw `VideoFrame` callback for each captured frame.
#
# Deliberately unopinionated, exactly like the `microphone` SDK: it
# hands you raw frames and gets out of the way. **It never writes a
# file** — encoding to mp4/webm, muxing audio, and persisting to disk
# are the job of a separate higher-level crate that layers on top of
# this one. This crate's only output is the frame callback.
#
#   - iOS:                 ReplayKit (RPScreenRecorder.startCapture) → CMSampleBuffer
#   - Android:             MediaProjection + VirtualDisplay + ImageReader (JNI)
#   - macOS:               ScreenCaptureKit (SCStream + SCContentFilter)
#   - Windows:             Windows.Graphics.Capture (Direct3D11CaptureFramePool)
#   - Linux:               xdg-desktop-portal ScreenCast + PipeWire
#   - web (wasm32):        getDisplayMedia + MediaStreamTrackProcessor / canvas pump
#
# A second, optional feature — the `private_layer` `Element::External` —
# designates an overlay subtree that screen recordings DON'T capture
# (the iOS "overlay on a separate UIWindow" trick, generalized to every
# backend). It rides the framework's existing third-party-extension
# mechanism (`Element::External` + per-backend `ExternalRegistry`), so
# it needs zero framework-core changes.
#
# # Required platform permissions (the app declares these — see README):
#   - iOS:     RPScreenRecorder prompts; broadcast extension for system-wide
#   - macOS:   Screen Recording TCC permission (system prompt)
#   - Android: <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
#              + the MediaProjection consent dialog (re-prompts each session on 14+)
#   - web:     none (the browser shows the source picker on getDisplayMedia)

# Declares the platform permission this SDK needs. The CLI walks the app's
# dependency graph, finds this, and injects the right per-platform artifacts.
[package.metadata.idealyst]
capabilities = ["screen_capture"]

# Frameworks the iOS ReplayKit capture backend needs linked into the final
# app. The CLI's iOS device-deploy collects these from the dep graph (like the
# Android `runtime_kotlin` registry) and adds them to the generated Xcode
# project — `RPScreenRecorder`'s class won't load otherwise (the screenshare
# "crash on start"). CoreMedia/CoreVideo expose the C functions that crack a
# CMSampleBuffer's CVPixelBuffer open.
[package.metadata.idealyst.ios]
frameworks = ["ReplayKit", "CoreMedia", "CoreVideo"]

[dependencies]
# Only needed for the `private_layer` Element::External component + its
# `register()`. The capture capability itself is framework-agnostic.
runtime-core = { workspace = true }
thiserror = "1"
# The live-source currency every capture backend writes into and the public
# API hands back — shared with `camera` (a sibling producer) and `video` (a
# consumer). Keeps the per-platform transport hidden from app code.
media-stream = { workspace = true }

# iOS capture: ReplayKit (RPScreenRecorder.startCaptureWithHandler) → each
# CMSampleBuffer's CVPixelBuffer repacked to RGBA8. Driven through objc2
# msg_send + a block2 capture handler; futures-channel bridges ReplayKit's
# completionHandler block to async, exactly like `camera`'s permission flow.
[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = ["NSString"] }
block2 = "0.5"
futures-channel = "0.3"
# The private-layer `register` handler builds a ReplayKit-excluded
# `UIWindow` through `IosBackend::create_private_layer_window`, so it
# names the concrete backend type (same shape as the `video` SDK).
backend-ios-mobile = { workspace = true }

# Web capture: getDisplayMedia → a hidden <video> → <canvas> pixel pump.
[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window",
    "Navigator",
    "MediaDevices",
    "MediaStream",
    "MediaStreamTrack",
    "DisplayMediaStreamConstraints",
    "Document",
    "Element",
    "HtmlMediaElement",
    "HtmlVideoElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "ImageData",
    "Performance",
    "DomException",
] }
# The private-layer `register` handler installs the inline-no-op
# external against the concrete `WebBackend` (documented: web has no
# separate-window exclusion yet — TODO Element Capture `restrictTo`).
backend-web = { workspace = true }

# Android capture: MediaProjection + VirtualDisplay + ImageReader, driven by a
# Kotlin shim (RustScreenCaptureHelper) that owns the consent Activity-result
# flow, the mandatory mediaProjection foreground service, and the capture loop,
# and trampolines each RGBA frame back through the
# `Java_io_idealyst_screenrecorder_RustScreenCaptureHelper_native*` exports in
# android.rs. `ndk-context` exposes the host JavaVM + Activity; `futures-channel`
# bridges the shim's `nativeStarted`/`nativeError` callbacks to the awaiting
# `start()` — exactly the `camera` SDK's Android shape.
[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
jni = "0.21"
ndk-context = "0.1"
futures-channel = "0.3"
# The private-layer `register` handler builds a PixelCopy-excluded
# `WindowManager` window through
# `AndroidBackend::create_private_layer_window` (lib name `backend_android`).
backend-android-mobile = { workspace = true }

# macOS: capture via ScreenCaptureKit (`SCStream` + `SCContentFilter`),
# driven through the Obj-C runtime (objc2 msg_send + a declared
# `SCStreamOutput` delegate subclass), the same way the `camera` SDK drives
# AVFoundation. No typed framework crate — `ScreenCaptureKit` is force-linked
# with an in-source `#[link]` and we call the CoreMedia/CoreVideo C surface
# for the CVPixelBuffer bytes. `block2`/`futures-channel` bridge the
# `getShareableContent`/`startCapture` completion handlers to async.
#
# The private-layer `register` handler builds a capture-excludable borderless
# overlay window through `MacosBackend::create_private_layer_window`, and the
# capture path reads the overlay window ids back via
# `backend_macos::private_layer_window_ids` for the SCContentFilter exclusion.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = ["NSString", "NSArray"] }
block2 = "0.5"
futures-channel = "0.3"
backend-macos = { workspace = true }

# The Kotlin shim + foreground service that drive MediaProjection capture and
# trampoline frames back to the native exports in android.rs. `idealyst run
# android` discovers and compiles these from here, like the `camera` SDK's
# RustCamera2Helper.
[package.metadata.idealyst.android]
runtime_kotlin = [
    "runtime/kotlin/io/idealyst/screenrecorder/RustScreenCaptureHelper.kt",
    "runtime/kotlin/io/idealyst/screenrecorder/MediaProjectionService.kt",
]

# ---------------------------------------------------------------------------
# Per-platform capture deps are added as each backend is implemented. The
# planned dep set per remaining target, for reference when filling them in:
#
# [target.'cfg(target_os = "windows")'.dependencies]
# windows = { features = ["Graphics_Capture", "Graphics_DirectX_Direct3D11", ...] }
#
# [target.'cfg(target_os = "linux")'.dependencies]
# ashpd, pipewire                                               # xdg portal
#
# [target.'cfg(target_arch = "wasm32")'.dependencies]
# js-sys, wasm-bindgen, wasm-bindgen-futures, web-sys           # getDisplayMedia
# ---------------------------------------------------------------------------

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
