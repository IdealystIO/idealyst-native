[package]
name = "idea-codeblock"
version.workspace = true
edition.workspace = true
license.workspace = true

# Third-party `CodeBlock` primitive — a single backend node rendering
# a flat sequence of `(text, color)` runs. Carved out of
# `runtime-core` after a measurement showed the equivalent
# composition (`View` + `Repeat<styled-View-with-Text>`) generates
# 100-300× more backend ops per re-render than the single-node
# primitive, even with the batched-Repeat fast path.
#
# The renderer is now BACKEND-NEUTRAL: it builds its `<pre>`+spans via
# the `Backend` trait (`create_element` / `create_text` / `apply_style`),
# so it server-renders on the SSR backend AND hydrates cleanly on web
# (the build goes through the adoption cursor). No `web_sys` / backend
# dependency — one generic `register<B: RegisterExternal>(b)`.

[dependencies]
runtime-core = { workspace = true }
