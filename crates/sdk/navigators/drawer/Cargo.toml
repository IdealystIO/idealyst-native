[package]
name = "drawer-navigator"
version.workspace = true
edition.workspace = true
license.workspace = true

# First-party `Drawer` navigator SDK — registers a NavigatorHandler
# that drives a slide-in side panel + body region:
#   - Web: scrim + animated sidebar (with optional pinned sidebar above
#     a breakpoint).
#   - iOS: custom UIView-based drawer overlay (no native control).
#   - Android: DrawerLayout + per-fragment FragmentManager.
#
# Single-crate cfg-gated layout. App bootstrap:
# `drawer_navigator::register(&mut backend)`.

[features]
# Recording handler for the runtime-server sidecar's recorder backend
# (`dev-server::WireRecordingBackend`). Enabled only in host-side
# sidecar builds (build-runtime-server) — emits navigator wire commands
# instead of rendering. Off by default so device/web/SSR builds never
# pull the host-side dev-server dep.
runtime-server = ["dep:dev-server"]

# `terminal`: selects the terminal backend handler. The terminal target
# builds for the host triple, so on a macOS host `cfg(target_os = "macos")`
# would otherwise compile the macOS handler (typed for `MacosBackend`) and
# the terminal handler — which self-registers via `inventory::submit!` —
# would never compile, leaving a terminal app with no drawer handler. The
# app's own `terminal` feature forwards to this one (the CLI's terminal
# wrapper enables the app feature), breaking the host-triple tie. See the
# tutorial's Cargo.toml for the full rationale.
terminal = ["dep:backend-terminal"]

[dependencies]
runtime-core = { workspace = true }
# Self-registration of the per-backend navigator handler at construction.
inventory = "0.3"
# Backend-neutral (runtime-core only). The generic `chrome` handler
# stamps the shared `ui-nav-*` classes + ships `NAVIGATOR_LAYOUT_CSS`,
# the single source of truth shared with the live web navigator.
css = { workspace = true }

# `wire` is the shared command/enum vocabulary. Non-optional because it
# is needed on TWO paths: the host-side recording handler (feature
# `runtime-server`) AND every CLIENT build, where `register(&mut backend)`
# registers the wire drawer presentation-factory so the runtime-server
# wire client can drive the real `create_navigator` (native chrome over
# the wire). It is platform-pure data + a small registry, so it compiles
# on wasm / iOS / Android / macOS / terminal at negligible cost.
wire = { workspace = true }

# Recording handler dep (feature `runtime-server`, host-side only).
# `dev-server` owns `WireRecordingBackend` + `NavRecorder`.
dev-server = { workspace = true, optional = true }

# Only the SSR integration tests need backend-ssr (to register the
# generic `chrome` handler on a concrete SsrBackend). The handler is
# backend-neutral, so the library has no backend-ssr dep and no cfg.
[dev-dependencies]
backend-ssr = { workspace = true }
# Headless terminal render harness for the `tests/terminal.rs` regression
# (gated on the `terminal` feature). Dev-only — never in the shipped lib.
host-terminal = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
web-navigator-helpers = { workspace = true }
web-sys = { version = "0.3", features = ["Event", "EventTarget", "Element"] }
wasm-bindgen = "0.2"

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }
android-navigator-helpers = { workspace = true }
jni = "0.21"
log = "0.4"

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }
ios-navigator-helpers = { workspace = true }

# macOS: single-window, persistent sidebar drawer per
# `project_macos_navigator_design`. Uses the public Backend trait
# surface + the macOS backend's `with_global_backend` re-entry
# helper. No separate `macos-navigator-helpers` crate — the
# handler is small enough to live inline.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal backend — pulled in ONLY by the `terminal` feature (the app's
# `terminal` feature forwards to it; the CLI's terminal wrapper enables the
# app feature). It can't be a `target_os` dependency like the others: the
# terminal target builds for the host triple, so on a macOS host it shares
# macOS's triple and would collide with `backend-macos`. The feature is the
# disambiguator. See `[features]`.
[dependencies.backend-terminal]
workspace = true
optional = true
