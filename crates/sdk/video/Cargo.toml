[package]
name = "video"
version.workspace = true
edition.workspace = true
license.workspace = true

# Third-party `Video` SDK — one crate, cfg-gated per-backend impl
# modules. Mirrors the `webview` SDK's single-crate layout (see
# `crates/sdk/webview/Cargo.toml` for the same rationale).
#
# # Backend coverage
#
# - Web: `<video>` element.
# - iOS: `AVPlayerLayer` over a `UIView` host.
# - Android: `android.widget.VideoView`.
# - Other targets (wgpu desktop, terminal, etc.): the framework's
#   `External` placeholder. Apps that want video on those targets ship
#   their own SDK module — the `register_external` surface is open.

[dependencies]
runtime-core = { workspace = true }
# A `Video` can display a live `MediaStream` (from `camera` /
# `screen-recorder`), not just a URL `src`.
media-stream = { workspace = true }
# Self-registration of the per-backend Video external at construction.
inventory = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "HtmlMediaElement",
    "HtmlVideoElement",
    "MediaStream",
    "Node",
] }
wasm-bindgen = "0.2"

[target.'cfg(target_os = "android")'.dependencies]
backend-android-mobile = { workspace = true }
backend-android-core = { workspace = true }
jni = "0.21"

# The Kotlin shim that hosts the VideoView (URL) / ImageView (live stream)
# children and converts RGBA frames to a Bitmap. `idealyst run android`
# discovers + compiles it from here.
[package.metadata.idealyst.android]
runtime_kotlin = ["runtime/kotlin/io/idealyst/video/RustVideoFrameSink.kt"]

[target.'cfg(target_os = "ios")'.dependencies]
backend-ios-mobile = { workspace = true }
block2 = "0.5"
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSURL",
    "NSNotification",
    "NSGeometry",
] }
objc2-ui-kit = { version = "0.2", features = [
    "UIView",
    "UIResponder",
] }

# macOS (AppKit): both the live `MediaStream` display path (layer-backed NSView,
# CALayer `contents` ← per-frame CGImage / IOSurface) AND the AVPlayer/URL path
# (an `AVPlayerLayer` sublayer), mirroring iOS — so a recorded-file preview
# (`MediaContent::Url`) plays. `block2` drives the loop-playback notification
# observer; `AVFoundation` is force-linked in `macos.rs`.
[target.'cfg(target_os = "macos")'.dependencies]
backend-macos = { workspace = true }
block2 = "0.5"
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSURL",
    "NSNotification",
    "NSGeometry",
] }
objc2-app-kit = { version = "0.2", features = [
    "NSView",
    "NSResponder",
] }
