[package]
name = "maps"
version.workspace = true
edition.workspace = true
license.workspace = true

# Umbrella crate for the MapView third-party primitive.
#
# Layering:
# - `maps-core` (shared types, zero platform deps)
# - this crate: facade + cfg-routed `register` re-export
# - `maps-web`/`maps-ios`/etc.: per-backend leaves with the actual
#   FFI / SDK wiring
#
# Cargo's target-specific deps pull in exactly one leaf for the current
# build target. On platforms with no matching leaf, the umbrella's
# fallback `register<B>(_: &mut B) {}` keeps user code compiling; the
# framework's per-backend "not supported" placeholder renders at
# runtime.

[dependencies]
runtime-core = { workspace = true }
maps-core = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
maps-web = { workspace = true }

[target.'cfg(target_os = "ios")'.dependencies]
maps-ios = { workspace = true }
