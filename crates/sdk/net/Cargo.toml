[package]
name = "net"
version.workspace = true
edition.workspace = true
license.workspace = true

# Cross-platform async HTTP client SDK.
#
# Provides one async API — `Client::get(url).send().await?.json()` — that
# compiles to the platform-native HTTP stack on each target:
#   - web (wasm32):           fetch via gloo-net
#   - iOS / macOS / tvOS:     NSURLSession via objc2
#   - Android:                HttpURLConnection via JNI
#   - everything else:        reqwest (rustls)
#
# The platform-agnostic shell (Client / RequestBuilder / Response,
# Body traits, error type) lives in this crate's top-level modules.
# Each cfg-gated `*.rs` module supplies the transport for one family.
#
# This crate is the foundation `idealyst-server` (server functions)
# is built on, but is independently useful for any author hitting an
# external API.

[features]
default = ["json", "form"]
json = ["dep:serde_json"]
form = ["dep:serde_urlencoded"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", optional = true }
serde_urlencoded = { version = "0.7", optional = true }
thiserror = "1"

# Native targets: reqwest with rustls (no native-tls dep, no OpenSSL).
# WebSocket: sync `tungstenite` driven on a blocking I/O worker thread
# (no async runtime — see the execution-model invariant), with inbound
# messages bridged to async via `futures-channel`. `ws://` works today;
# `wss://` needs a tungstenite TLS feature, added when the platform arms land.
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android")))'.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "http2"] }
tungstenite = "0.21"
futures-channel = "0.3"
futures-util = { version = "0.3", default-features = false, features = ["std"] }

# Web (wasm) target: fetch via gloo-net + AbortController for cancel.
[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-net = { version = "0.6", features = ["http"] }
js-sys = "0.3"
web-sys = { version = "0.3", features = ["AbortController", "AbortSignal"] }

# iOS / macOS / tvOS target: NSURLSession via objc2 + block2.
# `futures-channel` bridges the completion callback to async/await.
[target.'cfg(any(target_os = "ios", target_os = "macos", target_os = "tvos"))'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    # Enables block-based method bindings (specifically
    # `dataTaskWithRequest:completionHandler:` on NSURLSession).
    "block2",
    "NSURLSession",
    "NSURLRequest",
    "NSURLResponse",
    "NSURL",
    "NSString",
    "NSData",
    "NSError",
    "NSDictionary",
    "NSArray",
    "NSEnumerator",
    "NSObject",
    "NSValue",
] }
block2 = "0.5"
futures-channel = "0.3"

# Android target: HttpURLConnection via JNI on a worker thread.
# `ndk-context` exposes the host's JavaVM; `futures-channel` bridges
# the worker thread's blocking call back to async.
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
ndk-context = "0.1"
futures-channel = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
# Echo server for the WebSocket round-trip test.
tokio-tungstenite = "0.21"
futures-util = "0.3"
