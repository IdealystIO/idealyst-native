[package]
name = "canvas-core"
version.workspace = true
edition.workspace = true
license.workspace = true

# The renderer-agnostic 2D drawing abstraction for the `canvas` SDK.
# Owns the retained `Scene` model + the `Canvas` `Element::External`
# primitive; contains NO rendering code. No renderer/backend deps so the
# per-renderer crates (`canvas-vello`, `canvas-native`) and the `canvas`
# umbrella can all depend on it without a dep cycle — same split
# rationale as `maps-core`.

[dependencies]
# `Element::External` plumbing, the canonical `color::Rgba`, and the
# `IdealystSchema` derive (a no-op without the `catalog` feature, so this
# adds no platform code to a normal build).
runtime-core = { workspace = true }
# Scene wire serialization (snapshot crosses the runtime-server wire). `rc` so
# `DrawOp::Image`'s `Arc<ImageSource>` serializes (the buffer is sent as before;
# the `Arc` only avoids a per-frame clone in-process — sharing isn't preserved
# across the wire, which is fine).
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
# Self-capture currency: `CanvasProps.capture` is a `FrameWriter` the renderer
# publishes rendered frames into, so the app can record the canvas's own output
# as a `MediaStream`. Thin, GPU-free, no cargo `links` (only a `#[link]` to the
# always-present CoreFoundation on Apple) — not a renderer/backend dep.
media-stream = { workspace = true }
# OPTIONAL (off by default): decode encoded image bytes (PNG/JPEG) to straight
# RGBA8 for `ImageSource::decode`. The core image-blit contract is raw RGBA;
# this is just an author convenience and pulls the `image` crate only when the
# `decode` feature is on. Already in the workspace lock (transitive), so no new
# unique dependency for a default build.
image = { version = "0.25", optional = true, default-features = false, features = [
    "png",
    "jpeg",
] }

[features]
# Decode encoded image containers (PNG/JPEG) into `ImageSource` via the
# `image` crate. Off by default — renderers only ever consume raw RGBA.
decode = ["dep:image"]
