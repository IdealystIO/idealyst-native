[package]
name = "canvas-native"
version.workspace = true
edition.workspace = true
license.workspace = true

# `canvas-native` — renders a canvas `Scene` with each platform's NATIVE
# 2D engine. One crate, cfg-gated per-backend modules (codeblock/video
# pattern). The app picks this renderer by calling `canvas_native::register`
# at bootstrap; it registers an `Element::External` handler for
# `CanvasProps` keyed by its TypeId.
#
# Backend coverage:
# - Web: `<canvas>` 2D context.
# - iOS: CoreGraphics / `CGContext` via a `UIView` subclass.
# - macOS: CoreGraphics / `CGContext` via an `NSView` subclass (shares
#   the iOS op-replay through the `apple` module; only the context
#   acquisition + bezier/color vtable differ).
# - Android: `android.graphics.Canvas`.
# - Other targets: framework `External` placeholder; use `canvas-vello`.

[dependencies]
runtime-core = { workspace = true }
canvas-core = { workspace = true }
# Self-registration of the per-backend external handler at construction.
inventory = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "Node",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "CanvasGradient",
    "CanvasWindingRule",
    "ResizeObserver",
    # Self-capture: `HtmlCanvasElement::capture_stream_with_frame_request_rate`
    # → `MediaStream`, published as the canvas stream's native source.
    "MediaStream",
    # Texture layers (camera): a hidden <video> per layer is drawImage'd into the
    # canvas so captureStream records it (web parity for camera-in-canvas).
    "HtmlVideoElement",
    "HtmlMediaElement",
    # Static-image blit (`DrawOp::Image`): raw RGBA → `ImageData` → an offscreen
    # `<canvas>` (`put_image_data`), drawImage'd into the scene
    # (`draw_image_with_html_canvas_element_and_dw_dh`).
    "ImageData",
    # Persistent layer (`DrawOp::Layer`): `get_transform()` returns a `DomMatrix`
    # used to mirror the main context's transform onto the offscreen layer.
    "DomMatrix",
] }

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = ["NSGeometry"] }
objc2-ui-kit = { version = "0.2", features = ["UIView", "UIResponder"] }

# iOS SIMULATOR only: the CPU self-capture (recording) fallback lives here
# because vello can't run on the sim. `backend-ios-core` provides `ios_log` for
# the one-time "you're on the slow CPU path" NSLog warning. Not pulled into
# device builds, where vello owns capture and the CPU path isn't compiled.
[target.'cfg(all(target_os = "ios", target_abi = "sim", not(target_arch = "wasm32")))'.dependencies]
backend-ios-core = { workspace = true }

[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = ["NSGeometry"] }
objc2-app-kit = { version = "0.2", features = [
    "NSView",
    "NSResponder",
    "NSColor",
    "NSBezierPath",
    "NSGraphicsContext",
] }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }
backend-android-core = { workspace = true }
jni = "0.21"
