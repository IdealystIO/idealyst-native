[package]
name = "tab-navigator"
version.workspace = true
edition.workspace = true
license.workspace = true

# First-party `Tab` navigator SDK — registers a NavigatorHandler that
# drives a native tab-switching container:
#   - Web: tab bar (top/bottom/sidebar) + outlet that swaps content.
#   - iOS: UITabBarController.
#   - Android: BottomNavigationView + FragmentManager.
#
# Single-crate cfg-gated layout (same as stack-navigator + sdk/video).
# App bootstrap: `tab_navigator::register(&mut backend)`.

[features]
# Recording handler for the runtime-server sidecar's recorder backend
# (`dev-server::WireRecordingBackend`). Host-side only; off by default.
# See `drawer-navigator`'s identical feature for rationale.
runtime-server = ["dep:dev-server", "dep:wire"]

[dependencies]
runtime-core = { workspace = true }

# Recording handler deps (feature `runtime-server`, host-side only):
# emit navigator wire commands instead of rendering. Off by default.
dev-server = { workspace = true, optional = true }
wire = { workspace = true, optional = true }

# Only the SSR integration test needs backend-ssr (to register the
# generic `chrome` handler on a concrete SsrBackend). The handler is
# backend-neutral, so the library has no backend-ssr dep and no cfg.
[dev-dependencies]
backend-ssr = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
web-navigator-helpers = { workspace = true }
web-sys = "0.3"

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }
android-navigator-helpers = { workspace = true }
jni = "0.21"

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }
ios-navigator-helpers = { workspace = true }

# macOS: tabbar + outlet layout per `project_macos_navigator_design`.
# Uses only the public Backend trait surface plus
# `backend_macos::with_global_backend` for microtask re-entry.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }
