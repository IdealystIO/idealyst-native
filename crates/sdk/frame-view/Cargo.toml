[package]
name = "frame-view"
version.workspace = true
edition.workspace = true
license.workspace = true

# Display a live RGBA frame stream on screen, by rendering it into the
# framework's `graphics` primitive (a GPU surface) with a small wgpu
# textured-quad blit. The display half that the raw-frame capability SDKs
# (`camera`, `screen-recorder`) deliberately leave out: those hand you
# pixels; this draws them.
#
# A `FrameSink` is the thread-safe hand-off — the capture callback (on its
# own thread) writes the latest frame into it; `frame_view(&sink)` returns a
# `graphics` Element whose on-surface render loop (main thread) uploads the
# latest frame to a GPU texture and presents it, aspect-fit.
#
# Works on every backend that implements `graphics`: iOS, macOS, Android,
# web. Not the CPU / terminal / SSR backends (no GPU surface), and not over
# the runtime-server wire (graphics can't cross it) — there the element
# renders nothing, same as any other graphics use.

[dependencies]
# `graphics` primitive + `raf_loop` (render loop) + `driver::spawn_async`
# (cross-platform async for the wgpu adapter/device request).
runtime-core = { workspace = true, features = ["async-driver"] }

# Native (iOS/macOS/Android/desktop): default features give Metal/Vulkan.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
wgpu = "29"

# Web: the WebGL2 backend + the WGSL front-end, matching `host-web`. (Major
# must stay 29 to match `render-wgpu`'s `wgpu` types across the workspace.)
[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "29", default-features = false, features = ["webgl", "wgsl"] }
