[package]
name = "credentials"
version.workspace = true
edition.workspace = true
license.workspace = true

# Cross-platform SECURE storage for secrets (auth tokens, keys), backed by
# each platform's real secure facility — never plaintext, never a false
# pretense of security:
#   - iOS / macOS : Keychain (Security framework, via `security-framework`)
#   - Android     : Android Keystore-wrapped AES-GCM, ciphertext in prefs (JNI)
#   - Windows      : Credential Manager (via the `keyring` crate)
#   - Linux        : Secret Service — GNOME Keyring / KWallet (via `keyring`)
#   - web          : ERRORS — a browser has no secure client store. Secrets
#                   belong server-side; use a server-fn login that sets an
#                   httpOnly session cookie (the BFF pattern). See README.
#
# Desktop uses the OS credential vault rather than a hardware enclave: there's
# no browser-XSS surface on a desktop, so the OS vault (user-session-locked,
# encrypted at rest) is the right bar there.
#
# This is the SecureStore half of the AsyncStorage-vs-SecureStore split;
# the plaintext `storage` crate is the other half.
#
# Synchronous on purpose: the underlying keystores are synchronous, and a
# sync `get()` plugs straight into `server::bearer(|| creds.get("token"))`
# so the same auth glue works on every platform (native = bearer from the
# keychain; web = nothing, the httpOnly cookie rides automatically).

[dependencies]

# iOS / macOS: Keychain generic-password items via the Security framework.
[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
security-framework = "2"

# Android: AES-GCM via an AndroidKeyStore-held key (never leaves the TEE);
# ciphertext parked in a private SharedPreferences file. Framework classes
# only — no androidx/gradle-cache dependency.
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.21"
ndk-context = "0.1"

# Windows: the OS Credential Manager (pure windows-rs bindings, no C libs).
[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

# Linux: the Secret Service (GNOME Keyring / KWallet) over D-Bus. Use the
# ASYNC backend (pure-Rust `zbus`) — keyring still exposes a sync API over it
# via `async-io`. This avoids the C `libdbus` dependency the sync backend
# pulls, so it builds without `libdbus-dev` and cross-compiles cleanly.
# `crypto-rust` keeps the session crypto off OpenSSL too.
[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["async-secret-service", "crypto-rust", "async-io"] }
