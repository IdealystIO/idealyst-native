[package]
name = "host-appkit"
version.workspace = true
edition.workspace = true
license.workspace = true

# AppKit host shell for the `backend-macos` native backend.
#
# Owns the NSApplication boot, the top-level NSWindow + content
# view, the menu bar setup, and the run loop. Hands the backend a
# content NSView (`set_host_root`) and calls `runtime_core::render`
# with the user's `app()` function.
#
# Mirrors `host-winit`'s role for the wgpu sim runtime — except this
# is a real native AppKit host, not a winit-driven custom-drawn
# window.

[lib]
crate-type = ["rlib"]

[features]
default = []
# Compile in `host_appkit::run_aas` — the runtime-server-client variant that
# connects to a dev-server (instead of mounting the user's tree
# locally) and drains commands onto the AppKit run loop. Forwarded
# to `backend-macos/runtime-server` so the backend's `aas` module is
# available. Off by default so the local-render build path pulls
# zero transport code.
runtime-server = ["backend-macos/runtime-server"]

[dependencies]
runtime-core = { workspace = true }
# `async-driver`: install the libdispatch-backed cooperative async executor at
# boot (this host calls `backend_apple_core::scheduler::install_scheduler`,
# which only installs the executor when apple-core's `async-driver` is on).
# Without it `spawn_async` falls back to `pollster::block_on`, freezing the run
# loop on any run-loop-dependent `.await` (e.g. media-writer stop). See the
# `async-driver` feature note in `backend-macos/Cargo.toml`.
backend-macos = { workspace = true, features = ["async-driver"] }
backend-apple-core = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSObject",
    "NSGeometry",
    # MainThreadMarker::new() is gated on NSThread.
    "NSThread",
    # NSProcessInfo + NSActivityOptions: hold a "user-initiated" activity
    # assertion so a dev app (with its robot bridge) isn't App-Napped when
    # backgrounded — keeps the bridge responsive for the Inspector reading
    # it from the foreground.
    "NSProcessInfo",
] }
objc2-app-kit = { version = "0.2", features = [
    "NSResponder",
    "NSView",
    "NSWindow",
    "NSApplication",
    "NSMenu",
    "NSMenuItem",
    "NSEvent",
    # Activation-policy + window-init signatures live behind these
    # additional features in objc2-app-kit 0.2.
    "NSRunningApplication",
    "NSGraphics",
] }
