[package]
name = "host-web"
version.workspace = true
edition.workspace = true
license.workspace = true

# Browser shell for the wgpu render backend.
#
# Mirrors `host-winit` on the web side: takes the framework's
# `Graphics`-allocated `<canvas>` surface, runs the wgpu init
# (instance → adapter → device → surface configure), constructs the
# `render_wgpu::Host` + `Renderer`, mounts the caller's UI, drives
# per-frame paint through `runtime_core::driver::render_loop`,
# and translates browser `pointerdown` / `pointermove` /
# `pointerup` / `pointercancel` / `wheel` events into the
# `render_api::EventSink` vocabulary the host already understands.
#
# Keeps `render-wgpu` platform-agnostic — no `web-sys` / `wasm-bindgen`
# dep on the render side. Consumers (Simulator components, future
# preview embeds) collapse to a single `mount(...).await` call inside
# their `Graphics` primitive's `on_ready`.

[dependencies]
render-api = { workspace = true }
render-wgpu = { workspace = true }
runtime-core = { workspace = true, features = ["async-driver"] }

# Browser-only — same target gate as `backend-web` follows. The
# `wgpu` major MUST match `render-wgpu`'s (currently 29) so the
# `wgpu::Device` / `wgpu::Queue` / `wgpu::TextureView` types we
# hand to `Renderer::render` come from the same crate; a major
# mismatch resolves to two separate `wgpu-core`s and the type
# graph stops linking. WebGL2 backend keeps the bridge robust
# under any browser, same as before — wgpu 29 ships the same
# `webgl` feature flag.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "29", default-features = false, features = ["webgl", "wgsl"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
raw-window-handle = "0.6"
log = "0.4"
web-sys = { version = "0.3", features = [
    "console",
    "CssStyleDeclaration",
    "Document",
    "Element",
    "EventTarget",
    "DomRect",
    "Event",
    "HtmlCanvasElement",
    "HtmlElement",
    "HtmlIFrameElement",
    "HtmlMediaElement",
    "HtmlVideoElement",
    "MouseEvent",
    "Node",
    "PointerEvent",
    "WheelEvent",
    "Window",
] }
