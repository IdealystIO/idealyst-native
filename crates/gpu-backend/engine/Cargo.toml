[package]
name = "render-wgpu"
version.workspace = true
edition.workspace = true
license.workspace = true
# Retained stub — see `build.rs`. No custom cfgs surfaced today.
build = "build.rs"

# Wgpu renderer + interaction host. The platform-agnostic half of
# the desktop-preview stack.
#
# Implements `runtime_core::Backend` for `WgpuBackend`, owns the
# tween engine, the interaction `Host`, and a wgpu-bound
# `Renderer`. **No winit, no event-loop, no browser deps** — those
# live in the host shells (`host-winit`, future `host-web`).

[features]
default = []
async-driver = ["runtime-core/async-driver"]
# `headless`: offscreen screenshot rendering with no window. Spins up a
# wgpu device (hardware, falling back to a software adapter like Mesa
# lavapipe on GPU-less servers — same shaders either way, so software
# output matches GPU output), renders the scene to an offscreen texture,
# and reads pixels back as RGBA / PNG. Powers the headless dev-server +
# Robot/MCP "screenshot the app even when mocked" path. Pulls `pollster`
# to block on the async device/readback, and `embed-font-bytes` so text
# shapes against the bundled font on a server with no system fonts.
headless = ["dep:pollster", "embed-font-bytes"]
# `embed-font-bytes`: the wgpu Simulator shapes text with cosmic-text,
# which needs the raw font bytes. NATIVE hosts (`host-winit`, the
# mobile sims) enable this so `face!` fonts are `include_bytes!`-baked
# and `register_asset` loads them synchronously — those backends have
# no async loader. The WEB host (`host-web`) leaves it OFF: there
# `face!` emits a bundle *path*, the same `/fonts/*.ttf` the DOM
# backend serves, and host-web fetches it at runtime (see its `mount`).
# Keeping it off-by-default stops the feature from unifying ON across
# the whole wasm graph and double-paying for fonts (embedded + served).
embed-font-bytes = ["runtime-core/embed-font-bytes"]

[dependencies]
render-api = { workspace = true }
runtime-core = { workspace = true }
runtime-layout = { workspace = true }

# Wgpu pipelines + glyph atlas. No platform deps come along.
# `wgpu 29` is required for Blitz's vello renderer; bumping
# `glyphon` to 0.11 keeps it on the same wgpu major.
wgpu = "29"
glyphon = "0.11"

# Vertex / uniform buffer POD encoding.
bytemuck = { version = "1.18", features = ["derive"] }

# Logging — lightweight; the shell wires up an env_logger or similar.
log = "0.4"

# `Instant` / `Duration` shim. Identical to `std::time` on native;
# falls back to `performance.now()` on wasm32 (where `std::time::
# Instant::now()` panics). Used in `Host`, `Renderer`, animator, etc.
web-time = "1"

# Raster image decode for the `Image` primitive's textured-quad
# pipeline. Default features pull in 12+ formats; we trim to PNG
# + JPEG to keep the binary small. Add `webp`, `gif`, etc. when
# an app's content needs them.
image = { version = "0.25", default-features = false, features = [
    "png",
    "jpeg",
] }

# Block on async wgpu device-request + buffer-map during headless
# screenshot capture. Only pulled in by the `headless` feature — the
# windowed hosts drive their own event loop and don't need it.
pollster = { version = "0.4", optional = true }

