[package]
name = "idea-ui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Cross-platform UI component library for the idealyst framework"

[lib]
# `dylib` is emitted in addition to `rlib` so the AAS dylib hot-reload
# mode's patch dylib can link to idea-ui DYNAMICALLY instead of
# statically embedding it. The patch ends up an order of magnitude
# smaller (and dlopens an order of magnitude faster) — see the
# notes in `framework-core/Cargo.toml` for the wider architecture.
# Native backends still pick the `rlib` for static linking.
crate-type = ["rlib", "dylib"]

[features]
# Off by default. When on, every component's `*Props` gets a
# `DocControls` impl + supporting types that the idea-ui-docs app
# uses to auto-generate live control panels. Production apps that
# don't need reflective tooling leave this off — the derive
# expansion is dead code without it but a few hundred kilobytes of
# generated impls aren't free.
docs = ["dep:idea-ui-docs-derive"]

[dependencies]
framework-core = { workspace = true }
idea-ui-docs-derive = { workspace = true, optional = true }
