[package]
name = "idea-ui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Cross-platform UI component library for the idealyst framework"

[lib]
crate-type = ["rlib"]

[features]
# Off by default. When on, every component's `*Props` gets a
# `DocControls` impl + supporting types that the idea-ui-docs app
# uses to auto-generate live control panels. Production apps that
# don't need reflective tooling leave this off — the derive
# expansion is dead code without it but a few hundred kilobytes of
# generated impls aren't free.
docs = ["dep:idea-ui-docs-derive"]

# Off by default. When on, components forward an optional `test_id` prop to
# their root interactive primitive via `Element::with_test_id`, so a robot/
# E2E suite can locate them. Mirrors `runtime-core/robot`; production apps
# leave it off (the forwarding compiles out).
robot = ["runtime-core/robot"]

[dependencies]
runtime-core = { workspace = true }
idea-theme = { workspace = true }
idea-ui-docs-derive = { workspace = true, optional = true }
# Themed `Table` component layers on the cross-platform `table` SDK
# (real HTML `<table>` on web, flex passthrough on native). idea-ui
# wraps it the same way it wraps `activity_indicator` (as `Spinner`)
# and `toggle` (as `Switch`).
table = { workspace = true }
