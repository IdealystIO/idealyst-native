[package]
name = "run-roku"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Roku side-loader: zips a build-roku package directory, uploads it to a device in developer mode via the standard HTTP digest /plugin_install endpoint, and optionally tails the debug console on port 8085"

[lib]
crate-type = ["rlib"]

[dependencies]
anyhow = "1"
build-roku = { workspace = true }
