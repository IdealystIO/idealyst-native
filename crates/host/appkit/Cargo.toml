[package]
name = "host-appkit"
version.workspace = true
edition.workspace = true
license.workspace = true

# AppKit host shell for the `backend-macos` native backend.
#
# Owns the NSApplication boot, the top-level NSWindow + content
# view, the menu bar setup, and the run loop. Hands the backend a
# content NSView (`set_host_root`) and calls `framework_core::render`
# with the user's `app()` function.
#
# Mirrors `host-winit`'s role for the wgpu sim runtime — except this
# is a real native AppKit host, not a winit-driven custom-drawn
# window.

[lib]
crate-type = ["rlib"]

[dependencies]
framework-core = { workspace = true }
backend-macos = { workspace = true }
backend-apple-core = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = [
    "NSString",
    "NSObject",
    "NSGeometry",
    # MainThreadMarker::new() is gated on NSThread.
    "NSThread",
] }
objc2-app-kit = { version = "0.2", features = [
    "NSResponder",
    "NSView",
    "NSWindow",
    "NSApplication",
    "NSMenu",
    "NSMenuItem",
    "NSEvent",
    # Activation-policy + window-init signatures live behind these
    # additional features in objc2-app-kit 0.2.
    "NSRunningApplication",
    "NSGraphics",
] }
