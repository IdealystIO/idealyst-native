[package]
name = "host-wgpu-accesskit"
version.workspace = true
edition.workspace = true
license.workspace = true

# AccessKit bridge for the wgpu backend's parallel semantics tree.
#
# Consumes `Backend::dump_accessibility_tree()` + the wgpu-specific
# `drain_pending_announcements()` sibling method and projects them
# into the host platform's AX layer (UIA on Windows, AT-SPI on
# Linux, NSAccessibility on macOS, ARIA on web) via AccessKit. The
# bridge is a host-shell crate that example apps opt into; the
# framework core and the wgpu backend do not depend on it.
#
# `accesskit_winit` 0.33 pins `winit ^0.30.5`, matching the
# workspace winit 0.30 used by `host-winit`.

[dependencies]
framework-core = { workspace = true }
render-wgpu = { workspace = true }

accesskit = "0.24"
# `default-features = false` drops accesskit_unix's async-io
# dependency. Apps that want AT-SPI on Linux re-enable
# `accesskit_unix` (and pick an async runtime) at the binary
# crate. We keep the bridge runtime-agnostic.
accesskit_winit = { version = "0.33", default-features = false, features = ["rwh_06"] }
winit = { version = "0.30", features = ["rwh_06"] }
