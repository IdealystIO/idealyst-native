[package]
name = "build-runtime-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Generates and builds the runtime-server dev-host wrapper for a user project — a Rust binary that runs the project's `app()` against `dev-server::WireRecordingBackend` and serves the wire stream over a WebSocket."

[dependencies]
anyhow = "1"
# Reuses manifest parsing + workspace-root discovery so we don't
# reimplement them. The Manifest schema is the shared contract.
build-ios = { workspace = true }
# Mach-O / ELF symbol-table reader for the host bin symbol cache,
# and writer for the Mach-O stub object the hotpatch link consumes.
# `write` enables synthesizing TLV descriptors via the crate's
# Mach-O writer — without that we'd be emitting Mach-O bytes by
# hand, which is how the prior attempt's stub generator failed.
object = { version = "0.39", default-features = false, features = ["read", "write", "std"] }
# JumpTable + AddressMap. Constructed on the host side after each
# patch link and shipped over the host↔sidecar IPC for the sidecar
# to feed into `subsecond::apply_patch`.
subsecond-types = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# Temporary fixture directories for wrapper-generation regression
# tests. Used by `tests/sidecar_wrapper_shape.rs` to build a
# minimal in-memory project, run the wrapper generator against it,
# and assert on the emitted Cargo.toml without firing a cargo build.
tempfile = "3"
toml = "0.8"
