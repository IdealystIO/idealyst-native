[package]
name = "build-web"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Web build orchestration: generates an ephemeral cdylib wrapper around a user's app crate and drives wasm-pack to produce a .wasm + JS shim. Same pattern as build-ios / build-android."

[dependencies]
anyhow = "1"
build-ios = { workspace = true }
# `--gzip` support for `idealyst build --web`. Writes the bundle's
# files as gzipped bytes under their original filenames so a static
# host can serve them with `Content-Encoding: gzip`.
flate2 = { workspace = true }
# Emit `chunk_manifest.json` for the web Lazy primitive's runtime
# chunk URL lookup.
serde_json = "1"
# Vendored wasm-split toolchain. Called as a library (not a
# subprocess) so our patches apply automatically without users
# needing to install a separate binary on PATH.
wasm-split-cli = { workspace = true }
# Generates the favicon set (favicon.ico bundle + 192/512/180 PNGs)
# from `[package.metadata.idealyst.app.icon].source` during bundle
# staging. Build is a no-op when the icon block is absent.
icon-gen = { workspace = true }

[dev-dependencies]
tempfile = "3"
toml = "0.8"
