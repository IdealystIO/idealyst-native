<!DOCTYPE html><html><head><meta charset="utf-8"/><title>bindgen side + fmt-having main</title>
<!-- wasm-bindgen emits ES imports from "env"/"GOT.*" for a PIC module; we
     override those import objects ourselves, so map the bare specifiers to
     empty modules just so the glue loads. -->
<script type="importmap">
{ "imports": {
  "env": "data:text/javascript,",
  "GOT.func": "data:text/javascript,",
  "GOT.mem": "data:text/javascript,"
}}
</script>
</head><body><pre id="out">running…
</pre>
<div id="gpu-slot"></div>
<script type="module">
import * as sideGlue from "./sidebg_out/dynlink_side_bg.js";
const out = document.getElementById("out");
const log = (s) => { out.textContent += s + "\n"; };

// Parse a wasm module's name section (funcIdx -> name) + its active elem
// segment (position -> funcIdx) so we can map a self-defined symbol to the
// table slot the side's OWN elem segment places it at (= __table_base + pos).
// Emscripten resolves self-defined GOT.func this way; re-exporting the symbol
// instead yields a wasm-bindgen-wrapped fn with a mismatched call_indirect sig.
function sidePosByName(bytes) {
  const u8 = new Uint8Array(bytes);
  let o = 8; // magic + version
  const dec = new TextDecoder();
  const funcNames = new Map();
  let elemFuncs = null;
  const leb = () => { let r = 0, s = 0, b; do { b = u8[o++]; r |= (b & 0x7f) << s; s += 7; } while (b & 0x80); return r >>> 0; };
  while (o < u8.length) {
    const id = u8[o++], len = leb(), end = o + len;
    if (id === 0) {
      const nlen = leb(); const nm = dec.decode(u8.subarray(o, o + nlen)); o += nlen;
      if (nm === "name") {
        while (o < end) {
          const sub = u8[o++], sl = leb(), se = o + sl;
          if (sub === 1) { const cnt = leb(); for (let i = 0; i < cnt; i++) { const idx = leb(), l = leb(); funcNames.set(idx, dec.decode(u8.subarray(o, o + l))); o += l; } }
          o = se;
        }
      }
      o = end;
    } else if (id === 9) {
      const segs = leb();
      for (let s = 0; s < segs; s++) {
        const flags = leb();
        if (flags === 0) { while (u8[o] !== 0x0b) o++; o++; const cnt = leb(); const arr = []; for (let i = 0; i < cnt; i++) arr.push(leb()); if (!elemFuncs) elemFuncs = arr; }
        else break;
      }
      o = end;
    } else { o = end; }
  }
  const pos = new Map();
  if (elemFuncs) for (let p = 0; p < elemFuncs.length; p++) { const nm = funcNames.get(elemFuncs[p]); if (nm) pos.set(nm, p); }
  return pos;
}

try {
  const dir = "target/wasm32-unknown-unknown/release/";
  const mainMod = await WebAssembly.compile(await (await fetch(dir + "dynlink_main.wasm")).arrayBuffer());
  const sideBytes = await (await fetch("sidebg_out/dynlink_side_bg_bg.wasm")).arrayBuffer();
  const sideMod = await WebAssembly.compile(sideBytes);
  const posByName = sidePosByName(sideBytes);
  log("side elem entries: " + posByName.size);

  // main: non-bindgen, has the fmt machinery. Instantiate with {}.
  const main = await WebAssembly.instantiate(mainMod, {});
  main.exports.__wasm_call_ctors?.();
  main.exports.main_signal();              // init reactive + pull fmt statics live
  const ex = main.exports, mem = ex.memory, table = ex.__indirect_function_table;
  const g = (v, mut) => new WebAssembly.Global({ value: "i32", mutable: mut }, v);

  const glueImports = sideGlue.__wbg_get_imports(mem);

  const REGION = 8 * 1024 * 1024;
  const memoryBase = ex.host_reserve(REGION);
  const stackTop = memoryBase + REGION - 16;

  // Reserve the side's table region FIRST so self-defined GOT.func can be
  // resolved to __table_base + elem-position during the import loop. The
  // side's active elem segment places its own functions at [tableBase, ...).
  const tableBase = table.length;
  table.grow(Math.max(4096, posByName.size + 1024));

  const imports = {};
  const mainFuncDeferred = []; // GOT.func for MAIN-defined symbols (appended post-instantiate)
  let selfFunc = 0;
  for (const imp of WebAssembly.Module.imports(sideMod)) {
    const ns = (imports[imp.module] ??= {});
    const { name } = imp;
    if (imp.module === "./dynlink_side_bg_bg.js" || imp.module === "__wbindgen_placeholder__") {
      ns[name] = glueImports[imp.module]?.[name] ?? (() => { throw new Error("missing bindgen " + name); });
      continue;
    }
    if (imp.module === "env" && name === "memory") { ns.memory = mem; continue; }
    if (name === "__indirect_function_table") { ns[name] = table; continue; }
    if (name === "__memory_base") { ns[name] = g(memoryBase, false); continue; }
    if (name === "__table_base") { ns[name] = g(tableBase, false); continue; }
    if (name === "__stack_pointer") { ns[name] = g(stackTop, true); continue; }
    if (imp.module === "GOT.mem") { const a = ex[name]; ns[name] = a instanceof WebAssembly.Global ? g(a.value, true) : g(0, true); continue; }
    if (imp.module === "GOT.func") {
      const p = posByName.get(name);
      if (p !== undefined) {
        // SELF-DEFINED: the side's elem segment places the raw function at
        // __table_base + p. Point the GOT there (NOT a re-exported wrapper).
        ns[name] = g(tableBase + p, false);
        selfFunc++;
      } else {
        // MAIN-defined: append main's raw function after instantiation.
        const gl = g(0, true); ns[name] = gl; mainFuncDeferred.push([name, gl]);
      }
      continue;
    }
    ns[name] = g(0, true);
  }

  const side = await WebAssembly.instantiate(sideMod, imports);

  // Back-patch the non-elem GOT.func: prefer main's raw function; else the
  // side's own raw export (covers the wasm-bindgen-introduced symbols that
  // are defined+exported by the side but not address-placed in its elem).
  let toMain = 0, toSide = 0, miss = 0, missNames = [];
  for (const [name, gl] of mainFuncDeferred) {
    const fn = ex[name] ?? side.exports[name];
    if (typeof fn === "function") { const i = table.length; table.grow(1); table.set(i, fn); gl.value = i; (ex[name] ? toMain++ : toSide++); }
    else { miss++; if (missNames.length < 6) missNames.push(name); }
  }
  log(`GOT.func: self(elem)=${selfFunc} ->main=${toMain} ->side=${toSide} missing=${miss} ${miss?JSON.stringify(missNames):""}`);

  // CRITICAL: apply PIC data relocations + run ctors NOW that every GOT
  // global is set. This patches function pointers stored in data (TLS init
  // slots, fmt Arguments vtables, etc.). wasm-bindgen's __wbindgen_start does
  // NOT do this for a --shared module — the missing step is what made fmt /
  // thread_local call_indirects read unrelocated (wrong) pointers.
  side.exports.__wasm_apply_data_relocs?.();
  side.exports.__wasm_call_ctors?.();

  sideGlue.__wbg_finalize_init(side, sideMod);

  log("--- sidebg_signal (reactive in bindgen side): " + side.exports.sidebg_signal());
  log("--- sidebg_log_static (static-string web API):");
  sideGlue.sidebg_log_static();
  log("    ok");
  log("--- sidebg_log_fmt(42) (FORMAT! in bindgen side — the test):");
  sideGlue.sidebg_log_fmt(42);
  log("    format! OK");
  log("--- sidebg_make_view -> main_render_side (format!->Element):");
  const ptr = side.exports.sidebg_make_view();
  const r = main.exports.main_render_side(ptr);
  log("    main_render_side => texts=" + Math.trunc(r/1000) + " bytes=" + (r%1000));

  log("--- sidebg_make_canvas (wgpu-class: DOM + WebGL2 from the bindgen side):");
  const cres = sideGlue.sidebg_make_canvas();
  const canvas = document.querySelector("#gpu-slot #gpu-canvas");
  const hasGl = !!(canvas && canvas.getContext && canvas.getContext("webgl2"));
  log("    sidebg_make_canvas => " + cres + " (canvas in DOM: " + !!canvas + ", w=" + (canvas?canvas.width:"-") + ")");

  const ok = cres === 1 && !!canvas && canvas.width === 240;
  log(ok ? "WGPU-CLASS PASS ✓ a bindgen side created a WebGL2 canvas over the dynamic link"
         : "WGPU-CLASS FAIL (canvas result " + cres + ")");
  window.__RESULT__ = { ok, toMain, toSide, canvasResult: cres, canvasInDom: !!canvas };
} catch (e) {
  log("ERROR: " + (e && e.stack ? e.stack : e));
  window.__RESULT__ = { ok: false, error: String(e) };
}
</script></body></html>
