# A/B + wgpu-class repro: a BINDGEN side that uses format! AND real web-sys
# (DOM + WebGL2 canvas — the same bindgen object/externref machinery wgpu
# relies on), linked against the fmt-having non-bindgen main.
[package]
name = "dynlink-side-bg"
version = "0.0.0"
edition = "2021"
[lib]
name = "dynlink_side_bg"
crate-type = ["cdylib"]
[dependencies]
runtime-core = { path = "../../../runtime/core" }
dynlink-shared = { path = "../shared" }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "Window", "Document", "Element", "HtmlElement", "Node",
  "HtmlCanvasElement", "WebGl2RenderingContext",
] }
