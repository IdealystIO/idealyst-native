# Detached (empty [workspace]) demo app for `idealyst build --web`. Not a
# workspace member — builds standalone against the framework via path deps.
# The `lazy!` body does real web-sys (WebGL2 canvas) to prove arbitrary
# bindgen-heavy code splits + runs correctly via the dioxus splitter.
[workspace]

[package]
name = "dynsplit-demo"
version = "0.0.1"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { path = "../../../runtime/core" }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "Window", "Document", "Element", "HtmlCanvasElement", "WebGl2RenderingContext", "Node",
] }

[package.metadata.idealyst.app]
name      = "DynSplit Demo"
bundle_id = "ai.idealyst.dynsplit_demo"
version   = "0.0.1"
targets   = ["web"]
