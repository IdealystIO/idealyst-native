<!DOCTYPE html><html><head><meta charset="utf-8"/>
<!-- wasm-bindgen emits ES imports from "env"/"GOT.*" for a PIC module; we
     override those import objects ourselves, so map the bare specifiers to
     empty modules just so the glue loads. -->
<script type="importmap">
{ "imports": {
  "env": "data:text/javascript,",
  "GOT.func": "data:text/javascript,",
  "GOT.mem": "data:text/javascript,"
}}
</script>
</head><body><div id="app"></div>
<script type="module">
import * as sideGlue from "./bgout/bgside.js";

const dir = "bgtarget/wasm32-unknown-unknown/release/";
const mainMod = await WebAssembly.compileStreaming(fetch(dir + "bgmain.wasm"));
const sideMod = await WebAssembly.compileStreaming(fetch("bgout/bgside_bg.wasm"));

const main = await WebAssembly.instantiate(mainMod, {});
main.exports.__wasm_call_ctors?.();
main.exports.main_touch();
const ex = main.exports, mem = ex.memory, table = ex.__indirect_function_table;
const g = (v, mut) => new WebAssembly.Global({ value: "i32", mutable: mut }, v);

const glueImports = sideGlue.__wbg_get_imports(mem);   // bindgen funcs (use shared memory)

const REGION = 8 * 1024 * 1024;
const memoryBase = ex.host_reserve(REGION);
const stackTop = memoryBase + REGION - 16;

const imports = {};
const deferred = [];
for (const imp of WebAssembly.Module.imports(sideMod)) {
  const ns = (imports[imp.module] ??= {});
  const { name } = imp;
  if (imp.module === "./bgside_bg.js" || imp.module === "__wbindgen_placeholder__") {
    ns[name] = glueImports[imp.module]?.[name] ?? (() => { throw new Error("missing bindgen " + name); });
    continue;
  }
  if (imp.module === "env" && name === "memory") { ns.memory = mem; continue; }
  if (name === "__indirect_function_table") { ns[name] = table; continue; }
  if (name === "__memory_base") { ns[name] = g(memoryBase, false); continue; }
  if (name === "__table_base") { continue; }
  if (name === "__stack_pointer") { ns[name] = g(stackTop, true); continue; }
  if (imp.module === "GOT.mem") { const a = ex[name]; ns[name] = a instanceof WebAssembly.Global ? g(a.value, true) : g(0, true); continue; }
  if (imp.module === "GOT.func") {
    // Defer ALL: prefer the side's OWN copy of the function (code is
    // per-module; only state/GOT.mem must be shared), fall back to main.
    const gl = g(0, true); ns[name] = gl; deferred.push([name, gl]);
    continue;
  }
  ns[name] = g(0, true);
}
const tableBase = table.length; table.grow(2048);
(imports.env ??= {}).__table_base = g(tableBase, false);

const side = await WebAssembly.instantiate(sideMod, imports);
// Back-patch GOT.func: side's own copy first, else main's. Before __wbindgen_start.
let toSide = 0, toMain = 0, miss = 0;
for (const [name, gl] of deferred) {
  const fn = side.exports[name] ?? ex[name];
  if (typeof fn === "function") { const i = table.length; table.grow(1); table.set(i, fn); gl.value = i; (side.exports[name] ? toSide++ : toMain++); }
  else miss++;
}
console.log(`DYNLINK: GOT.func back-patched: side=${toSide} main=${toMain} missing=${miss}`);

sideGlue.__wbg_finalize_init(side, sideMod);
console.log("DYNLINK: calling side_hello(42) ...");
sideGlue.side_hello(42);
console.log("DYNLINK: side_hello returned OK");
</script></body></html>
