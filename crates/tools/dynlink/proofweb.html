<!DOCTYPE html><html><head><meta charset="utf-8"/><title>dynlink real-WebBackend DOM proof</title></head>
<body>
<div id="app"></div>
<div id="lazy-slot"></div>
<hr/>
<pre id="out">running…
</pre>
<script type="module">
// REAL WebBackend main (the actual DOM renderer) hosts a non-bindgen side
// and mounts the side-built UI into the real DOM (#lazy-slot) — the exact
// mechanism Primitive::Lazy uses on web.
import { boot, __wbg_get_imports, __wbg_finalize_init } from "./mainweb_out/dynlink_mainweb.js";
import { loadSide } from "./loader.mjs";

const out = document.getElementById("out");
const log = (s) => { out.textContent += s + "\n"; };

try {
  const imports = __wbg_get_imports();
  imports.__wbindgen_placeholder__ = {
    __wbindgen_describe: () => {},
    __wbindgen_describe_cast: () => {},
  };
  const mainMod = await WebAssembly.compileStreaming(
    fetch("./mainweb_out/dynlink_mainweb_bg.wasm"),
  );
  const inst = await WebAssembly.instantiate(mainMod, imports);
  const mainExports = __wbg_finalize_init(inst, mainMod);
  mainExports.__wasm_call_ctors?.();
  log("WebBackend main booted; main_signal=" + mainExports.main_signal());

  boot(); // mounts the "always loaded" shell into #app via real WebBackend
  log("#app after boot: " + JSON.stringify(document.querySelector("#app").textContent));

  const sideMod = await WebAssembly.compileStreaming(
    fetch("target/wasm32-unknown-unknown/release/dynlink_side.wasm"),
  );
  const { side, unresolved } = await loadSide({ exports: mainExports }, sideMod);
  log("unresolved imports : " + unresolved.length);

  const ptr = side.exports.side_make_view();
  mainExports.main_mount_side(ptr); // mounts side UI into #lazy-slot via real WebBackend

  // let any scheduler microtask / batched flush settle before reading the DOM
  await new Promise((r) => setTimeout(r, 100));

  const appText = document.querySelector("#app").textContent.trim();
  const slotText = document.querySelector("#lazy-slot").textContent.trim();
  log("#lazy-slot after side mount: " + JSON.stringify(slotText));

  const ok = unresolved.length === 0 &&
             appText.includes("main shell") &&
             slotText === "hello from side #7";
  log(ok ? "WEBBACKEND PASS ✓ real WebBackend mounted side-built UI into the live DOM"
         : "WEBBACKEND FAIL");
  window.__RESULT__ = { ok, unresolved: unresolved.length, unresolvedNames: unresolved, appText, slotText };
} catch (e) {
  log("ERROR: " + (e && e.stack ? e.stack : e));
  window.__RESULT__ = { ok: false, error: String(e) };
}
</script>
</body></html>
