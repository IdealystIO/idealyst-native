[package]
name = "idealyst-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Idealyst framework CLI — scaffold, dev-serve, build, and run idealyst apps"

# The package is `idealyst-cli` so `cargo install idealyst-cli` is
# discoverable, but the binary itself is `idealyst` — what users type.
[[bin]]
name = "idealyst"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# Cross-platform Ctrl-C handler. The `termination` feature widens
# the catch to SIGTERM (terminal window closed) and SIGHUP (parent
# shell exit) — without it, only SIGINT (literal Ctrl-C) triggered
# cleanup, leaking `welcome-runtime-server-host` processes every
# time the user dismissed the CLI any other way. SIGKILL still
# bypasses the handler; the dev-host has its own parent-PID
# watchdog for that case.
ctrlc = { version = "3", features = ["termination"] }
# Dev-mode infrastructure. Both crates are intentionally small and
# usable independently — `dev-http` for plain static serving,
# `dev-reload` for the watch+wasm-pack loop. The CLI is the wiring.
dev-http = { workspace = true }
dev-reload = { workspace = true }
# Platform-specific build orchestration. Each platform's pipeline
# is its own crate so the CLI's `build` and `run` commands stay thin.
build-ios = { workspace = true }
run-ios = { workspace = true }
build-runtime-server = { workspace = true }
build-android = { workspace = true }
run-android = { workspace = true }
build-roku = { workspace = true }
run-roku = { workspace = true }
build-sim = { workspace = true }
build-web = { workspace = true }
build-macos = { workspace = true }
build-ssr = { workspace = true }
run-macos = { workspace = true }
build-terminal = { workspace = true }
run-terminal = { workspace = true }
# Interactive panel for `idealyst dev --interactive`. Pulled in by the
# CLI only; the dev-tui crate dogfoods the framework's terminal
# backend to render a live build/run status + log stream.
dev-tui = { workspace = true }
# Generates favicon / app-icon assets from a single SVG (or PNG)
# source declared in `[package.metadata.idealyst.app.icon]`. Driven
# by the `sync icons` subcommand and, eventually, build-time auto-
# sync hooks in the per-platform build crates.
icon-gen = { workspace = true }
# Relative-path computation for the `icon preview` HTML
# (`<img src="web/favicon.ico">` references resolved against the
# HTML's location). Tiny dep; no transitive heft.
pathdiff = "0.2"
# Roku BrightScript transpiler — powers the `brs` subcommand, which
# scans the project's source files for `#[method]`-tagged fns and
# concatenates their BrightScript output into a single `.brs` file.
backend-roku-transpile = { workspace = true }
syn = { version = "2", features = ["full"] }

# `mcp` subcommand — uses the same server crate as `mcp-demo`. The
# CLI is just the entry point that picks options and hands them off.
# Note: the CLI itself has no `#[component]` definitions, so its
# catalog is empty on its own — the value is being the wired-up
# launcher rather than a different server. (The user's app, when
# it depends on runtime-core/mcp, populates the inventory.)
mcp-server = { workspace = true }
mcp-catalog = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# setrlimit(RLIMIT_AS) for the default process-level memory cap (see
# `memory_limit.rs`). Already pulled in transitively by many deps;
# named explicitly because the CLI itself calls into it.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
