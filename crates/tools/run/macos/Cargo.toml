[package]
name = "run-macos"
version.workspace = true
edition.workspace = true
license.workspace = true

# macOS launcher for `idealyst run --macos` / `idealyst dev --macos`.
#
# Calls `build-macos` to produce the binary, then spawns it as a
# foreground child (stdio inherited so framework logs surface
# alongside the CLI's). Exits when the user quits the app.

[dependencies]
anyhow = "1"
build-macos = { workspace = true }
build-ios = { workspace = true }
# When `[package.metadata.idealyst.app.icon]` is configured, the
# bare binary gets wrapped in a `<App>.app` bundle with Info.plist +
# `Resources/AppIcon.icns`. icon-gen produces the .icns; this crate
# handles the layout. Without an icon block, the historical bare-
# binary launch path stays in place.
icon-gen = { workspace = true }
