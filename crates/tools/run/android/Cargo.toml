[package]
name = "run-android"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Build and launch an idealyst Android app on emulator or device without Gradle — compiles Java with javac, DEXes with d8, packages via aapt2, signs via apksigner, installs via adb."

[dependencies]
anyhow = "1"
build-android = { workspace = true }
build-ios = { workspace = true }
serde_json = "1"
# Generates `mipmap-*dpi/ic_launcher.png` (and the round variants)
# from `[package.metadata.idealyst.app.icon]`. The output is then
# compiled to a `.flata` via `aapt2 compile --dir` and passed to
# `aapt2 link -R` alongside the AAR-derived flats.
icon-gen = { workspace = true }
