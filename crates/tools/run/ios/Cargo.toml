[package]
name = "run-ios"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Build and launch an idealyst app on iOS. Simulator path compiles Swift directly via swiftc + simctl (no Xcode project); device path (`device` module) generates a signed .app via a self-written pbxproj + xcodebuild auto-provisioning and installs with ios-deploy."

[dependencies]
anyhow = "1"
build-ios = { workspace = true }
# Generates the .app's icon PNGs (AppIcon{20,29,40,60,76}x{pt}@2x/@3x
# + AppIcon-1024) from `[package.metadata.idealyst.app.icon]` and
# returns the entry list this crate splices into Info.plist's
# CFBundleIcons block. No-op when the icon block is absent.
icon-gen = { workspace = true }
# Parses `cargo metadata` JSON to derive the linked Apple frameworks from the
# dep graph (each SDK declares `[package.metadata.idealyst.ios].frameworks`).
serde_json = "1"
