[package]
name = "robot-test-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "The `#[robot_test]` attribute macro — turns a Rust function that drives an `App` over the Robot relay into a standard `#[test]`, so the same suite runs under plain `cargo test` and under `idealyst test` (which prepares the relay + app first)."

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
