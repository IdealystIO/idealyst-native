[package]
name = "dev-http"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Static-file HTTP server for `idealyst dev` — single-threaded, sync, with livereload coordination hooks"

[dependencies]
anyhow = "1"
# Sync HTTP server. Tiny, no async runtime, no TLS — appropriate for
# a dev-mode static-file server bound to loopback or LAN.
tiny_http = "0.12"
# Source of the `ReloadSignal` (generation counter + condvar) we
# stream over SSE. `dev-reload` is the producer; we're the transport.
dev-reload = { workspace = true }
# Shared HTML-augmentation helpers — `font_preload_tags` +
# `inject_into_head`. Same fn calls `build-web`'s `stage_bundle` uses
# so dev-mode HTML responses and the staged bundle ship the same set
# of preload tags from the same TOML list.
build-ios = { workspace = true }
