[package]
name = "wire"
version.workspace = true
edition.workspace = true
license.workspace = true

# Pure data crate: defines the dev-mode hot-reload wire protocol.
# Carries no runtime-core dependency so the wire format can evolve
# independently of in-memory representation.

[dependencies]
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"

[dev-dependencies]
# Used by the round-trip integration test (tests/roundtrip.rs) that
# exercises the dev-side recorder + app-side replay engine against a
# stand-in TraceBackend. `robot` is enabled so `Primitive::View`'s
# `test_id` field is present — keeps the test source identical
# whether we build standalone or as part of the workspace (the
# workspace's feature unification pulls `runtime-core/robot` in via
# `dev-server`'s dev-deps anyway).
runtime-core = { workspace = true, features = ["robot"] }
dev-client = { workspace = true, features = ["dev-hot-reload"] }
# `connect_and_run` lives here (moved from dev-client). tests/transport.rs
# exercises it against a TraceBackend.
runtime-server-shell-native = { workspace = true, features = ["runtime-server"] }
dev-server = { workspace = true }
# Used by tests/transport.rs to open the WebSocket directly so it can
# run the read loop on this thread (the WireBackend isn't Send).
tungstenite = { version = "0.24", default-features = false, features = ["handshake"] }
