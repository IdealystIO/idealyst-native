[package]
name = "runtime-server-shell-native"
version.workspace = true
edition.workspace = true
license.workspace = true

# Native-target transport + worker shell for the runtime-server
# dev-client. Pulls `tungstenite` (sync blocking WebSocket). Compiles
# on every non-wasm target — iOS, Android, desktop — so this crate
# is the shared native runtime-server-shell impl that backends pick up
# via their `runtime-server` feature.
#
# The dev-server URL is baked into the wrapper build via
# `IDEALYST_DEV_ENDPOINT` (set by the CLI at `idealyst dev` time); the
# shell does not discover anything itself.
#
# Web targets have their own runtime-server-shell implementation living in
# `backend-web` (it uses `web_sys::WebSocket` and reads the page-
# injected `window.IDEALYST_RUNTIME_SERVER_URL`).

[lib]
path = "src/lib.rs"

[features]
default = []
# Opt-in compile of the shell. Without this feature the crate is a
# pure metadata declaration — the platform deps are gated behind
# `dep:` activations in the feature list. Backends activate it via
# their own `runtime-server` feature.
runtime-server = ["dep:tungstenite", "dev-client/dev-hot-reload"]

[dependencies]
runtime-core = { workspace = true }
dev-client = { workspace = true }
wire = { workspace = true }
serde_json = "1"

# Sync blocking transport. Acceptable on native because each
# backend dedicates a worker thread to the dev-client read loop.
tungstenite = { version = "0.24", default-features = false, features = ["handshake"], optional = true }
