[package]
name = "native-parity"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Cross-platform render-parity model + diff over the `introspect_native` robot verb. Lean (serde only): deserializes the verb's wire payload, walks an element tree into a path-keyed capture, and diffs two captures' canonical props with per-type tolerance. Shared by the `robot-test` harness and the MCP server's parity tools so the comparison logic lives once."

[lib]
crate-type = ["rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
