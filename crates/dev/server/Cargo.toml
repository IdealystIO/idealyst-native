[package]
name = "dev-server"
version.workspace = true
edition.workspace = true
license.workspace = true

# Dev-side runtime for the hot-reload wire protocol. Provides a
# `WireRecordingBackend` that implements `framework_core::Backend`
# with `Node = NodeId`, recording each walker call as a `Command`
# for transport to the app.
#
# This crate runs on the developer's machine, never inside the
# shipped app binary.

[features]
# Enables the in-process Robot TCP bridge on the dev server. When
# on, `serve_with_robot_bridge(...)` is available ‚Äî it polls a
# `BridgeHandle` once per tick on the same thread that owns the
# walker's reactive scope, so click / find / invoke_method commands
# from an external MCP proxy hit the *server's* registry (which is
# where the walker registered the elements in AAS mode). Forwards
# to `framework-core/robot` so the registry actually populates.
#
# Native app builds run their bridge in-process on the device, not
# here ‚Äî server-side is for AAS-shell mode where the device has no
# walker and therefore no registry of its own. AAS clients are
# platform-agnostic; this server can drive any of them.
robot = ["framework-core/robot"]

[dependencies]
framework-core = { workspace = true }
wire = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Sync WebSocket server. `default-features = false` drops the rustls
# stack ‚Äî dev mode is loopback or LAN, no TLS needed.
tungstenite = { version = "0.24", default-features = false, features = ["handshake"] }
# File-watch + debounce for the auto-rebuild loop. Used only on the
# dev side; never ships into an app binary.
notify-debouncer-mini = { version = "0.4", default-features = false }
# Pure-Rust mDNS / DNS-SD ("Bonjour") so the dev-server can advertise
# itself on the local network. Cross-platform (Mac/Linux/Windows).
# Clients (iOS app, browser tools) browse for `_idealyst-dev._tcp`
# and pick the entry whose TXT record matches their app_id ‚Äî that's
# how a freshly launched / restarted dev-server is found without
# hard-coding host:port into the app binary.
mdns-sd = { version = "0.10", default-features = false }

[dev-dependencies]
# Used by the `dump_wire` example to pretty-print the captured
# command stream as JSON.
serde_json = "1"
# The integration tests under `tests/aas_headless.rs` need the
# framework's Robot registry populated by the walker. Enabling
# `framework-core/robot` as a dev-dep activates that codepath only
# for `cargo test` ‚Äî the production builds of dev-server still
# choose to enable `robot` via *our* feature, see `[features]` above.
framework-core = { workspace = true, features = ["robot"] }
framework-theme = { workspace = true }
