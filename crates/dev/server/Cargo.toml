[package]
name = "dev-server"
version.workspace = true
edition.workspace = true
license.workspace = true

# Dev-side runtime for the hot-reload wire protocol. Provides a
# `WireRecordingBackend` that implements `runtime_core::Backend`
# with `Node = NodeId`, recording each walker call as a `Command`
# for transport to the app.
#
# This crate runs on the developer's machine, never inside the
# shipped app binary.

[features]
# Enables the in-process Robot TCP bridge on the dev server. When
# on, `serve_with_robot_bridge(...)` is available — it polls a
# `BridgeHandle` once per tick on the same thread that owns the
# walker's reactive scope, so click / find / invoke_method commands
# from an external MCP proxy hit the *server's* registry (which is
# where the walker registered the elements in runtime-server mode). Forwards
# to `runtime-core/robot` so the registry actually populates.
#
# Native app builds run their bridge in-process on the device, not
# here — server-side is for runtime-server-shell mode where the device has no
# walker and therefore no registry of its own. runtime-server clients are
# platform-agnostic; this server can drive any of them.
robot = ["runtime-core/robot"]

# Enables `dev_server::test_support` — a `MockClient` plus helpers for
# driving the fake-sidecar IPC. Off by default; integration tests in
# *this* crate get it automatically through `cfg(test)`. Downstream
# crates that want to assemble their own end-to-end tests against the
# dev-server transport pull this feature in via dev-deps.
test-support = []

# Pulls in the runtime-server dev runtimes — `host::run` (long-lived dev-host
# process) and `sidecar::run` (per-project worker that links the user
# crate). Enables both because both modules share most deps
# (`subsecond-types`, `anyhow`, `serde_json`-only-tighter-binding), and
# splitting them just so the host wrapper can skip `dev-hot` /
# `libc` saves single-digit KB of link time. Off for any consumer
# that only wants the dev-side recorder / transport — those callers
# stay anyhow-free + don't drag subsecond through their build.
runtime-server = ["dep:dev-hot", "dep:subsecond-types", "dep:libc", "dep:anyhow", "dep:ctrlc", "dep:tokio", "dep:pollster", "runtime-core/async-driver"]

# Registers a `"screenshot"` Robot-bridge verb in each runtime-server
# session so Robot / the MCP server can rasterize the (mocked) app's
# current scene to a PNG headlessly. Pulls the `headless-screenshot`
# leaf crate (→ render-wgpu/wgpu, compiled once for the workspace).
# Implies `runtime-server` (the verb lives in the sidecar session loop)
# and `robot` (the bridge it registers on). The generated sidecar build
# enables this; the lightweight recorder/transport consumers don't.
screenshot = ["dep:headless-screenshot", "dep:base64", "runtime-server", "robot"]

[dependencies]
runtime-core = { workspace = true }
wire = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Scene → PNG bridge + the Robot `"screenshot"` verb. Optional, pulled
# in only by the `screenshot` feature (drags render-wgpu/wgpu). Leaf
# crate; depends on neither dev-server nor mock-backend, so no cycle.
headless-screenshot = { workspace = true, optional = true }

# Base64-encodes the captured PNG for the `screenshot` verb's JSON
# response. Optional — pulled in only by the `screenshot` feature.
base64 = { version = "0.22", optional = true }

# Activated by the `sidecar-runtime` feature. `dev-hot` is the
# subsecond facade — exposes `apply_patch(JumpTable)`. We pick up the
# `hot` and `diff` features so the sidecar can both install patches
# and validate them against its own symbol table before applying.
dev-hot = { workspace = true, features = ["hot", "diff"], optional = true }
# JumpTable type carried in `SidecarIn::ApplyPatch.table_json`. The
# host produces it (in `build-runtime-server::hotpatch`); the sidecar
# deserializes + hands it to `dev-hot`.
subsecond-types = { version = "0.7", optional = true }
# `libc::dlsym(RTLD_DEFAULT, "main")` — the sidecar reports its own
# `main` runtime address to the host so the host can compute the
# ASLR slide for symbol-table diffs.
libc = { version = "0.2", optional = true }
# Signal handling on the runtime-server host: SIGINT (Ctrl-C), SIGTERM (the
# dev orchestrator's `child.kill()`), and SIGHUP (terminal close)
# all need to trigger sidecar teardown before the host exits, or
# the sidecar reparents to PID 1 and orphans. Default ctrlc only
# catches SIGINT; the `termination` feature adds TERM+HUP.
ctrlc = { version = "3", features = ["termination"], optional = true }
# Used by `dev_server::host` for the hot-patch fallback path (Err
# triggers SIGKILL-and-respawn). Optional so the recorder/transport
# consumers stay anyhow-free.
anyhow = { version = "1", optional = true }
# Sync WebSocket server. `default-features = false` drops the rustls
# stack — dev mode is loopback or LAN, no TLS needed.
tungstenite = { version = "0.24", default-features = false, features = ["handshake"] }
# File-watch + debounce for the auto-rebuild loop. Used only on the
# dev side; never ships into an app binary.
notify-debouncer-mini = { version = "0.4", default-features = false }

# Tokio current-thread runtime for the AAS session thread's async
# executor (`async_executor.rs`). The desktop `net` transport is reqwest
# (→ `tokio::net::TcpStream`), which panics with "no reactor running"
# unless app-initiated futures are driven inside a Tokio runtime context.
# Optional — pulled in only by the `runtime-server` (sidecar) feature.
# `rt` + `net` + `time` give a current-thread runtime with the I/O reactor
# and timer driver reqwest needs; `io-util` covers reqwest's stream body.
tokio = { version = "1", features = ["rt", "net", "time", "io-util"], optional = true }
# Reentrant `spawn_async` fallback in the sidecar async executor (a
# `block_on` already on the stack can't start a second Tokio runtime).
# Optional — pulled in only by `runtime-server`.
pollster = { version = "0.3", optional = true }

[dev-dependencies]
# Used by the `dump_wire` example to pretty-print the captured
# command stream as JSON.
serde_json = "1"
# The integration tests under `tests/aas_headless.rs` need the
# framework's Robot registry populated by the walker. Enabling
# `runtime-core/robot` as a dev-dep activates that codepath only
# for `cargo test` — the production builds of dev-server still
# choose to enable `robot` via *our* feature, see `[features]` above.
runtime-core = { workspace = true, features = ["robot"] }
idea-ui = { workspace = true }
# `tests/runtime_server_shell_e2e.rs` drives the *real* native
# runtime-server client shell (the worker-thread WebSocket transport +
# `RuntimeServerShell::drain`) against this crate's loopback dev-server,
# so the end-to-end "app connects, snapshots, replays, reconnects"
# path is guarded. `runtime-server` activates the tungstenite worker.
# No dependency cycle: the shell crate depends on dev-client/wire/
# runtime-core, never on dev-server.
runtime-server-shell-native = { workspace = true, features = ["runtime-server"] }
# `tests/aas_async_reactor.rs` stands up a loopback TCP listener and
# drives a `tokio::net::TcpStream` through `spawn_async` to prove the
# session-thread async executor provides a reactor (the E2 regression).
# `rt-multi-thread` is only for the test's own listener task; the code
# under test uses the crate's current-thread runtime.
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "io-util", "macros", "time"] }

# E2 regression: app-initiated async work on an AAS session thread must
# run inside a Tokio reactor (the executor in `src/async_executor.rs`),
# not on a bare reactor-less thread. Only meaningful when the sidecar's
# async machinery is compiled in.
[[test]]
name = "aas_async_reactor"
required-features = ["runtime-server"]
