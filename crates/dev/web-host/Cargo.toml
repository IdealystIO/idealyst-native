[package]
name = "web-dev-host"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Dev-time HTTP host for web bundles. Serves static files + injects the dev-server URL read from a port-file sentinel."

# Replaces the per-example `serve.py` scripts. Architecturally separate
# from the runtime-server dev-server itself: the dev-server owns the wire
# WebSocket and writes its bound port to a sentinel file; this binary
# owns the bundle delivery and reads the sentinel to inject
# `window.IDEALYST_RUNTIME_SERVER_URL` into served HTML.

[[bin]]
name = "web-dev-host"
path = "src/main.rs"

[dependencies]
anyhow = "1"
dev-http = { workspace = true }
