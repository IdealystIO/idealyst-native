[package]
name = "dev-reload"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Watch + wasm-pack rebuild loop for `idealyst dev` reload mode"

[dependencies]
anyhow = "1"
# File-watch + debounce. Same crate `dev-server` uses for its AAS
# rebuild loop — keeps the workspace from carrying two debouncers.
notify-debouncer-mini = { version = "0.4", default-features = false }
