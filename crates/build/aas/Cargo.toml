[package]
name = "build-aas"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Generates and builds the AAS dev-host wrapper for a user project — a Rust binary that runs the project's `app()` against `dev-server::WireRecordingBackend` and serves the wire stream over a WebSocket."

[dependencies]
anyhow = "1"
# Reuses manifest parsing + workspace-root discovery so we don't
# reimplement them. The Manifest schema is the shared contract.
build-ios = { workspace = true }
# Mach-O / ELF symbol-table parser. Used to snapshot the host
# bin's defined symbols after the initial fat build so subsequent
# patch links can resolve undefined refs by absolute address.
object = { version = "0.39", default-features = false, features = ["read", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
