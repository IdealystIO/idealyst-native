[package]
name = "render-wgpu"
version.workspace = true
edition.workspace = true
license.workspace = true

# Wgpu renderer + interaction host. The platform-agnostic half of
# the desktop-preview stack.
#
# Implements `framework_core::Backend` for `WgpuBackend`, owns the
# tween engine, the interaction `Host`, and a wgpu-bound
# `Renderer`. **No winit, no event-loop, no browser deps** ŌĆö those
# live in the host shells (`host-winit`, future `host-web`).

[features]
# Heavy primitives are feature-gated. Each gate is on by default
# so apps that don't opt out get the full simulator; binary-size-
# conscious downstreams can drop any combination via
# `default-features = false, features = ["ŌĆ”"]`. Follow-up:
# `video` and `audio` are still always-on (no `dep:`-style
# wiring yet) ŌĆö retrofit as a small dedicated pass.
default = ["webview"]
async-driver = ["framework-core/async-driver"]
# The `webview` feature pulls in Blitz (HTML/CSS), anyrender's
# GPU-vello renderer, the network provider, tokio (for the
# per-WebView fetch thread), and `url`. Without it, the
# WebView primitive falls back to the "Unsupported" placeholder.
webview = [
    "dep:blitz-dom",
    "dep:blitz-html",
    "dep:blitz-net",
    "dep:blitz-paint",
    "dep:blitz-traits",
    "dep:anyrender",
    "dep:anyrender_vello",
    "dep:peniko",
    "dep:tokio",
    "dep:url",
    "dep:reqwest",
]

[dependencies]
render-api = { workspace = true }
framework-core = { workspace = true }
native-layout = { workspace = true }

# Wgpu pipelines + glyph atlas. No platform deps come along.
# `wgpu 29` is required for Blitz's vello renderer; bumping
# `glyphon` to 0.11 keeps it on the same wgpu major.
wgpu = "29"
glyphon = "0.11"

# Vertex / uniform buffer POD encoding.
bytemuck = { version = "1.18", features = ["derive"] }

# Logging ŌĆö lightweight; the shell wires up an env_logger or similar.
log = "0.4"

# `Instant` / `Duration` shim. Identical to `std::time` on native;
# falls back to `performance.now()` on wasm32 (where `std::time::
# Instant::now()` panics). Used in `Host`, `Renderer`, animator, etc.
web-time = "1"

# Raster image decode for the `Image` primitive's textured-quad
# pipeline. Default features pull in 12+ formats; we trim to PNG
# + JPEG to keep the binary small. Add `webp`, `gif`, etc. when
# an app's content needs them.
image = { version = "0.25", default-features = false, features = [
    "png",
    "jpeg",
] }

# Video primitive backing. `openh264` bundles Cisco's C++ source
# via build.rs (no system FFmpeg dep at runtime); `re_mp4` is a
# pure-Rust MP4 container demuxer. Together they let us play
# H.264 mp4 files in the wgpu preview ŌĆö the native targets (iOS,
# Android, Web) keep using their OS-level players for parity.
# Phase 1 covers H.264 only; HEVC / AV1 mp4 files surface a
# "codec not supported" placeholder until we ship more decoders.
openh264 = "0.9"
re_mp4 = "0.5"

# Audio subsystem. `cpal` opens a cross-platform output stream
# (CoreAudio / WASAPI / ALSA / AAudio / WebAudio) with no extra
# system deps beyond what the OS ships. `symphonia` is the
# pure-Rust media decoder ŌĆö its `aac` codec handles the audio
# track of an H.264 mp4, and the format readers cover `mp3`,
# `wav`, `flac`, `ogg`, `aac` for the standalone `audio(src)`
# primitive. We only enable the codecs / formats we ship.
cpal = "0.15"
symphonia = { version = "0.5", default-features = false, features = [
    "aac",
    "mp3",
    "flac",
    "vorbis",
    "ogg",
    "wav",
    "isomp4",
] }

# WebView primitive backing ŌĆö Blitz, Dioxus Labs' pure-Rust
# HTML/CSS engine. No system WebView dep, matching the
# openh264/symphonia philosophy. We pull `anyrender_vello`
# (GPU vello, also wgpu 29) so Blitz renders directly into a
# texture on *our* wgpu device; the renderer's pre-pass then
# composites that texture via the standard image pipeline.
# Every dep here is feature-gated; turn off `webview` to drop
# them all and fall back to the "Unsupported" placeholder.
blitz-dom    = { version = "0.3.0-alpha.4", optional = true }
blitz-html   = { version = "0.3.0-alpha.4", optional = true }
blitz-net    = { version = "0.3.0-alpha.4", optional = true }
blitz-paint  = { version = "0.3.0-alpha.4", optional = true }
blitz-traits = { version = "0.3.0-alpha.4", optional = true }
anyrender = { version = "0.10", optional = true }
anyrender_vello = { version = "0.10", optional = true }
peniko = { version = "0.6", optional = true }
# The initial HTML GET. Blitz's `Provider` only handles
# sub-resource fetches; the screenshot example fetches the top
# document itself via reqwest, and we follow the same pattern.
# `default-features = false` drops the gzip/brotli/json bag.
reqwest = { version = "0.13", default-features = false, optional = true, features = [
    "default-tls",
] }
# Per-WebView fetch thread runs a small tokio runtime because
# `blitz-net::Provider` is async. Single-thread `rt` flavor
# keeps the binary footprint reasonable.
tokio = { version = "1.42", default-features = false, optional = true, features = [
    "rt",
    "macros",
    "sync",
    "time",
] }
url = { version = "2.5", optional = true }
