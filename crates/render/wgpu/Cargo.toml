[package]
name = "render-wgpu"
version.workspace = true
edition.workspace = true
license.workspace = true

# Wgpu renderer + interaction host. The platform-agnostic half of
# the desktop-preview stack.
#
# Implements `framework_core::Backend` for `WgpuBackend`, owns the
# tween engine, the interaction `Host`, and a wgpu-bound
# `Renderer`. **No winit, no event-loop, no browser deps** — those
# live in the host shells (`host-winit`, future `host-web`).

[features]
default = []
async-driver = ["framework-core/async-driver"]

[dependencies]
render-api = { workspace = true }
framework-core = { workspace = true }
native-layout = { workspace = true }

# Wgpu pipelines + glyph atlas. No platform deps come along.
wgpu = "22"
glyphon = "0.6"

# Vertex / uniform buffer POD encoding.
bytemuck = { version = "1.18", features = ["derive"] }

# Logging — lightweight; the shell wires up an env_logger or similar.
log = "0.4"

# `Instant` / `Duration` shim. Identical to `std::time` on native;
# falls back to `performance.now()` on wasm32 (where `std::time::
# Instant::now()` panics). Used in `Host`, `Renderer`, animator, etc.
web-time = "1"

# Raster image decode for the `Image` primitive's textured-quad
# pipeline. Default features pull in 12+ formats; we trim to PNG
# + JPEG to keep the binary small. Add `webp`, `gif`, etc. when
# an app's content needs them.
image = { version = "0.25", default-features = false, features = [
    "png",
    "jpeg",
] }

# Video primitive backing. `openh264` bundles Cisco's C++ source
# via build.rs (no system FFmpeg dep at runtime); `re_mp4` is a
# pure-Rust MP4 container demuxer. Together they let us play
# H.264 mp4 files in the wgpu preview — the native targets (iOS,
# Android, Web) keep using their OS-level players for parity.
# Phase 1 covers H.264 only; HEVC / AV1 mp4 files surface a
# "codec not supported" placeholder until we ship more decoders.
openh264 = "0.9"
re_mp4 = "0.5"
