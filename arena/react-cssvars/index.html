<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arena · React (idiomatic: CSS variables)</title>
<style>
  /*
   * Idiomatic React: theme is expressed as CSS custom properties on
   * the root. Toggle = one className flip on <html>. React commits a
   * single attribute change; the 1000 rows are untouched. The CSS
   * cascade carries the work and the GPU paints the transition.
   *
   * Compare against ../react-naive/ to see what `useState(theme)` +
   * per-row inline styles costs in re-render cycles. The rendered
   * result is identical; the cost profile is not.
   */
  :root {
    --bg:          #f7f7fb;
    --surface:     #ffffff;
    --surface-alt: #eef0f7;
    --text:        #1a1a1f;
    --border:      #e4e6ef;
    --primary:     #5b6cff;
    --primary-text:#ffffff;
  }
  :root.dark {
    --bg:          #0f1115;
    --surface:     #1a1d24;
    --surface-alt: #262a35;
    --text:        #e8eaf0;
    --border:      #2a2e3a;
    --primary:     #8b9aff;
    --primary-text:#0f1115;
  }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }

  .page {
    display: flex; flex-direction: column;
    padding: 32px; gap: 24px; min-height: 100%;
    background: var(--bg); color: var(--text);
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  .controls {
    display: flex; flex-direction: row;
    gap: 16px; align-items: center;
    padding: 8px 16px; border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  .controls button {
    padding: 4px 16px; border-radius: 6px;
    font-weight: 600; font-size: 12px; letter-spacing: 0.5px;
    border: 0; cursor: pointer;
    background: var(--primary); color: var(--primary-text);
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  #stats { font-size: 13px; font-variant-numeric: tabular-nums; opacity: 0.85; }
  .rows-input {
    width: 90px; padding: 4px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-size: 13px; font-variant-numeric: tabular-nums;
  }
  .rows-label { font-size: 13px; opacity: 0.7; }

  .perf-list {
    display: flex; flex-direction: column;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    height: 500px; overflow: hidden; overflow-y: auto;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  .row {
    display: flex; flex-direction: column;
    color: var(--text);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; height: 36px; justify-content: center;
    transition:
      background 250ms ease-in-out,
      color 250ms ease-in-out,
      border-bottom-color 250ms ease-in-out;
  }
  .row.even { background: var(--surface); }
  .row.odd  { background: var(--surface-alt); }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1?dev",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev&deps=react@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useCallback, useEffect, useRef, memo } from 'react';
import { createRoot } from 'react-dom/client';
import { flushSync } from 'https://esm.sh/react-dom@18.3.1?dev&deps=react@18.3.1';
import { runToggle, runSuite } from '../instrument.js';

const e = React.createElement;

// Row is memoized — but more importantly, its props NEVER change after
// mount. The whole point of the CSS-variable approach is that rows
// don't need to be re-rendered when the theme flips.
//
// Text wrapped in a <span> to match the idealyst-native DOM shape.
// See react-naive/index.html for the rationale.
const Row = memo(function Row({ index }) {
  return e('div',
    { className: 'row ' + (index % 2 === 0 ? 'even' : 'odd') },
    e('span', null, `Row #${index}`),
  );
});

function App() {
  const [isDark, setIsDark] = useState(false);
  const [rowCount, setRowCountState] = useState(1000);
  const [running, setRunning] = useState(false);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  const onToggle = useCallback(() => {
    const next = !isDark;
    runToggle(() => {
      // flushSync to keep the React commit inside the apply window,
      // same as react-naive — even though here the commit is trivial
      // (one className on <html> via the effect).
      flushSync(() => setIsDark(next));
    }, { theme: next ? 'dark' : 'light', rows: rowCount });
  }, [isDark, rowCount]);

  const onStart = useCallback(async () => {
    setRunning(true);
    try {
      await runSuite({
        // `flushSync` keeps the rebuild commit synchronous inside
        // the suite's measurement window — without it, React 18
        // would batch the update and the rebuild would land after
        // `apply` closed.
        setRows: async (n) => {
          flushSync(() => setRowCountState(n));
        },
        resultsEl: document.getElementById('results'),
      });
    } finally {
      setRunning(false);
    }
  }, []);

  // Rows are memoized per row count. They still never re-render on
  // theme toggle because the CSS-variable approach keeps the rows'
  // own props stable.
  const rows = React.useMemo(
    () => Array.from({ length: rowCount }, (_, i) => e(Row, { key: i, index: i })),
    [rowCount]
  );

  return e('div', { className: 'page' },
    e('div', { className: 'controls' },
      e('button', { onClick: onToggle }, 'Toggle theme'),
      e('button', { onClick: onStart, disabled: running },
        running ? 'Running…' : 'Start test',
      ),
      e('span', { id: 'stats' }, 'Click toggle to measure, or Start test to run the suite'),
    ),
    e('div', { className: 'perf-list' }, rows),
    e('div', { id: 'results', style: { padding: '0 32px 32px' } }),
  );
}

createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
