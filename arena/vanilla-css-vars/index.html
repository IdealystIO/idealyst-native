<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arena · vanilla CSS variables</title>
<style>
  /*
   * Theoretical ceiling: theme toggle = one className flip on <html>.
   * No per-row work, no class minting. Browser interpolates everything
   * itself via CSS custom property inheritance + transitions.
   *
   * This is what any framework's best-case theme switch would look like
   * if it could express "swap a few CSS variables at the root and let
   * the cascade do the rest."
   */
  :root {
    --bg:          #f7f7fb;
    --surface:     #ffffff;
    --surface-alt: #eef0f7;
    --text:        #1a1a1f;
    --border:      #e4e6ef;
    --primary:     #5b6cff;
    --primary-text:#ffffff;
  }
  :root.dark {
    --bg:          #0f1115;
    --surface:     #1a1d24;
    --surface-alt: #262a35;
    --text:        #e8eaf0;
    --border:      #2a2e3a;
    --primary:     #8b9aff;
    --primary-text:#0f1115;
  }

  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .page {
    display: flex; flex-direction: column;
    padding: 32px; gap: 24px;
    min-height: 100%;
    background: var(--bg); color: var(--text);
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  .controls {
    display: flex; flex-direction: row;
    gap: 16px; align-items: center;
    padding: 8px 16px; border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  button {
    padding: 4px 16px; border-radius: 6px;
    font-weight: 600; font-size: 12px; letter-spacing: 0.5px;
    border: 0; cursor: pointer;
    background: var(--primary); color: var(--primary-text);
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  #stats { font-size: 13px; font-variant-numeric: tabular-nums; opacity: 0.85; }
  .rows-input {
    width: 90px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .rows-label { font-size: 13px; opacity: 0.7; }

  .perf-list {
    display: flex; flex-direction: column;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    height: 500px; overflow: hidden; overflow-y: auto;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  .row {
    display: flex; flex-direction: column;
    color: var(--text);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; height: 36px; justify-content: center;
    transition:
      background 250ms ease-in-out,
      color 250ms ease-in-out,
      border-bottom-color 250ms ease-in-out;
  }
  .row.even { background: var(--surface); }
  .row.odd  { background: var(--surface-alt); }
</style>
</head>
<body>
  <div class="page">
    <div class="controls">
      <button id="toggle">Toggle theme</button>
      <button id="start">Start test</button>
      <span id="stats">Click toggle to measure, or Start test to run the suite</span>
    </div>
    <div class="perf-list" id="list"></div>
    <div id="results"></div>
  </div>

  <script type="module">
    import { runToggle, runSuite } from '../instrument.js';

    const list = document.getElementById('list');
    let currentRows = 0;

    // (Re)build the list with the given row count. Uses a
    // DocumentFragment so a single attach hits layout instead of
    // N — the fair comparison for vanilla.
    //
    // Text is wrapped in a <span> so the DOM shape matches every
    // other variant (idealyst-native's Text primitive emits a
    // <span> as a styling target; for a fair benchmark all
    // variants mount the same number of DOM nodes).
    function buildRows(rowCount) {
      while (list.firstChild) list.removeChild(list.firstChild);
      const frag = document.createDocumentFragment();
      for (let i = 0; i < rowCount; i++) {
        const row = document.createElement('div');
        row.className = 'row ' + (i % 2 === 0 ? 'even' : 'odd');
        const span = document.createElement('span');
        span.textContent = `Row #${i}`;
        row.appendChild(span);
        frag.appendChild(row);
      }
      list.appendChild(frag);
      currentRows = rowCount;
    }
    buildRows(1000);

    let isDark = false;
    document.getElementById('toggle').addEventListener('click', () => {
      isDark = !isDark;
      runToggle(() => {
        document.documentElement.classList.toggle('dark', isDark);
      }, { theme: isDark ? 'dark' : 'light', rows: currentRows });
    });

    document.getElementById('start').addEventListener('click', async () => {
      const btn = document.getElementById('start');
      btn.disabled = true;
      try {
        await runSuite({
          setRows: async (n) => { buildRows(n); },
          resultsEl: document.getElementById('results'),
        });
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
