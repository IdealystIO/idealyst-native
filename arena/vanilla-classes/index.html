<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arena · vanilla per-element classes</title>
<style>
  /*
   * Mirrors the framework's web backend: on each toggle, mint fresh
   * stylesheet rules (one class per parity + theme + chrome element)
   * and write setAttribute('class', ...) on every row + text node.
   * No CSS variables, no cascade tricks — every node is restyled by
   * name. This is the path the framework actually walks today.
   *
   * Compare against ../vanilla-css-vars/ to see what the cascade can do
   * for free, and against ../react-*/ to see what React adds on top.
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  /* No `.ui-default` baseline — see the framework comment below.
     Flex semantics live on the rules that need them. */
  .page {
    display: flex; flex-direction: column;
    padding: 32px; gap: 24px; min-height: 100%;
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  .controls {
    display: flex; flex-direction: row; gap: 16px; align-items: center;
    padding: 8px 16px; border-radius: 10px; border: 1px solid;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  button {
    padding: 4px 16px; border-radius: 6px;
    font-weight: 600; font-size: 12px; letter-spacing: 0.5px;
    border: 0; cursor: pointer;
  }
  #stats { font-size: 13px; font-variant-numeric: tabular-nums; opacity: 0.85; }
  .rows-input {
    width: 90px; padding: 4px 8px; border-radius: 6px;
    border: 1px solid #888; background: #fff; color: #000;
    font-size: 13px; font-variant-numeric: tabular-nums;
  }
  .rows-label { font-size: 13px; opacity: 0.7; }
  .perf-list {
    /* `flex` parent so rows behave as flex children with the
       default `flex-shrink: 1`, which collapses each row to its
       content height + padding (~34px). Matches the other arena
       variants (react / vue / svelte / vanilla-css-vars all use
       flex-column lists). Without this the list would be a
       `display: block` and rows would honor their declared
       `height: 36` literally, ending up visually taller than
       everywhere else. */
    display: flex; flex-direction: column;
    border-radius: 10px; border: 1px solid;
    height: 500px; overflow: hidden; overflow-y: auto;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
</style>
</head>
<body>
  <div class="page" id="page">
    <div class="perf-list" id="list"></div>
    <!-- #stats kept hidden; instrumentation may write into it. -->
    <span id="stats" style="display: none"></span>
    <div id="results"></div>
  </div>

  <script type="module">
    import { autoRunIfRequested, LIGHT, DARK } from '../instrument.js';

    let rowCount = 1000;

    // Shared <style> element + insert/delete rule machinery, exactly
    // like the framework's StyleStore. Per-toggle, we mint new rules
    // and delete the previous ones.
    const styleEl = document.createElement('style');
    document.head.appendChild(styleEl);
    const sheet = styleEl.sheet;
    const liveRules = new Set();

    function insertRule(className, body) {
      const idx = sheet.cssRules.length;
      sheet.insertRule(`.${className} { ${body} }`, idx);
      liveRules.add(idx);
      return idx;
    }
    function findRuleIdx(className) {
      const target = `.${className}`;
      for (let i = 0; i < sheet.cssRules.length; i++) {
        if (sheet.cssRules[i].selectorText === target) return i;
      }
      return -1;
    }
    // FNV-ish hash matching backend-web::hash_class_name shape: 'ui-' + 16 hex.
    function hashName(key) {
      let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
      for (let i = 0; i < key.length; i++) {
        const ch = key.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
      h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
      h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return 'ui-' +
        (h1 >>> 0).toString(16).padStart(8, '0') +
        (h2 >>> 0).toString(16).padStart(8, '0');
    }

    function rowCss(theme, parity) {
      const bg = parity === 'odd' ? theme.surface_alt : theme.surface;
      return [
        'display: flex',
        'flex-direction: column',
        `background: ${bg}`,
        `color: ${theme.text}`,
        'padding-top: 8px',
        'padding-right: 16px',
        'padding-bottom: 8px',
        'padding-left: 16px',
        'border-bottom-width: 1px',
        'border-bottom-style: solid',
        `border-bottom-color: ${theme.border}`,
        'font-size: 13px',
        'height: 36px',
        'justify-content: center',
        'transition: background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out',
      ].join('; ');
    }

    const list = document.getElementById('list');

    // "Vanilla as fast as possible" — single-FFI bulk construction
    // via `innerHTML`. Builds one big HTML string with every row's
    // className already baked in, hands it to the browser to parse
    // in C++. One Rust→JS crossing for 10 000 rows of DOM, vs the
    // ~30 000 crossings a per-element `createElement`+`appendChild`
    // loop would pay even with a `DocumentFragment` collecting the
    // children.
    //
    // Why this is the right ceiling for the arena:
    //   - The framework's `Primitive::Repeat` lowers to a
    //     `DocumentFragment`-collected loop. Vanilla using
    //     `innerHTML` represents the best a DOM-driven UI can do
    //     short of writing raw bytes into a Canvas — it sets the
    //     "what's physically possible" floor the framework chases.
    //   - The escaping cost is negligible at this row-text shape
    //     (just digits — no user-controlled strings). For variants
    //     with arbitrary text, the `textContent` setter path would
    //     be required and `innerHTML` would be unsafe.
    //
    // Row shape: `<div class="<rowCls>"><span class="<textCls>">Row #N</span></div>` —
    // same DOM nodes per row as the other variants (div + span).
    let activeRules = null;
    let toggleN = 0;

    // Mint fresh per-theme CSS rules and return their `className`s
    // for the per-row bake-in. Each toggle invents a new hash so
    // the framework's "worst case" — fresh class minting + old-
    // class teardown — is faithfully reproduced. We don't reuse
    // class names across applies because the framework doesn't
    // either.
    function mintRules(theme, tag) {
      const rowEven = hashName(`PerfRow|even|${tag}`);
      const rowOdd  = hashName(`PerfRow|odd|${tag}`);
      const textCls = hashName(`Text|${tag}`);
      const pageCls = hashName(`Page|${tag}`);
      const listCls = hashName(`PerfList|${tag}`);

      const newRules = {
        rowEven: insertRule(rowEven, rowCss(theme, 'even')),
        rowOdd:  insertRule(rowOdd,  rowCss(theme, 'odd')),
        text:    insertRule(textCls, `color: ${theme.text}; transition: color 250ms ease-in-out`),
        page:    insertRule(pageCls, `background: ${theme.background}; color: ${theme.text}`),
        list:    insertRule(listCls, `background: ${theme.surface}; border-color: ${theme.border}`),
      };

      // Apply page/list classes to the static chrome (cheap — two
      // setAttribute calls, the runner has #page and #list mounted).
      const setAttr = Element.prototype.setAttribute;
      setAttr.call(document.getElementById('page'), 'class', `page ${pageCls}`);
      setAttr.call(document.getElementById('list'), 'class', `perf-list ${listCls}`);

      // Drop previous theme's rules. The framework does this on
      // every toggle too, so the cost is part of an honest apply
      // measurement.
      if (activeRules) {
        const prev = Object.values(activeRules).sort((a, b) => b - a);
        for (const idx of prev) { sheet.deleteRule(idx); liveRules.delete(idx); }
        // After deletes, our cached indices are stale. Re-resolve
        // by class-name lookup so subsequent applies can delete
        // the right rules.
        newRules.rowEven = findRuleIdx(rowEven);
        newRules.rowOdd  = findRuleIdx(rowOdd);
        newRules.text    = findRuleIdx(textCls);
        newRules.page    = findRuleIdx(pageCls);
        newRules.list    = findRuleIdx(listCls);
      }
      activeRules = newRules;
      return { rowEven, rowOdd, textCls };
    }

    // Prime with light so the initial unmeasured render has a
    // theme. The runner will then drive `setRows` for each
    // measured iteration.
    {
      const tag = `init-${toggleN}`;
      const { rowEven, rowOdd, textCls } = mintRules(LIGHT, tag);
      // Build the initial 1000 rows with the just-minted classes.
      let html = '';
      for (let i = 0; i < rowCount; i++) {
        const rowCls = (i % 2 === 0) ? rowEven : rowOdd;
        html += `<div class="${rowCls}"><span class="${textCls}">Row #${i}</span></div>`;
      }
      list.innerHTML = html;
    }

    let isDark = false;

    // setRows for the runner-iframe path. Mints fresh classes for
    // the current theme, builds the row HTML with them baked in,
    // and swaps the list contents in one `innerHTML` write.
    //
    // The HTML-string assembly is pure JS-side concatenation (no
    // FFI) — even for 10 000 rows that's a single ~500 KB string,
    // built in microseconds. The single `innerHTML` setter call
    // is the only Rust→JS crossing for the entire mount.
    const setRows = async (n) => {
      toggleN++;
      rowCount = n;
      const theme = isDark ? DARK : LIGHT;
      const tag = `r-${toggleN}`;
      const { rowEven, rowOdd, textCls } = mintRules(theme, tag);

      let html = '';
      for (let i = 0; i < n; i++) {
        const rowCls = (i % 2 === 0) ? rowEven : rowOdd;
        html += `<div class="${rowCls}"><span class="${textCls}">Row #${i}</span></div>`;
      }
      // Single FFI for the whole subtree. Browser parses + builds
      // all N rows in C++ from one string.
      list.innerHTML = html;
    };

    autoRunIfRequested({ setRows });
  </script>
</body>
</html>
