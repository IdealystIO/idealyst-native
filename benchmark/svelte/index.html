<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · Svelte 5 (naive: runes, runtime compile)</title>
<style>
  /*
   * Naive Svelte 5 take: `$state` for theme + row count, each row's
   * inline `style={...}` re-evaluates when the read-state changes.
   * Svelte's compiler emits the dependency wiring inline — the runtime
   * does no virtual-DOM diffing, just surgical DOM patches.
   *
   * Naive in the same sense as the React / Vue variants: idiomatic
   * code, no `bind:` tricks, no `{#key}` boundaries, no CSS-variable
   * theming. Every row's `style={...}` participates in the reactive
   * graph.
   *
   * Build step: none. We compile the `.svelte` source string in the
   * browser via `svelte/compiler` and `import()` the data: URL.
   * This adds a one-time cold-start cost on page load but doesn't
   * enter the `apply` measurement (which only times the toggle /
   * setRows handler).
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
  #stats { font-size: 13px; font-variant-numeric: tabular-nums; opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
// `svelte/compiler` is a few MB. Tolerable because the toggle benchmark
// doesn't measure cold start — see the spec's "What we deliberately do
// NOT measure" section. If a cold-start arena slot lands later, the
// honest Svelte answer there is "precompile during build."
import { compile } from 'https://esm.sh/svelte@5.0.0/compiler';
import { mount, tick } from 'https://esm.sh/svelte@5.0.0';
import { autoRunIfRequested, LIGHT } from '../instrument.js';

// The `.svelte` source. Kept inline so the variant is a single
// self-contained file like the others. We pass `theme` + `rowCount`
// as `$state` runes; each row reads `theme` inside its `style={...}`
// expression, so Svelte wires per-row reactive deps automatically.
const SOURCE = String.raw`
<script>
  let { theme, rowCount } = $props();

  const pageStyle = (t) =>
    "display: flex; flex-direction: column; padding: 32px; gap: 24px; min-height: 100%;"
    + " background: " + t.background + "; color: " + t.text + ";"
    + " transition: background 250ms ease-in-out, color 250ms ease-in-out;";
  const listStyle = (t) =>
    "display: flex; flex-direction: column; border-radius: 10px;"
    + " background: " + t.surface + "; border: 1px solid " + t.border + ";"
    + " height: 500px; overflow: hidden; overflow-y: auto;"
    + " transition: background 250ms ease-in-out, border-color 250ms ease-in-out;";
  const rowStyle = (t, parity) =>
    "display: flex; flex-direction: column;"
    + " background: " + (parity === 'odd' ? t.surface_alt : t.surface) + ";"
    + " color: " + t.text + ";"
    + " padding: 8px 16px;"
    + " border-bottom: 1px solid " + t.border + ";"
    + " font-size: 13px; height: 36px; justify-content: center;"
    + " transition: background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out;";
</scr` + `ipt>

<div style={pageStyle(theme)}>
  <div style={listStyle(theme)}>
    {#each Array(rowCount) as _, i (i)}
      <div style={rowStyle(theme, i % 2 === 0 ? 'even' : 'odd')}>
        <span>Row #{i}</span>
      </div>
    {/each}
  </div>
</div>
`;

// Compile to client-mode ES module. `generate: 'client'` emits
// browser-runnable code targeting `svelte/internal/client`. The
// `dev: false` flag drops Svelte's dev-mode validation that would
// inflate apply numbers.
const compiled = compile(SOURCE, {
  generate: 'client',
  dev: false,
  filename: 'App.svelte',
  // `runes: true` is implied by Svelte 5 component syntax (the
  // `$props`/`$state` references), but stating it explicitly skips
  // the compiler's auto-detection branch.
  runes: true,
});

// Rewrite bare `svelte`/`svelte/internal/client` imports in the
// compiler output to point at the esm.sh URLs we can actually load
// in the browser. The compiler emits source like
// `import * as $ from 'svelte/internal/client';` which the browser
// can't resolve without an import map; we'd need one we don't have.
// Easier to rewrite the source string.
const rewritten = compiled.js.code
  // Rewrite both `from 'svelte...'` and bare side-effect
  // `import 'svelte...'` forms. The Svelte 5 compiler emits a side-
  // effect import for `disclose-version` and an aliased import for
  // `internal/client`; both have to point at esm.sh.
  .replace(/(['"])svelte\/internal\/client\1/g, "$1https://esm.sh/svelte@5.0.0/internal/client$1")
  .replace(/(['"])svelte\/internal\/disclose-version\1/g, "$1https://esm.sh/svelte@5.0.0/internal/disclose-version$1")
  .replace(/(['"])svelte\1/g, "$1https://esm.sh/svelte@5.0.0$1");

// Eval as a data: URL module. The result is a default export — the
// component constructor. `mount` wires it up to the DOM.
const moduleUrl = 'data:text/javascript;base64,' + btoa(unescape(encodeURIComponent(rewritten)));
const App = (await import(moduleUrl)).default;

// `$state` is signal-like — read in the component re-runs effects on
// change. We don't import `$state` here because it's a Svelte 5
// runtime intrinsic only valid inside .svelte files; we use plain
// `let`-bound state on this side and feed the component via props.
//
// To make the component re-render on toggle, we need its prop slot
// to participate in Svelte's reactive graph. Two ways:
//   (a) Re-mount on every toggle — too expensive, defeats the test.
//   (b) Use a `$state` rune at the component boundary so reassigning
//       props re-fires its deps.
//
// (b) requires us to define the state INSIDE a .svelte file. So our
// outer wrapper exposes the state and the inner component reads it
// via $props — we then mutate the outer state from this script.
//
// Simpler refactor: define the state-holding "shell" in another tiny
// .svelte module and have it own the lifecycle.
const SHELL_SOURCE = String.raw`
<script>
  import App from './App.svelte';
  import { LIGHT, DARK } from '../instrument.js';
  let theme = $state(LIGHT);
  let rowCount = $state(1000);
  // Expose mutators on the global so the outer module can drive them.
  // Svelte 5's mount API doesn't directly expose a setter for $state
  // bindings on mounted instances, so we publish writers here from
  // inside the shell. The theme writer takes 'light' | 'dark' strings
  // and maps to the imported palette objects so the outer module
  // doesn't have to know Svelte's $state shape.
  window.__svelteShellSetTheme = (name) => { theme = name === 'dark' ? DARK : LIGHT; };
  window.__svelteShellSetRows  = (n) => { rowCount = n; };
</scr` + `ipt>

<App {theme} {rowCount} />
`;

// Same compile + import dance for the shell. The shell's compiled
// code imports `./App.svelte`, so we have to register App at that
// path. Easiest: replace the bare specifier with the actual data:
// URL we built above.
const shellCompiled = compile(SHELL_SOURCE, {
  generate: 'client',
  dev: false,
  filename: 'Shell.svelte',
  runes: true,
});
let shellRewritten = shellCompiled.js.code
  // Rewrite both `from 'svelte...'` and bare side-effect
  // `import 'svelte...'` forms. The Svelte 5 compiler emits a side-
  // effect import for `disclose-version` and an aliased import for
  // `internal/client`; both have to point at esm.sh.
  .replace(/(['"])svelte\/internal\/client\1/g, "$1https://esm.sh/svelte@5.0.0/internal/client$1")
  .replace(/(['"])svelte\/internal\/disclose-version\1/g, "$1https://esm.sh/svelte@5.0.0/internal/disclose-version$1")
  .replace(/(['"])svelte\1/g, "$1https://esm.sh/svelte@5.0.0$1")
  .replace(/from\s+['"]\.\/App\.svelte['"]/g, `from '${moduleUrl}'`)
  // `instrument.js` is served from the parent of /svelte/. Resolve
  // it to an absolute URL so the data: module can find it.
  .replace(/from\s+['"]\.\.\/instrument\.js['"]/g, `from '${new URL('../instrument.js', window.location.href).href}'`);

const shellUrl = 'data:text/javascript;base64,' + btoa(unescape(encodeURIComponent(shellRewritten)));
const Shell = (await import(shellUrl)).default;

// Mount the shell. After this, the globals `__svelteShellSet*` are
// live and we can drive the component from outside.
mount(Shell, { target: document.getElementById('root') });

// setRows for the runner-iframe path. Svelte 5's $state writes
// schedule the DOM patch via the microtask queue; `tick()` returns
// a Promise that resolves once those patches have flushed. We do
// NOT wait for a rAF here — that would bake ~16ms of paint delay
// into `apply` that no other variant pays.
const setRows = async (n) => {
  window.__svelteShellSetRows(n);
  await tick();
};

// Theme swap: write the shell's `$state` theme; Svelte's
// scheduler re-runs every binding that reads it. `tick()`
// resolves after the microtask patch flush.
const setTheme = async (name) => {
  window.__svelteShellSetTheme(name);
  await tick();
};

autoRunIfRequested({ setRows, setTheme });
</script>
</body>
</html>
