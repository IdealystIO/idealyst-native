<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · Svelte 5 (AOT-compiled)</title>
<style>
  /*
   * Svelte 5 variant, AOT-compiled by Vite. The Svelte compiler
   * runs at build time (not in the browser like it did
   * pre-build-step), and the runtime is tree-shaken down to
   * only what the compiled components reference. No dev-mode
   * validators in the output — `vite build` sets
   * NODE_ENV=production which `@sveltejs/vite-plugin-svelte`
   * forwards to the compiler as `dev: false`.
   *
   * Rebuild before serving (from this directory):
   *   pnpm install
   *   pnpm build
   * The bundled output lands at `pkg/main.js`.
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="./pkg/main.js"></script>
</body>
</html>
