<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · Vue (render functions, runtime-only)</title>
<style>
  /*
   * Vue with the runtime-only build + a hand-written render
   * function. No template string, no in-browser compiler — what
   * a real production Vue app ships after its build step.
   *
   * "Naive" only in the sense that each row reads `theme` in its
   * `:style` binding (so the reactive graph fans out per-row on
   * toggle). No v-memo, no CSS-variable shortcut.
   *
   * Why runtime-only: the `vue.esm-browser.prod.js` bundle ships
   * a template compiler we don't need once we're calling `h()`
   * directly. Runtime-only drops the compiler bytes and skips
   * the one-time template-parse at mount — closer to production
   * deployment shape.
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
// `vue.runtime.esm-browser.prod.js` is the production *runtime-only*
// bundle — no template compiler. Pairs with hand-written render
// functions via `h()` instead of template strings.
import { createApp, ref, nextTick, h } from 'https://esm.sh/vue@3.4.21/dist/vue.runtime.esm-browser.prod.js';
import { autoRunIfRequested, LIGHT, DARK } from '../instrument.js';

const pageStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  padding: '32px', gap: '24px', minHeight: '100%',
  background: t.background, color: t.text,
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out',
});
const listStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  borderRadius: '10px',
  background: t.surface, border: `1px solid ${t.border}`,
  height: '500px', overflow: 'hidden', overflowY: 'auto',
  transition: 'background 250ms ease-in-out, border-color 250ms ease-in-out',
});
const rowStyle = (t, parity) => ({
  display: 'flex', flexDirection: 'column',
  background: parity === 'odd' ? t.surface_alt : t.surface,
  color: t.text,
  padding: '8px 16px',
  borderBottom: `1px solid ${t.border}`,
  fontSize: '13px', height: '36px', justifyContent: 'center',
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out',
});

let externalSetRows = null;
let externalSetTheme = null;

const app = createApp({
  setup() {
    const rowCount = ref(1000);
    const theme = ref(LIGHT);

    externalSetRows = async (n) => {
      rowCount.value = n;
      // `nextTick()` resolves after Vue's microtask-scheduled
      // DOM patch flushes — the contract `setRows` advertises
      // to the suite.
      await nextTick();
    };
    externalSetTheme = async (name) => {
      // Writing `theme.value` re-fires every `:style` binding
      // that reads it. The patch lands on a microtask; `nextTick`
      // resolves after it flushes.
      theme.value = name === 'dark' ? DARK : LIGHT;
      await nextTick();
    };

    // Hand-written render function. Equivalent to:
    //   <div :style="pageStyle(theme)">
    //     <div :style="listStyle(theme)">
    //       <div v-for="i in rowCount" :key="i" :style="rowStyle(...)">
    //         <span>Row #{{ i }}</span>
    //       </div>
    //     </div>
    //   </div>
    // but with no template compile step. `setup` returns the
    // render function; Vue uses it directly.
    return () => {
      const t = theme.value;
      const n = rowCount.value;
      const rows = new Array(n);
      for (let i = 0; i < n; i++) {
        rows[i] = h('div',
          { key: i, style: rowStyle(t, i % 2 === 0 ? 'even' : 'odd') },
          h('span', null, `Row #${i}`),
        );
      }
      return h('div', { style: pageStyle(t) },
        h('div', { style: listStyle(t) }, rows),
      );
    };
  },
});

app.mount('#root');

// `app.mount` runs synchronously, so both hooks are filled by
// the time we get here. Hand off to the runner if we're in
// iframe mode.
autoRunIfRequested({
  setRows: (n) => externalSetRows(n),
  setTheme: (t) => externalSetTheme(t),
});
</script>
</body>
</html>
