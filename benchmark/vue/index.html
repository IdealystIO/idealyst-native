<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · Vue (render functions, runtime-only)</title>
<style>
  /*
   * Vue with the runtime-only build + a hand-written render
   * function. No template string, no in-browser compiler — what
   * a real production Vue app ships after its build step.
   *
   * Supports all three suites:
   *   - rebuild      → re-mounts a row list at varying counts
   *   - toggle       → bumps a theme ref, every row re-reads
   *   - hierarchy    → mounts a deeply nested component tree;
   *                    branchUpdate bumps a ref only the target
   *                    leaf reads, globalUpdate bumps a ref every
   *                    leaf reads. Branch / Leaf are proper Vue
   *                    components so reactivity is component-scoped.
   *
   * Why runtime-only: the `vue.esm-browser.prod.js` bundle ships
   * a template compiler we don't need once we're calling `h()`
   * directly. Runtime-only drops the compiler bytes and skips
   * the one-time template-parse at mount — closer to production
   * deployment shape.
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createApp, ref, nextTick, h } from 'https://esm.sh/vue@3.4.21/dist/vue.runtime.esm-browser.prod.js';
import { autoRunIfRequested, LIGHT, DARK } from '../instrument.js';
import { genTreeShape } from '../tree.js';

// ── rebuild / toggle styles ──────────────────────────────────
const pageStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  padding: '32px', gap: '24px', minHeight: '100%',
  background: t.background, color: t.text,
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out',
});
const listStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  borderRadius: '10px',
  background: t.surface, border: `1px solid ${t.border}`,
  height: '500px', overflow: 'hidden', overflowY: 'auto',
  transition: 'background 250ms ease-in-out, border-color 250ms ease-in-out',
});
const rowStyle = (t, parity) => ({
  display: 'flex', flexDirection: 'column',
  background: parity === 'odd' ? t.surface_alt : t.surface,
  color: t.text,
  padding: '8px 16px',
  borderBottom: `1px solid ${t.border}`,
  fontSize: '13px', height: '36px', justifyContent: 'center',
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out',
});

// ── hierarchy refs + components ──────────────────────────────
// Module-scope refs the Leaf component reads. Each Leaf
// subscribes to `globalCounter`; only the target leaf
// (identified by its id matching `targetLeafId`) ALSO subscribes
// to `branchCounter`. Updates therefore fan out only as far as
// they need to — Vue's per-component reactive scope handles
// the localization automatically.
const globalCounter = ref(0);
const branchCounter = ref(0);
let targetLeafId = -1;

const TARGET_STYLE = 'background: #ffcc00; color: #000; padding: 1px 4px; font-weight: 700;';

// Counter readout — its own component so only it subscribes to
// the counters (not App). Without this isolation, App's render
// would re-fire on every counter update and skew the
// measurement.
const CounterReadout = {
  setup() {
    return () => h('div', {
      style: 'padding: 8px; background: #1a1d24; color: #e8eaf0; margin-bottom: 12px; border-radius: 4px;',
    }, `branch=${branchCounter.value} · global=${globalCounter.value}`);
  },
};

const Leaf = {
  props: ['id'],
  setup(props) {
    // Computed once per component instance; the render function
    // closes over it. Cheaper than checking on every render.
    const isTarget = props.id === targetLeafId;
    return () => {
      const g = globalCounter.value;
      if (isTarget) {
        const b = branchCounter.value;
        return h('span', { style: TARGET_STYLE }, `★ leaf ${props.id}: g=${g} b=${b}`);
      }
      return h('span', null, `leaf ${props.id}: g=${g} `);
    };
  },
};

const Branch = {
  props: ['vnodes'],
  setup(props) {
    // `Branch` doesn't read any reactive state — its props are
    // a static vnode array assembled at mount time. So Vue
    // never re-renders Branch after initial mount. Theme/counter
    // changes propagate straight to the affected Leaf
    // components, skipping all intermediate Branches.
    return () => h('div', { class: 'b' }, props.vnodes);
  },
};

function buildVnodes(node) {
  if (node.kind === 'leaf') {
    return h(Leaf, { key: node.id, id: node.id });
  }
  const vnodes = node.children.map(buildVnodes);
  return h(Branch, { key: node.id, vnodes });
}

// ── App state + hooks ────────────────────────────────────────
let externalSetRows = null;
let externalSetTheme = null;
let externalSetupHierarchy = null;

const mode = ref('rows');  // 'rows' (rebuild/toggle) or 'tree' (hierarchy)
const treeRoot = ref(null);

const app = createApp({
  setup() {
    const rowCount = ref(1000);
    const theme = ref(LIGHT);

    externalSetRows = async (n) => {
      mode.value = 'rows';
      rowCount.value = n;
      await nextTick();
    };
    externalSetTheme = async (name) => {
      theme.value = name === 'dark' ? DARK : LIGHT;
      await nextTick();
    };
    externalSetupHierarchy = async (seed, nodes, maxDepth) => {
      const tree = genTreeShape(seed, nodes, maxDepth || undefined);
      targetLeafId = tree.targetLeaf.id;
      treeRoot.value = buildVnodes(tree.root);
      mode.value = 'tree';
      await nextTick();
    };

    return () => {
      if (mode.value === 'tree') {
        // Static container. App reads only `treeRoot.value`
        // (which is stable post-mount), so App itself doesn't
        // re-render on counter updates. CounterReadout owns the
        // counter subscriptions in its own component scope.
        return h('div', { style: 'padding: 16px; font: 12px/1.4 monospace;' }, [
          h(CounterReadout),
          treeRoot.value,
        ]);
      }
      // Default: row-list mode (rebuild/toggle).
      const t = theme.value;
      const n = rowCount.value;
      const rows = new Array(n);
      for (let i = 0; i < n; i++) {
        rows[i] = h('div',
          { key: i, style: rowStyle(t, i % 2 === 0 ? 'even' : 'odd') },
          h('span', null, `Row #${i}`),
        );
      }
      return h('div', { style: pageStyle(t) },
        h('div', { style: listStyle(t) }, rows),
      );
    };
  },
});

app.mount('#root');

autoRunIfRequested({
  setRows: (n) => externalSetRows(n),
  setTheme: (t) => externalSetTheme(t),
  setupHierarchy: (seed, nodes) => externalSetupHierarchy(seed, nodes),
  branchUpdate: async (n) => { branchCounter.value = n; await nextTick(); },
  globalUpdate: async (n) => { globalCounter.value = n; await nextTick(); },
});
</script>
</body>
</html>
