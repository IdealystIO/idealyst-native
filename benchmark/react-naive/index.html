<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · React (naive: no memo)</title>
<style>
  /*
   * Naive React take. State at the root, threaded via props.
   * No React.memo, no Context optimization, no fine-grained
   * tricks. This is the code a competent dev writes first.
   *
   * Supports all three suites:
   *   - rebuild      → re-renders rows when rowCount changes
   *   - toggle       → flushSync state update on theme
   *   - hierarchy    → branch/global counters live at root,
   *                    drilled down to every leaf via props.
   *                    Since nothing is memoized, ANY state
   *                    change re-renders the whole tree.
   *                    BRANCH update will be as expensive as
   *                    GLOBAL — that's the architectural truth
   *                    of unmemoized React.
   */
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"></div>
<script type="module">
import { useState, useMemo } from 'react';
import { jsx as _jsx, jsxs as _jsxs } from 'react/jsx-runtime';
import { createRoot } from 'react-dom/client';
import { flushSync } from 'https://esm.sh/react-dom@18.3.1?deps=react@18.3.1';
import { autoRunIfRequested, LIGHT, DARK } from '../instrument.js';
import { genTreeShape } from '../tree.js';

// ── rebuild / toggle styles ──────────────────────────────────
const pageStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  padding: 32, gap: 24, minHeight: '100%',
  background: t.background, color: t.text,
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out',
});
const listStyle = (t) => ({
  display: 'flex', flexDirection: 'column',
  borderRadius: 10,
  background: t.surface, border: `1px solid ${t.border}`,
  height: 500, overflow: 'hidden', overflowY: 'auto',
  transition: 'background 250ms ease-in-out, border-color 250ms ease-in-out',
});
const rowStyle = (t, parity) => ({
  display: 'flex', flexDirection: 'column',
  background: parity === 'odd' ? t.surface_alt : t.surface,
  color: t.text,
  padding: '8px 16px',
  borderBottom: `1px solid ${t.border}`,
  fontSize: 13, height: 36, justifyContent: 'center',
  transition: 'background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out',
});

function Row({ index, theme }) {
  return _jsx('div', {
    style: rowStyle(theme, index % 2 === 0 ? 'even' : 'odd'),
    children: _jsx('span', { children: `Row #${index}` }),
  });
}

// ── granular suite: per-row counters threaded as props ────────
// Naive React: counters live as one array in root state. Any
// bump produces a new array reference → the WHOLE list re-renders,
// because no memoization sits between root and CounterRow.
function CounterRow({ index, value, theme }) {
  return _jsx('div', {
    style: rowStyle(theme, index % 2 === 0 ? 'even' : 'odd'),
    children: _jsx('span', { children: `row ${index}: c=${value}` }),
  });
}

// ── reactive-style suite: bg derived from shared + per-row state.
// Same naive treatment — any bump rebuilds the whole list.
const COLOR_A = 'rgb(91, 108, 255)';
const COLOR_B = 'rgb(255, 91, 108)';
function rstyleRowStyle(theme, bg) {
  return {
    display: 'flex', flexDirection: 'column', justifyContent: 'center',
    padding: '8px 16px', fontSize: 13, height: 36,
    color: theme.text, background: bg,
  };
}
function RStyleRow({ index, bg, theme }) {
  return _jsx('div', {
    style: rstyleRowStyle(theme, bg),
    children: _jsx('span', { children: `rstyle ${index}` }),
  });
}

// ── hierarchy components (no memo!) ──────────────────────────
// Branch: receives global+branch counters as props, passes
// them down. Re-runs on every parent re-render. Leaf does the
// actual text rendering.
function Leaf({ id, global, branch, isTarget }) {
  return _jsx('span', {
    children: isTarget
      ? `leaf ${id}: g=${global} b=${branch}`
      : `leaf ${id}: g=${global}`,
  });
}

function Branch({ node, global, branch, targetId }) {
  // Children are arranged inside a div. Each child is either
  // another Branch or a Leaf. No memoization — any state change
  // at the App level re-renders this whole subtree.
  return _jsx('div', {
    className: 'b',
    children: node.children.map((child) =>
      child.kind === 'leaf'
        ? _jsx(Leaf, {
            id: child.id,
            global,
            branch,
            isTarget: child.id === targetId,
          }, child.id)
        : _jsx(Branch, {
            node: child,
            global,
            branch,
            targetId,
          }, child.id)
    ),
  });
}

// ── external hooks for the runner ────────────────────────────
let externalSetRows = null;
let externalSetTheme = null;
let externalSetupHierarchy = null;
let externalBranchUpdate = null;
let externalGlobalUpdate = null;
let externalSetupCounters = null;
let externalBumpCounter = null;
let externalBumpRange = null;
let externalSetupReactiveStyles = null;
let externalSetSharedColor = null;
let externalSetPointColor = null;

function App() {
  // rebuild/toggle state
  const [rowCount, setRowCountState] = useState(1000);
  const [theme, setThemeState] = useState(LIGHT);
  // hierarchy state
  const [mode, setMode] = useState('rows');
  const [tree, setTree] = useState(null);
  const [globalCounter, setGlobal] = useState(0);
  const [branchCounter, setBranch] = useState(0);
  // granular state — one array of integers, length = counterCount.
  // Bumps produce a new array reference so React re-renders the
  // list (naive: no memo on CounterRow).
  const [counters, setCounters] = useState(null);
  // reactive-style state — shared color name + per-row overrides.
  const [rstyle, setRstyle] = useState(null);
  // ^ shape: { n, shared: 'A'|'B', points: Array<'A'|'B'|null> }

  // Publish setters once on first render so the runner can
  // drive them via the iframe-message path.
  if (!externalSetRows) {
    externalSetRows = async (n) => {
      flushSync(() => {
        setMode('rows');
        setRowCountState(n);
      });
    };
  }
  if (!externalSetTheme) {
    externalSetTheme = async (name) => {
      flushSync(() => setThemeState(name === 'dark' ? DARK : LIGHT));
    };
  }
  if (!externalSetupHierarchy) {
    externalSetupHierarchy = async (seed, nodes, maxDepth) => {
      const t = genTreeShape(seed, nodes, maxDepth || undefined);
      flushSync(() => {
        setTree({ root: t.root, targetId: t.targetLeaf.id });
        setMode('tree');
      });
    };
  }
  if (!externalBranchUpdate) {
    externalBranchUpdate = async (n) => {
      flushSync(() => setBranch(n));
    };
  }
  if (!externalGlobalUpdate) {
    externalGlobalUpdate = async (n) => {
      flushSync(() => setGlobal(n));
    };
  }
  if (!externalSetupCounters) {
    externalSetupCounters = async (n) => {
      flushSync(() => {
        setMode('counters');
        setCounters(new Array(n).fill(0));
      });
    };
  }
  if (!externalBumpCounter) {
    externalBumpCounter = async (i, v) => {
      flushSync(() => {
        setCounters((arr) => {
          if (!arr) return arr;
          const next = arr.slice();
          next[i] = v;
          return next;
        });
      });
    };
  }
  if (!externalBumpRange) {
    externalBumpRange = async (s, e, v) => {
      flushSync(() => {
        setCounters((arr) => {
          if (!arr) return arr;
          const next = arr.slice();
          const end = Math.min(e, next.length);
          for (let i = s; i < end; i++) next[i] = v;
          return next;
        });
      });
    };
  }
  if (!externalSetupReactiveStyles) {
    externalSetupReactiveStyles = async (n) => {
      flushSync(() => {
        setMode('rstyle');
        setRstyle({ n, shared: 'A', points: new Array(n).fill(null) });
      });
    };
  }
  if (!externalSetSharedColor) {
    externalSetSharedColor = async (name) => {
      flushSync(() => {
        setRstyle((s) => s ? ({ ...s, shared: name === 'B' ? 'B' : 'A' }) : s);
      });
    };
  }
  if (!externalSetPointColor) {
    externalSetPointColor = async (i, name) => {
      flushSync(() => {
        setRstyle((s) => {
          if (!s) return s;
          const points = s.points.slice();
          points[i] = name === 'B' ? 'B' : 'A';
          return { ...s, points };
        });
      });
    };
  }

  // ALL hooks must be called unconditionally on every render
  // (Rules of Hooks). We compute the rows useMemo before the
  // branch — it's cheap when rowCount hasn't changed.
  const rows = useMemo(
    () => Array.from({ length: rowCount }, (_, i) => _jsx(Row, { index: i, theme }, i)),
    [theme, rowCount]
  );

  if (mode === 'tree' && tree) {
    return _jsx('div', {
      style: { padding: 16, font: '12px/1.4 monospace' },
      children: tree.root.kind === 'leaf'
        ? _jsx(Leaf, {
            id: tree.root.id,
            global: globalCounter,
            branch: branchCounter,
            isTarget: tree.root.id === tree.targetId,
          })
        : _jsx(Branch, {
            node: tree.root,
            global: globalCounter,
            branch: branchCounter,
            targetId: tree.targetId,
          }),
    });
  }

  if (mode === 'counters' && counters) {
    return _jsx('div', {
      style: pageStyle(theme),
      children: _jsx('div', {
        style: listStyle(theme),
        children: counters.map((v, i) =>
          _jsx(CounterRow, { index: i, value: v, theme }, i),
        ),
      }),
    });
  }

  if (mode === 'rstyle' && rstyle) {
    return _jsx('div', {
      style: pageStyle(theme),
      children: _jsx('div', {
        style: listStyle(theme),
        children: rstyle.points.map((p, i) => {
          const choice = p ?? rstyle.shared;
          const bg = choice === 'B' ? COLOR_B : COLOR_A;
          return _jsx(RStyleRow, { index: i, bg, theme }, i);
        }),
      }),
    });
  }

  return _jsx('div', {
    style: pageStyle(theme),
    children: _jsx('div', { style: listStyle(theme), children: rows }),
  });
}

createRoot(document.getElementById('root')).render(_jsx(App, {}));

async function waitForReady() {
  for (let i = 0; i < 50 && (!externalSetRows || !externalSetTheme); i++) {
    await new Promise(r => requestAnimationFrame(r));
  }
  if (!externalSetRows) throw new Error('React mount never filled externalSetRows');
}
waitForReady().then(() =>
  autoRunIfRequested({
    setRows: (n) => externalSetRows(n),
    setTheme: (t) => externalSetTheme(t),
    setupHierarchy: (seed, nodes, maxDepth) => externalSetupHierarchy(seed, nodes, maxDepth),
    branchUpdate: (n) => externalBranchUpdate(n),
    globalUpdate: (n) => externalGlobalUpdate(n),
    setupCounters: (n) => externalSetupCounters(n),
    bumpCounter: (i, v) => externalBumpCounter(i, v),
    bumpRange: (s, e, v) => externalBumpRange(s, e, v),
    setupReactiveStyles: (n) => externalSetupReactiveStyles(n),
    setSharedColor: (name) => externalSetSharedColor(name),
    setPointColor: (i, name) => externalSetPointColor(i, name),
  })
);
</script>
</body>
</html>
