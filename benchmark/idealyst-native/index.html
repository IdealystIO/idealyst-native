<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benchmark · idealyst-native</title>
<style>
  /*
   * Page-level static chrome. The wasm renders its own root tree
   * under `#app`; this CSS just sets sane defaults for the controls
   * bar that lives outside the framework's mount point (so the
   * button click latency isn't tangled up with framework re-render
   * paths). The framework itself paints the rows and the surrounding
   * page chrome through its own stylesheets — those don't leak into
   * this <style> block.
   */
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body { background: #0f1115; color: #e8eaf0; }

  /* Controls bar — static HTML, not framework-rendered. Mirrors the
     other variants' header so the page looks like the others, but
     none of this participates in the perf measurement. */
  .controls {
    display: flex; gap: 16px; align-items: center;
    padding: 12px 16px; background: #1a1d24; border-bottom: 1px solid #2a2e3a;
  }
  button {
    padding: 6px 14px; border-radius: 6px;
    font-weight: 600; font-size: 13px; letter-spacing: 0.3px;
    border: 0; cursor: pointer;
    background: #5b6cff; color: #ffffff;
  }
  .rows-input {
    width: 90px; padding: 4px 8px; border-radius: 6px;
    border: 1px solid #2a2e3a; background: #262a35; color: #e8eaf0;
    font-size: 13px; font-variant-numeric: tabular-nums;
  }
  .rows-label { font-size: 13px; color: #9099a8; }
  #stats-readout {
    font-size: 13px; color: #9099a8;
    font-variant-numeric: tabular-nums;
  }
  /* Framework mount point. The wasm appends its rendered tree as a
     child of `#app`. */
  #app { min-height: 100vh; }
</style>
</head>
<body>
  <!-- Standalone controls — only render if NOT inside the runner iframe
       (the runner injects its own chrome). Lets you profile a single
       toggle from devtools without the instrumentation harness
       wrapping each measurement. -->
  <div class="controls" id="standalone-controls" style="display:none">
    <span class="rows-label">rows</span>
    <input id="rows-input" class="rows-input" type="number" min="1" max="100000" value="1000" />
    <button id="apply-rows-btn">Apply</button>
    <button id="toggle-btn">Toggle theme</button>
    <span id="stats-readout"></span>
  </div>
  <div id="app"></div>

  <script type="module">
    // Path is relative to this file. wasm-pack with --target=web
    // emits a JS shim alongside the .wasm; importing the shim
    // bootstraps the module.
    import init, {
      start, set_rows, set_theme_by_name, toggle, row_count, bench_stats_json,
      clear_phase_counters,
      setup_hierarchy, branch_update, global_update,
      setup_counters, bump_counter, bump_range,
      setup_reactive_styles, set_shared_color, set_point_color,
      setup_signal_class_rows,
    } from './wasm/pkg/benchmark_idealyst_native.js';
    import { autoRunIfRequested } from '../instrument.js';

    // Read ?rows=N out of the URL so a power user can deep-link to
    // a specific test size without retyping it on every reload.
    const params = new URLSearchParams(window.location.search);
    const initialRows = Math.max(1, Math.min(100_000, parseInt(params.get('rows') || '1000', 10)));

    await init();
    start(initialRows);

    // setRows / setTheme for the runner-iframe path. Both
    // resolve synchronously — the framework's signal fan-out is
    // synchronous and the web backend's DOM ops are too, so
    // by the time set_rows/set_theme_by_name return, the DOM
    // reflects the new state. Same applies to the hierarchy
    // hooks below.
    const setRows = async (n) => {
      set_rows(n);
    };
    const setTheme = async (name) => {
      set_theme_by_name(name);
    };
    const setupHierarchy = async (seed, nodes, maxDepth) => {
      setup_hierarchy(seed, nodes, maxDepth || 0);
    };
    const branchUpdate = async (n) => {
      branch_update(n);
    };
    const globalUpdate = async (n) => {
      global_update(n);
    };
    const setupCounters = async (n) => {
      setup_counters(n);
    };
    const bumpCounter = async (i, v) => {
      bump_counter(i, v);
    };
    const bumpRange = async (s, e, v) => {
      bump_range(s, e, v);
    };
    const setupReactiveStyles = async (n) => {
      setup_reactive_styles(n);
    };
    const setSharedColor = async (name) => {
      set_shared_color(name);
    };
    const setPointColor = async (i, name) => {
      set_point_color(i, name);
    };
    const setupSignalClassRows = async (n) => {
      setup_signal_class_rows(n);
    };

    // Expose framework controls as window globals for manual profiling
    // from the devtools console. Examples:
    //
    //   window.setRows(10000)
    //   window.toggle()
    //   window.benchStats()
    //
    window.toggle = toggle;
    window.setRows = (n) => set_rows(n);
    window.rowCount = () => row_count();
    window.benchStats = () => JSON.parse(bench_stats_json());
    // Convenience: also expose the batch.js JS-side counters so you can
    // see {calls, totalOps, lastOps, lastNodes} from the same console.
    window.batchStats = () => window.__idealystBatchStats;

    // Standalone-only controls. Hidden when:
    //   - Loaded inside the runner iframe (the runner sets ?suite=...).
    //   - Loaded inside any iframe at all (belt-and-suspenders — keeps
    //     the controls from leaking into measurement runs even if the
    //     runner ever changes how it invokes the variant).
    const inIframe = window.self !== window.top;
    if (!inIframe && !params.get('suite')) {
      const controls = document.getElementById('standalone-controls');
      const rowsInput = document.getElementById('rows-input');
      const applyBtn = document.getElementById('apply-rows-btn');
      const toggleBtn = document.getElementById('toggle-btn');
      const stats = document.getElementById('stats-readout');

      controls.style.display = 'flex';
      rowsInput.value = String(initialRows);

      applyBtn.addEventListener('click', () => {
        const n = Math.max(1, Math.min(100_000, parseInt(rowsInput.value, 10) || 1));
        set_rows(n);
        stats.textContent = `rows: ${n}`;
      });

      toggleBtn.addEventListener('click', () => {
        const t0 = performance.now();
        const name = toggle();
        const t1 = performance.now();
        stats.textContent = `${name} · sync ${(t1 - t0).toFixed(1)}ms`;
      });

      stats.textContent = `rows: ${initialRows}`;
    }

    // When the page is loaded inside the runner's iframe with a
    // `?suite=NAME` query param, this auto-runs the suite and posts
    // results back via `postMessage`. Standalone tab usage sees no
    // `?suite=` and this is a no-op.
    //
    // We wrap each suite hook so the framework's phase counters
    // start CLEAN at the first measured iteration — setup +
    // warmup costs (which we don't want to attribute) get cleared
    // before the real loop begins. After the suite finishes,
    // we dump the accumulated phase breakdown to the console
    // (visible in the parent devtools when the iframe is selected
    // OR when `?logPhases=1` redirects through `console.log` which
    // bubbles regardless of frame). Phase counters are a no-op
    // when `debug-stats` is OFF, so this costs nothing in
    // production builds.
    console.log('[idealyst-native] wrapper bootstrapping (debug-stats build)');
    (async () => {
      try {
        await autoRunIfRequested({
          setRows,
          setTheme,
          setupHierarchy: async (seed, nodes, maxDepth) => {
            await setupHierarchy(seed, nodes, maxDepth);
            clear_phase_counters();
          },
          branchUpdate,
          globalUpdate,
          setupCounters: async (n) => {
            await setupCounters(n);
            clear_phase_counters();
          },
          bumpCounter,
          bumpRange,
          setupReactiveStyles: async (n) => {
            await setupReactiveStyles(n);
            clear_phase_counters();
          },
          setSharedColor,
          setPointColor,
          setupSignalClassRows: async (n) => {
            await setupSignalClassRows(n);
            clear_phase_counters();
          },
        });
      } catch (err) {
        console.error('[idealyst-native] autoRunIfRequested threw:', err);
      }
      console.log('[idealyst-native] suite complete, draining phase counters');
      let stats;
      try {
        stats = JSON.parse(bench_stats_json());
      } catch (err) {
        console.error('[idealyst-native] bench_stats_json parse failed:', err);
        return;
      }
      const phases = stats.phases;
      const rows = (phases && typeof phases === 'object')
        ? Object.entries(phases).map(([name, c]) => ({
            phase: name,
            calls: c.calls,
            total_ms: (c.total_us / 1000).toFixed(2),
            max_us: c.max_us,
            avg_us: c.avg_us,
          }))
        : [];
      console.group('[idealyst-native] phase counters');
      if (rows.length === 0) {
        console.log('(empty — debug-stats off OR no instrumented work ran. phases value =', phases, ')');
      } else {
        console.table(rows);
      }
      console.log('raw phases JSON:', JSON.stringify(phases));
      console.groupEnd();

      // Also post the table to the parent so the runner-side
      // console catches it even if iframe logs are filtered out
      // in devtools. The runner's existing listener ignores
      // unknown message types, so this is safe to send.
      if (window.parent && window.parent !== window) {
        try {
          window.parent.postMessage(
            { type: 'idealyst-phases', phases, rows },
            '*',
          );
        } catch (_) { /* fine, just diagnostics */ }
      }
    })();
  </script>
</body>
</html>
