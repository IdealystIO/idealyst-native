[package]
name = "vtable-dispatch-test"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Framework regression test: exercises Box<dyn Trait> dispatch across many vtables to catch data-segment pruning that zeroes vtable bytes."

# `rlib` only — the CLI generates the per-platform wrapper crate that
# carries cdylib/staticlib and the entry point.
[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true }

[package.metadata.idealyst.app]
name      = "Vtable Dispatch Test"
bundle_id = "ai.truday.idealyst.vtable_dispatch_test"
version   = "0.0.1"
targets   = ["web"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
