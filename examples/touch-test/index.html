<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <base href="/" />
    <title>Touch Test — Idealyst</title>
    <style>
      html, body, #app { height: 100%; margin: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      /* Default to no native scroll/pinch on the host so touch
         handlers' `touch-action: none` (set per-subscribed-element
         by the backend) composes against a clean baseline. */
      body { touch-action: pan-y; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import init from "/pkg/touch_test.js";
      init();
    </script>
  </body>
</html>
