[package]
name = "mcp-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Walk-through of the mcp-catalog catalog. Defines a handful of components — including a cross-module duplicate and one doc-less entry — then prints both the flat catalog (raw bare-ident composes) and the resolved adjacency graph (proximity-disambiguated FQNs + reverse uses)."

[[bin]]
name = "mcp-demo"
path = "src/main.rs"

[dependencies]
# Enabling the `mcp` feature on `runtime-core` flips on the
# emission gate in `runtime-macros` AND pulls `mcp-catalog` in
# as a transitive dep — so every `#[component]` expansion across
# the dep graph (including idea-ui's, when it's used) emits a
# catalog entry. Consumers don't need to depend on `mcp-catalog`
# or `runtime-macros` directly.
runtime-core = { workspace = true, features = ["mcp"] }
# This demo's `main.rs` reads the catalog programmatically, so it
# does need `mcp-catalog` directly. A pure-consumer crate that
# just registers components would only need `runtime-core/mcp`.
mcp-catalog = { workspace = true }
# `mcp-server` provides the stdio MCP entry-point so the demo can
# also launch as a real MCP server (`cargo run -p mcp-demo -- --serve`).
mcp-server = { workspace = true }
# `tokio` for the `--serve` async runtime — small enough as a demo dep.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde_json = "1"

# NOTE on third-party catalog flow (e.g. pulling in idea-ui):
# Adding `idea-ui = { workspace = true }` to this crate compiles
# fine — the feature-forward chain (runtime-core/mcp →
# runtime-macros/mcp + dep:mcp-catalog) does its job — but
# `inventory`'s linker-section magic only fires for rlib symbols
# that the linker actually pulls in. Adding the dep alone doesn't
# guarantee idea-ui's `inventory::submit!` ctors get linked; the
# binary has to reference each component's symbol (or each rlib
# has to expose a `#[used] static` that pins its submissions).
# Spec §9.3 flags this as "needs validation" — see that section
# for the path forward (most likely a `#[used]` marker emitted by
# the proc-macro alongside the inventory::submit!).
