<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <base href="/" />
    <title>Camera + Screen → Video — Idealyst</title>
    <style>
      html, body, #app { height: 100%; margin: 0; }
      body { background: #f7f8fb; }
      /* Keep both live feeds a sensible size so the page stays usable. */
      #app video {
        width: 420px;
        max-width: 100%;
        height: 236px;
        background: #111;
        object-fit: cover;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import init from "/pkg/media_sources_demo.js";
      init();
    </script>
  </body>
