[package]
name = "native-test"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Smoke test for the wgpu native runtime. Opens a phone-sized window and renders a small UI."

[[bin]]
name = "native-test"
path = "src/main.rs"

[dependencies]
framework-core = { workspace = true }
idea-ui = { workspace = true }
native-phone = { workspace = true }
native-tablet = { workspace = true }
native-tv = { workspace = true }
render-wgpu = { workspace = true }
ios-sim = { workspace = true }
android-sim = { workspace = true }
icons-lucide = { workspace = true }
# Mandelbrot demo uses wgpu directly through the
# `render_wgpu::graphics_with_drawer` extension. Match the
# version + feature flags that the renderer crate links against
# so a single wgpu instance is shared at runtime.
wgpu = { version = "29", default-features = false, features = ["wgsl"] }
bytemuck = { version = "1", features = ["derive"] }
