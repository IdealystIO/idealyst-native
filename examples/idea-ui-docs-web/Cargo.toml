[package]
name = "idea-ui-docs-web"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Web wrapper for the idea-ui-docs example"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
framework-core = { workspace = true }
backend-web = { workspace = true }
idea-ui-docs = { path = "../idea-ui-docs" }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
lol_alloc = "0.4"

# wasm-opt's bundled binaryen rejects bulk-memory ops emitted by
# recent rustc (and we don't want to chase a newer binaryen on every
# update). The wasm is fine without the post-pass — it's still LTO'd
# at link time. Re-enable if/when wasm-pack ships a binaryen with
# `--enable-bulk-memory` on by default.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
