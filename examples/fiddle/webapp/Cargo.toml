[package]
name = "fiddle-webapp"
version = "0.0.1"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Idealyst-built editor UI for the fiddle server. Compiles to wasm via `wasm-pack build webapp/`; the resulting `pkg/` is served by the fiddle binary."

# `[workspace]` makes this its own workspace root (same reason as
# the snippet template — keeps our `target/` from being yanked into
# the parent workspace's shared dir).
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
runtime-core = { path = "../../../crates/framework/core", features = ["async-driver"] }
idea-ui = { path = "../../../crates/ui/idea-ui" }
idea-codeblock = { path = "../../../crates/sdk/idea-codeblock" }
webview = { path = "../../../crates/sdk/webview" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { path = "../../../crates/backend/web", features = ["async-driver"] }
wasm-bindgen = "0.2"
# `fetch` from wasm calls into the browser via web-sys; the future
# returned by `JsFuture::from(promise)` runs on `wasm-bindgen-futures`.
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console",
    "Headers",
    "Request",
    "RequestInit",
    "Response",
    "Window",
] }
console_error_panic_hook = "0.1"
lol_alloc = "0.4"
# Same size-conservative dev profile as the rest of the workspace.

[profile.dev]
opt-level = "z"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
