[package]
name = "hello-world"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Hello-world example — single platform-agnostic crate; the CLI materializes per-platform wrappers"

# `cdylib` for the wasm target (browser load via wasm-bindgen);
# `rlib` so the CLI's generated native wrappers (target/idealyst/<platform>/)
# can depend on this crate as a library.
[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Render an animated Mandelbrot via the `Graphics` surface primitive.
# Off by default — apps that don't use the gradient demo don't pay
# for wgpu or its per-platform fanout.
#
# Pulls in:
# - framework-core's `async-driver` feature for cross-platform
#   `render_loop` + `spawn_async` (the per-frame ticker and the async
#   driver wgpu init runs on),
# - `wgpu` itself, picked per-target below,
# - `bytemuck` for the `#[repr(C)] Pod` derive on `Uniforms`.
#
# The wgpu pipeline + shader live in `gradient.rs` and run unmodified
# on every platform — what differs across platforms is only the
# *driver* (loop + async init), which framework-core hides.
graphics = [
    "framework-core/async-driver",
    "dep:wgpu",
    "dep:bytemuck",
]

# Robot — MCP-style automation surface. Required for the `#[component]`
# macro's auto-registration of `methods!` blocks: when off, the registry
# call inside the expansion is `#[cfg]`-skipped and the binary pays
# nothing.
robot = ["framework-core/robot"]

# Framework render telemetry. Forwards to framework-core's
# `debug-stats` feature. When on, render timings stream to the
# console / NSLog and `dump_debug_events()` is exposed for ad-hoc
# inspection.
debug-stats = ["framework-core/debug-stats"]

# Connect to a running `idealyst dev` server on startup instead of
# rendering the local `app()` tree. Pulls in the `dev-client` crate
# (replay engine) and `backend-web/aas-shell` (browser transport)
# only when the feature is on.
dev-hot-reload = ["dep:dev-client", "backend-web/aas-shell"]

[dependencies]
framework-core = { workspace = true }
icons-lucide = { workspace = true }
bytemuck = { version = "1", features = ["derive"], optional = true }

# Web build of wgpu: WebGPU + WebGL2 fallback.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "29", default-features = false, features = ["webgl", "webgpu", "wgsl"], optional = true }
backend-web = { workspace = true }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
# Smaller WASM allocator — slightly higher per-alloc cost in exchange
# for a few KB shaved off the bundle.
lol_alloc = "0.4"
# Only pulled in under `dev-hot-reload`. Cargo silently drops the
# activation on non-wasm targets because the dep isn't declared there.
# `dev-hot-reload` activates `backend-web/aas-shell` which forwards
# to `dev-client/dev-hot-reload` — no explicit feature here needed.
dev-client = { workspace = true, optional = true }

# Android build of wgpu: Vulkan + GLES fallback.
[target.'cfg(target_os = "android")'.dependencies]
wgpu = { version = "29", default-features = false, features = ["vulkan", "gles", "wgsl"], optional = true }

# iOS build of wgpu: Metal.
[target.'cfg(target_os = "ios")'.dependencies]
wgpu = { version = "29", default-features = false, features = ["metal", "wgsl"], optional = true }

# wasm-opt's bundled binaryen rejects bulk-memory ops emitted by recent
# rustc; pass the enable flags explicitly. `-Oz` prioritizes size like
# `opt-level = "z"` does for rustc.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--strip-debug", "--strip-producers", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

# Idealyst project config. The CLI reads this on `idealyst build`,
# `idealyst run`, `idealyst dev`, etc. Per-platform projects (ios/,
# android/, web/) are ephemeral by default — `idealyst scaffold
# <platform>` materializes a hand-editable copy into the repo.
[package.metadata.idealyst.app]
name      = "Hello World"
bundle_id = "ai.truday.idealyst.hello-world"
version   = "0.0.1"
# Default platforms to build when `idealyst build` is invoked with
# no target list. Override on the command line: `idealyst build ios`.
targets   = ["web", "ios", "android"]

# Splash-screen settings. The CLI fills in any missing field with
# sensible defaults — this block is here as a working example.
# Set `duration_ms = 0` to disable the splash.
[package.metadata.idealyst.app.splash]
background  = "#0f1115"
title       = "Hello World"
title_color = "#ffffff"
duration_ms = 1200
