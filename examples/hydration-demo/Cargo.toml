[package]
name = "hydration-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Prototype: true in-place SSR hydration (DOM adoption) + viewport determinism"

# `cdylib` for the wasm bundle (the CLI-generated wrapper provides the
# `#[wasm_bindgen(start)]` entry, which HYDRATES a server-rendered `#app`);
# `rlib` so the native `examples/ssr.rs` can call `app()` to produce the
# server-rendered HTML.
[lib]
crate-type = ["cdylib", "rlib"]

[features]
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper
# (build-runtime-server). Pulls `dev-server` so
# `register_extensions_recorder` is compiled against the recorder backend.
sidecar = ["dep:dev-server"]

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true }
# Recorder backend for the runtime-server sidecar wrapper. Optional —
# pulled in only by the `sidecar` feature (host-side sidecar build);
# never compiled for device/web targets.
dev-server = { workspace = true, optional = true }

# The native SSR generator (`examples/ssr.rs`) renders `app()` to HTML.
[dev-dependencies]
backend-ssr = { workspace = true }

# Idealyst project config — read by `idealyst build --web` / `serve`.
[package.metadata.idealyst.app]
name      = "Hydration Demo"
bundle_id = "ai.truday.idealyst.hydration_demo"
version   = "0.0.1"
targets   = ["web"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
