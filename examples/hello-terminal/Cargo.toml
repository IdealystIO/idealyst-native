[package]
name = "hello-terminal"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "ASCII / terminal demo for the idealyst framework. Mouse-clickable buttons + keyboard shortcuts, all rendered as box-drawing characters in your terminal."

[[bin]]
name = "hello-terminal"
path = "src/main.rs"

[dependencies]
framework-core = { workspace = true }
host-terminal = { workspace = true }

[dev-dependencies]
backend-terminal = { workspace = true }
welcome = { path = "../welcome" }
