"""A book in the catalog."""
type Book {
  id: ID!
  title: String!
  author: String!
}

type Query {
  """All books, newest first."""
  books: [Book!]!
}

type Mutation {
  """Add a book and return it."""
  addBook(title: String!, author: String!): Book!
}

schema {
  query: Query
  mutation: Mutation
}
