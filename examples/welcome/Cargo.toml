[package]
name = "welcome"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Animated welcome demo — three-act cinematic intro driven by the framework's animation system (springs + tweens + a raf-driven sun/vignette/planet pulse). Also the source of truth for the `idealyst new` scaffold; the CLI copies this project verbatim."

# Pure `rlib`. The per-platform wrappers the CLI generates
# (`target/idealyst/welcome/{web,ios,android}/wrapper/`) carry the
# platform-specific crate-type (cdylib for web/Android, staticlib for
# iOS) and entry-point boilerplate; this crate depends on nothing
# platform-specific, has no `#[cfg(target_os = "...")]` blocks, no
# `web.rs`/`ios.rs`/`android.rs`, and ships the same bytes to every
# backend.
[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true }

# No backend deps: `register_extensions` is generic over `Backend` (this
# scaffold registers no third-party SDKs), so the app crate is fully
# platform-agnostic — the CLI-generated wrappers bring their own concrete
# backend. A project that adds a navigator / external SDK specializes
# `register_extensions` to that backend's concrete type and adds the
# matching backend dep then.

[package.metadata.idealyst.app]
name      = "Welcome"
bundle_id = "ai.truday.idealyst.welcome"
version   = "0.0.1"
targets   = ["web", "ios", "android"]
