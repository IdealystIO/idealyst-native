[package]
name = "welcome"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Animated welcome demo — three-act cinematic intro driven by the framework's animation system (springs + tweens + a raf-driven sun/vignette/planet pulse). Also the source of truth for the `idealyst new` scaffold; the CLI copies this project verbatim."

# Pure `rlib`. The per-platform wrappers the CLI generates
# (`target/idealyst/welcome/{web,ios,android}/wrapper/`) carry the
# platform-specific crate-type (cdylib for web/Android, staticlib for
# iOS) and entry-point boilerplate; this crate depends on nothing
# platform-specific, has no `#[cfg(target_os = "...")]` blocks, no
# `web.rs`/`ios.rs`/`android.rs`, and ships the same bytes to every
# backend.
[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true }

# Target-gated: the CLI-generated wrappers call
# `register_extensions(&mut <Backend>)` per platform before mount.
# Empty body on this crate (no SDK deps to install), but the
# function signature + matching backend dep must exist per target.
[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

# Terminal (TTY) target. Same `register_extensions(&mut TerminalBackend)`
# contract — body is empty because welcome has no navigator/external SDKs.
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android")))'.dependencies]
backend-terminal = { workspace = true }

[package.metadata.idealyst.app]
name      = "Welcome"
bundle_id = "ai.truday.idealyst.welcome"
version   = "0.0.1"
targets   = ["web", "ios", "android"]
