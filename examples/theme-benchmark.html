<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Framework-Fidelity Theme Toggle Benchmark</title>
<style>
  /* Baseline that mirrors `.ui-default` from the web backend. Every
     framework-built View/ScrollView gets this class on creation. */
  .ui-default { display: flex; flex-direction: column; }

  /* Page chrome — NOT part of the perf comparison. The framework's
     equivalents (Page, PerfControls, PerfList, etc.) also exist, but
     for the head-to-head we only need to match what wraps the 1000
     rows: a scroller with overflow:hidden, a border, and the same
     row stylesheet. */
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .page {
    padding: 32px;
    gap: 24px;
    min-height: 100%;
    transition: background 250ms ease-in-out, color 250ms ease-in-out;
  }
  .controls {
    flex-direction: row;
    gap: 16px;
    align-items: center;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
  button {
    padding: 4px 16px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
    border: 0;
    cursor: pointer;
  }
  #stats {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }
  /* Scroller container — mirrors `PerfList`. */
  .perf-list {
    border-radius: 10px;
    border: 1px solid;
    height: 500px;
    overflow: hidden;
    overflow-y: auto;
    transition: background 250ms ease-in-out, border-color 250ms ease-in-out;
  }
</style>
</head>
<body>
  <div class="ui-default page" id="page">
    <div class="ui-default controls" id="controls">
      <button id="toggle">Toggle theme</button>
      <span id="stats">Click toggle to measure transition</span>
    </div>
    <div class="ui-default perf-list" id="list"></div>
  </div>

  <script>
    // ===================================================================
    // Theme data — mirrors light_theme() / dark_theme() in
    // examples/hello/src/lib.rs. The only values the perf row actually
    // reads are surface, surface_alt, text, border (for border-bottom).
    // We keep page-level fields too so the chrome can react to toggles
    // the same way the framework's Page stylesheet does.
    // ===================================================================
    const LIGHT = {
      background: '#f7f7fb',
      surface: '#ffffff',
      surface_alt: '#eef0f7',
      text: '#1a1a1f',
      border: '#e4e6ef',
      primary: '#5b6cff',
      primary_text: '#ffffff',
    };
    const DARK = {
      background: '#0f1115',
      surface: '#1a1d24',
      surface_alt: '#262a35',
      text: '#e8eaf0',
      border: '#2a2e3a',
      primary: '#8b9aff',
      primary_text: '#0f1115',
    };

    // ===================================================================
    // Stylesheet plumbing — mirrors the web backend's shared <style>
    // element + insert_rule/delete_rule index machinery. Each theme×
    // parity combination is a distinct class with a hash-derived name
    // (just like the framework's `hash_class_name`). On theme swap we
    // mint *new* classes (insertRule) before swapping element.className
    // — same write pattern as the backend's impl_apply_styled_states.
    // ===================================================================
    const styleEl = document.createElement('style');
    document.head.appendChild(styleEl);
    const sheet = styleEl.sheet;

    function insertRule(className, body) {
      const rule = `.${className} { ${body} }`;
      const idx = sheet.cssRules.length;
      sheet.insertRule(rule, idx);
      return idx;
    }

    // Track rule indices so we can delete the previous theme's classes
    // after a swap — same lifecycle as DynamicSlot in the backend.
    const liveRuleIndices = new Set();

    function deleteAllRules() {
      // Walk highest-to-lowest so indices stay valid as we delete.
      const arr = [...liveRuleIndices].sort((a, b) => b - a);
      for (const i of arr) sheet.deleteRule(i);
      liveRuleIndices.clear();
    }

    // Deterministic 16-hex-char class name, mirroring
    // backend-web::style::hash_class_name. Implementation details
    // differ (we don't have DefaultHasher), but the *shape* matches:
    // 'ui-' + 16 hex chars derived from the content key.
    function hashClassName(key) {
      let h1 = 0xdeadbeef ^ 0;
      let h2 = 0x41c6ce57 ^ 0;
      for (let i = 0; i < key.length; i++) {
        const ch = key.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
      h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
      h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      const a = (h1 >>> 0).toString(16).padStart(8, '0');
      const b = (h2 >>> 0).toString(16).padStart(8, '0');
      return 'ui-' + a + b;
    }

    // ===================================================================
    // Generate the per-row stylesheet body. This mirrors what
    // `rules_to_css` would emit for `PerfRow` with the active theme
    // and parity. Every declaration ordered + named the way the
    // backend writes them — including the 'display: flex' default,
    // explicit flex-direction: column, padding/border long-form, and
    // the comma-joined `transition` list at the end.
    // ===================================================================
    function perfRowCss(theme, parity) {
      const bg = parity === 'odd' ? theme.surface_alt : theme.surface;
      const decls = [
        'display: flex',
        'flex-direction: column',
        `background: ${bg}`,
        `color: ${theme.text}`,
        'padding-top: 8px',
        'padding-right: 16px',
        'padding-bottom: 8px',
        'padding-left: 16px',
        'border-bottom-width: 1px',
        'border-bottom-style: solid',
        `border-bottom-color: ${theme.border}`,
        'font-size: 13px',
        'height: 36px',
        'justify-content: center',
        'transition: background 250ms ease-in-out, color 250ms ease-in-out, border-bottom-color 250ms ease-in-out',
      ];
      return decls.join('; ');
    }

    // Page-chrome CSS (matches what the framework emits for `Page`,
    // `PerfList`, `PerfControls`). We don't restyle the chrome per
    // toggle; we drive its colors via two top-level rules that get
    // re-minted on each toggle so the chrome transitions in sync.
    function pageCss(theme) {
      return [
        'display: flex',
        'flex-direction: column',
        `background: ${theme.background}`,
        `color: ${theme.text}`,
      ].join('; ');
    }
    function listCss(theme) {
      return [
        `background: ${theme.surface}`,
        `border-color: ${theme.border}`,
      ].join('; ');
    }
    function controlsCss(theme) {
      return [
        `background: ${theme.surface}`,
        `border-color: ${theme.border}`,
        `color: ${theme.text}`,
      ].join('; ');
    }
    function buttonCss(theme) {
      return [
        `background: ${theme.primary}`,
        `color: ${theme.primary_text}`,
      ].join('; ');
    }

    // ===================================================================
    // Build the row tree. 1000 rows, each:
    //   <div class="ui-default ui-<rowHash>">
    //     <div class="ui-default ui-<textHash>">Row #N</div>
    //   </div>
    // The outer class carries layout + background/color/border + the
    // transition list; the inner Text node carries only color/font.
    // For the inner Text we re-use one class per theme (text doesn't
    // alternate). This matches the framework: every Text child is
    // styled independently with its own style effect, but the
    // resolved class hashes to the same name across rows.
    // ===================================================================
    const COUNT = 1000;
    const list = document.getElementById('list');
    const rows = []; // outer .ui-default row divs
    const texts = []; // inner .ui-default text divs

    {
      const frag = document.createDocumentFragment();
      for (let i = 0; i < COUNT; i++) {
        const row = document.createElement('div');
        row.className = 'ui-default';
        const text = document.createElement('div');
        text.className = 'ui-default';
        text.textContent = `Row #${i}`;
        row.appendChild(text);
        frag.appendChild(row);
        rows.push(row);
        texts.push(text);
      }
      list.appendChild(frag);
    }

    // ===================================================================
    // Apply a theme. This is the hot path we're benchmarking.
    //
    // Sequence (matches the backend):
    //   1. Mint fresh classes for the new theme — one for each
    //      (parity), one for the text, plus chrome classes.
    //      Each goes through insertRule into the shared sheet.
    //   2. Walk every row and call element.setAttribute('class', ...)
    //      with its new (parity-specific) class. Inner text too.
    //      This is the work that scales with row count and is the
    //      bottleneck under the framework: 2000 setAttribute calls
    //      per toggle (1000 rows + 1000 texts).
    //   3. Delete the previous theme's rules. The framework defers
    //      this slightly too (via free_rule_indices recycling); we
    //      do a straight delete here, which is cheaper.
    // ===================================================================
    let activeRules = null; // { row_even_idx, row_odd_idx, text_idx, page_idx, list_idx, controls_idx, button_idx }
    let activeClasses = null;

    function applyTheme(theme, themeTag) {
      // Step 1: mint classes. Distinct content keys per (theme, parity)
      // produce distinct hashed names. We append themeTag to the key
      // to guarantee a new hash each toggle even if the user toggles
      // light → dark → light (the cache lookup in the framework
      // wouldn't re-mint; we *force* a re-mint to match the worst
      // case of a fresh theme value).
      const rowEvenKey = `PerfRow|even|${themeTag}`;
      const rowOddKey = `PerfRow|odd|${themeTag}`;
      const textKey = `Text|${themeTag}`;
      const pageKey = `Page|${themeTag}`;
      const listKey = `PerfList|${themeTag}`;
      const controlsKey = `PerfControls|${themeTag}`;
      const buttonKey = `PrimaryButton|${themeTag}`;

      const rowEvenCls = hashClassName(rowEvenKey);
      const rowOddCls = hashClassName(rowOddKey);
      const textCls = hashClassName(textKey);
      const pageCls = hashClassName(pageKey);
      const listCls = hashClassName(listKey);
      const controlsCls = hashClassName(controlsKey);
      const buttonCls = hashClassName(buttonKey);

      const rules = {};
      rules.row_even = insertRule(rowEvenCls, perfRowCss(theme, 'even'));
      rules.row_odd = insertRule(rowOddCls, perfRowCss(theme, 'odd'));
      rules.text = insertRule(textCls, `color: ${theme.text}; transition: color 250ms ease-in-out`);
      rules.page = insertRule(pageCls, pageCss(theme));
      rules.list = insertRule(listCls, listCss(theme));
      rules.controls = insertRule(controlsCls, controlsCss(theme));
      rules.button = insertRule(buttonCls, buttonCss(theme));
      for (const k of Object.keys(rules)) liveRuleIndices.add(rules[k]);

      // Step 2: per-element className writes. This is the 1000-fold
      // work. We use setAttribute('class', ...) to exactly match the
      // backend's `element.set_attribute("class", &class_name)`.
      const setAttr = Element.prototype.setAttribute;
      for (let i = 0; i < COUNT; i++) {
        const cls = (i % 2 === 0) ? rowEvenCls : rowOddCls;
        setAttr.call(rows[i], 'class', `ui-default ${cls}`);
        setAttr.call(texts[i], 'class', `ui-default ${textCls}`);
      }
      setAttr.call(document.getElementById('page'), 'class', `ui-default page ${pageCls}`);
      setAttr.call(document.getElementById('list'), 'class', `ui-default perf-list ${listCls}`);
      setAttr.call(document.getElementById('controls'), 'class', `ui-default controls ${controlsCls}`);
      setAttr.call(document.getElementById('toggle'), 'class', buttonCls);

      // Step 3: drop previous theme's rules. Delete highest indices
      // first to keep lower ones valid.
      if (activeRules) {
        const prev = [];
        for (const k of Object.keys(activeRules)) prev.push(activeRules[k]);
        prev.sort((a, b) => b - a);
        for (const idx of prev) {
          sheet.deleteRule(idx);
          liveRuleIndices.delete(idx);
        }
        // Indices of the *just-inserted* rules will have shifted down
        // by the number of deletions that fell below them. We don't
        // need them again (next toggle re-inserts), but bookkeeping
        // for activeRules has to reflect that — easiest: recompute
        // by tracking current sheet order. Since we always delete all
        // previous and insert all new in a fixed order, the freshly-
        // inserted ones now occupy indices [0..N-1] after the deletes.
        // For simplicity we rebuild from sheet.cssRules length:
        // remap by class name.
        rules.row_even = findRuleIdx(rowEvenCls);
        rules.row_odd = findRuleIdx(rowOddCls);
        rules.text = findRuleIdx(textCls);
        rules.page = findRuleIdx(pageCls);
        rules.list = findRuleIdx(listCls);
        rules.controls = findRuleIdx(controlsCls);
        rules.button = findRuleIdx(buttonCls);
      }
      activeRules = rules;
      activeClasses = { rowEvenCls, rowOddCls, textCls, pageCls, listCls, controlsCls, buttonCls };
    }

    function findRuleIdx(className) {
      const target = `.${className}`;
      for (let i = 0; i < sheet.cssRules.length; i++) {
        const r = sheet.cssRules[i];
        if (r.selectorText === target) return i;
      }
      return -1;
    }

    // ===================================================================
    // Toggle handler — instruments the apply path with the same
    // measurements as before: JS-side apply time, first paint after
    // the change, frames during the 250ms transition window, worst
    // frame gap.
    // ===================================================================
    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    let toggleN = 0;
    let isDark = false;
    // Prime: install the initial (light) theme.
    applyTheme(LIGHT, `init-${toggleN}`);

    document.getElementById('toggle').addEventListener('click', async () => {
      toggleN++;
      isDark = !isDark;
      const theme = isDark ? DARK : LIGHT;

      const t0 = performance.now();
      applyTheme(theme, `t-${toggleN}`);
      const applyDone = performance.now();

      let frames = 0;
      let lastFrame = applyDone;
      let maxFrameGap = 0;
      const firstFrame = await nextFrame();
      const firstPaintDelay = firstFrame - t0;

      const TRANSITION_MS = 250;
      const deadline = t0 + TRANSITION_MS + 50;
      while (performance.now() < deadline) {
        const t = await nextFrame();
        const gap = t - lastFrame;
        if (gap > maxFrameGap) maxFrameGap = gap;
        lastFrame = t;
        frames++;
      }
      const elapsed = performance.now() - t0;
      const avgFps = (frames / (elapsed / 1000)).toFixed(1);

      document.getElementById('stats').textContent =
        `theme=${isDark ? 'dark' : 'light'} | rows=${COUNT} | ` +
        `apply (mint+swap): ${(applyDone - t0).toFixed(2)}ms | ` +
        `first paint: ${firstPaintDelay.toFixed(2)}ms | ` +
        `frames: ${frames} | avg fps: ${avgFps} | ` +
        `worst frame: ${maxFrameGap.toFixed(2)}ms`;
    });
  </script>
</body>
</html>
