[package]
name = "lazy-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Demo of `lazy! { ... }` — the framework's code-splitting primitive. The marked UI subtree is hoisted into a separate wasm bundle on web (via wasm-split) and inlined as a regular function call on native."

[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true }

# Target-gated backend deps mirror the welcome example. Per-target
# `register_extensions` lives in `src/lib.rs`.
[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
# `lazy!` expands to `#[wasm_split]`-annotated functions on wasm32.
# The `wasm-split` runtime is needed only on wasm — the macro is
# transparent on native targets (no dep reference there).
wasm-split = { workspace = true }

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

# Terminal default (matches welcome's setup).
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android")))'.dependencies]
backend-terminal = { workspace = true }

[package.metadata.idealyst.app]
name      = "Lazy Demo"
bundle_id = "ai.truday.idealyst.lazy_demo"
version   = "0.0.1"
targets   = ["web", "ios", "android"]
