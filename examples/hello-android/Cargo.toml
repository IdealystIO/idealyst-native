[package]
name = "hello-android"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# `cdylib` produces the `libhello_android.so` that the Android Gradle
# build packs into the APK and `System.loadLibrary("hello_android")`
# loads at Activity start.
crate-type = ["cdylib"]

[dependencies]
framework-core = { workspace = true }
hello = { path = "../hello" }

[target.'cfg(target_os = "android")'.dependencies]
backend-android = { workspace = true }
jni = "0.21"
log = "0.4"
