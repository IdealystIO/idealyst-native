[package]
name = "hello-ios-aas"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
# `staticlib` produces the `libhello_ios_aas.a` that Xcode links
# into the iOS app bundle. The C-exported entry points (`ios_main`,
# `ios_teardown`) come from `backend-ios` when its `aas-shell`
# feature is on — this crate exists only to be the staticlib
# Xcode references.
crate-type = ["staticlib"]

[target.'cfg(target_os = "ios")'.dependencies]
# Activating the `aas-shell` feature on backend-ios is what causes
# the staticlib to export `ios_main` / `ios_teardown` and pull in
# the cross-platform `dev-client::AasShell` worker loop. Without
# this feature, `backend-ios` is a plain native backend.
backend-ios = { workspace = true, features = ["aas-shell"] }
