[package]
name = "whiteboard-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Whiteboard demo — a freehand-drawable canvas (canvas SDK) with a non-recorded overlay toolbar (screen-recorder PrivateLayer), a recordable camera widget (camera → video), screen recording (screen-recorder → MediaStream), and a live recording preview rendered inside the private layer so it doesn't feed back into the capture."

[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true, features = ["async-driver"] }
idea-ui = { workspace = true }
icons-lucide = { workspace = true }
stack-navigator = { workspace = true }
canvas = { workspace = true }
canvas-native = { workspace = true }
camera = { workspace = true }
media-stream = { workspace = true }
video = { workspace = true }
screen-recorder = { workspace = true }
media-writer = { workspace = true }
file-export = { workspace = true }
files = { workspace = true }

# The concrete backend each platform's wrapper hands to `register_extensions`,
# where the canvas / video / screen-recorder externals register their handlers.
[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
# Blob-URL playback of a recorded file (web has no `file://`; IndexedDB bytes →
# `URL.createObjectURL`). See `resolve_playback_url`.
js-sys = "0.3"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Blob", "BlobPropertyBag", "Url"] }

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }
# GPU canvas on macOS (vello/Metal) — overrides canvas-native (last-wins).
canvas-vello = { workspace = true }

[package.metadata.idealyst.app]
name      = "Whiteboard"
bundle_id = "ai.truday.idealyst.whiteboard"
version   = "0.0.1"
targets   = ["ios", "android", "web", "macos"]

[package.metadata.idealyst.app.permissions]
camera = "Whiteboard shows your camera feed in the corner of the board."
