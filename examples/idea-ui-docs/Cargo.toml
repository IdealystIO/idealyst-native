[package]
name = "idea-ui-docs"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Self-referencing documentation app for idea-ui"

# `cdylib` for the wasm target; `rlib` so CLI-generated native
# wrappers under `target/idealyst/<platform>/` can depend on this
# crate as a library.
[lib]
crate-type = ["cdylib", "rlib"]

[features]
# No-op feature consumed by the auto-generated web wrapper under
# `target/idealyst/<app>/web/wrapper/`. The wrapper template's
# `runtime-server` feature forwards to `<app>/runtime-server`, so
# this crate needs to define it (even though there's nothing here
# that gates on it). See `cli::cmd::dev` comments.
runtime-server = []
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper
# (build-runtime-server). Pulls `dev-server` + the drawer SDK's
# recording handler so `register_extensions_recorder` can register a
# navigator recording handler on the runtime-server recorder backend.
# Kept separate from `runtime-server` (the web *client* wrapper's
# feature, which is enabled on wasm builds where dev-server can't
# compile).
sidecar = ["dep:dev-server", "drawer-navigator/runtime-server"]
# `terminal`: forces the terminal backend on the host. The terminal target
# builds for the host triple, so on a macOS host it collides with
# `backend-macos` and `cfg(target_os)` can't disambiguate — the CLI's
# terminal wrapper enables this feature to break the tie. (See the
# tutorial's Cargo.toml for the full rationale.)
terminal = ["dep:backend-terminal", "drawer-navigator/terminal"]
# Forwards the framework's `debug-stats` instrumentation through to
# `runtime-core` AND the Android backend's phase_timer module. Per
# CLAUDE.md section 6, the VARIANT crate must declare its own
# `debug-stats` (not just put `features = ["debug-stats"]` on a dep
# line) so that backend-android-mobile's PhaseTimer compiles to the
# real timing struct. Currently default-on so `idealyst dev --android`
# bakes in instrumentation without extra flags; flip back to opt-in
# once a regression hunt is over.
debug-stats = [
    "runtime-core/debug-stats",
    "backend-android-mobile/debug-stats",
]
default = ["debug-stats"]

# Cross-platform render-parity test (`idealyst test --parity web,macos`).
# `robot-test` drives the running app over the Robot bridge — see
# `tests/parity.rs`.
[dev-dependencies]
robot-test = { workspace = true }
serde_json = "1"

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true, features = ["docs"] }
drawer-navigator = { workspace = true }
# Recorder backend for the runtime-server sidecar wrapper. Optional —
# pulled in only by the `sidecar` feature (host-side sidecar build);
# never compiled for device/web targets.
dev-server = { workspace = true, optional = true }
# Theme-aware syntax-highlighted code panels for the snippet blocks
# in every component page.
codeblock = { workspace = true }
# Real HTML <table> on web via Element::External; flex fallback on
# native. Powers PropsTable on every component page.
table = { workspace = true }
# Lucide icon pack — provides the `MENU` glyph for the mobile
# hamburger that opens the collapsed drawer.
icons-lucide = { workspace = true }

# Web-only deps. The cross-platform `app()` tree never references
# these; the wasm-bindgen entry in the CLI-generated wrapper is gated
# to wasm32.
[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
lol_alloc = "0.4"

# Native backend deps for the CLI-generated wrappers. Each wrapper's
# `register_extensions(&mut <Backend>)` lives in `lib.rs` behind a
# matching `#[cfg(...)]` block.
[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal backend — pulled in ONLY by the `terminal` feature (the CLI's
# terminal wrapper enables it). It can't be a `target_os` dependency like
# the others: the terminal target builds for the host triple, so on a
# macOS host it shares macOS's triple and would collide with
# `backend-macos`. The feature is the disambiguator. See `[features]`.
[dependencies.backend-terminal]
workspace = true
optional = true

# wasm-opt's bundled binaryen rejects bulk-memory ops emitted by
# recent rustc; the wasm is still LTO'd at link time without the
# post-pass. Re-enable if/when wasm-pack ships a binaryen with
# `--enable-bulk-memory` on by default.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# Idealyst project config — read by `idealyst build`, `idealyst run`,
# `idealyst dev`. Per-platform projects (ios/, android/, web/) are
# ephemeral; run `idealyst scaffold <platform>` for a hand-editable
# copy.
[package.metadata.idealyst.app]
name      = "idea-ui Docs"
bundle_id = "io.idealyst.idea_ui_docs"
version   = "0.0.1"
targets   = ["web", "ios", "android"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
