[package]
name = "idea-ui-docs"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Self-referencing documentation app for idea-ui"

# `cdylib` for the wasm target; `rlib` so CLI-generated native
# wrappers under `target/idealyst/<platform>/` can depend on this
# crate as a library.
[lib]
crate-type = ["cdylib", "rlib"]

[features]
# No-op feature consumed by the auto-generated web wrapper under
# `target/idealyst/<app>/web/wrapper/`. The wrapper template's
# `runtime-server` feature forwards to `<app>/runtime-server`, so
# this crate needs to define it (even though there's nothing here
# that gates on it). See `cli::cmd::dev` comments.
runtime-server = []

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true, features = ["docs"] }
drawer-navigator = { workspace = true }
# Theme-aware syntax-highlighted code panels for the snippet blocks
# in every component page.
idea-codeblock = { workspace = true }
# Real HTML <table> on web via Element::External; flex fallback on
# native. Powers PropsTable on every component page.
table = { workspace = true }

# Web-only deps. The cross-platform `app()` tree never references
# these; the wasm-bindgen entry in the CLI-generated wrapper is gated
# to wasm32.
[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
lol_alloc = "0.4"

# wasm-opt's bundled binaryen rejects bulk-memory ops emitted by
# recent rustc; the wasm is still LTO'd at link time without the
# post-pass. Re-enable if/when wasm-pack ships a binaryen with
# `--enable-bulk-memory` on by default.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# Idealyst project config — read by `idealyst build`, `idealyst run`,
# `idealyst dev`. Per-platform projects (ios/, android/, web/) are
# ephemeral; run `idealyst scaffold <platform>` for a hand-editable
# copy.
[package.metadata.idealyst.app]
name      = "idea-ui Docs"
bundle_id = "ai.truday.idealyst.idea-ui-docs"
version   = "0.0.1"
targets   = ["web"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
