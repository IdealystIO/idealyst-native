[package]
name = "website"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Marketing site for idealyst-native — built with idealyst-native itself. Sidebar nav on web, native stack nav on mobile."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# `async-driver` is required by the embedded `Simulator` component
# (home-page preview that runs `welcome::app()` through the wgpu
# render backend). The Simulator uses `runtime_core::driver::spawn_async`
# to wait on `host_web::mount` without blocking the build walker.
runtime-core = { workspace = true, features = ["async-driver"] }
idea-ui = { workspace = true }
drawer-navigator = { workspace = true }
codeblock = { workspace = true }
# Embedded `welcome` app — the canonical scaffold from `idealyst new`.
# Re-mounted inside the home-page Simulator so visitors can preview
# the scene without installing the CLI. Pure rlib, no platform-specific
# code, compiles the same bytes everywhere.
welcome = { workspace = true }

# Embedded-Simulator preview stack. These crates self-gate their
# wasm-only innards (see e.g. `host-web/src/lib.rs`'s `cfg(target_arch
# = "wasm32")` blocks), so they compile to empty surfaces on
# native targets and the `Simulator` component's compile-time
# imports stay portable. Matches the docs example's Cargo wiring.
host-web = { workspace = true }
# Target-agnostic wgpu host umbrella. Internally cfg-routes to
# `host-web` on wasm, `host-ios-mobile` on iOS, etc. The Simulator
# component calls `host_wgpu::mount(...)` cross-target without any
# per-platform `cfg` in author code — see §7 of CLAUDE.md +
# `[[feedback_cfg_hack_signals_missing_backend_method]]`.
host-wgpu = { workspace = true }
render-api = { workspace = true }
ios-sim = { workspace = true }
android-sim = { workspace = true }

# SSR build target. Optional dep so wasm/native builds don't pull the
# tiny_http machinery into their dep graph; the `ssr` feature flips it
# on and `register_ssr_extensions` (gated by the same feature in
# `lib.rs`) becomes visible to the CLI-generated SSR wrapper binary
# (and to `examples/serve.rs`, which compiles examples with all
# regular features active).
backend-ssr = { workspace = true, features = ["serve"], optional = true }

# Recorder backend for the runtime-server sidecar wrapper. Optional —
# pulled in only by the `sidecar` feature (host-side sidecar build);
# never compiled for device/web targets.
dev-server = { workspace = true, optional = true }

[features]
# Default to perf instrumentation ON during this investigation. The
# `debug-stats` feature is feature-gated end-to-end (runtime-core,
# the iOS backends, here) so it's a single toggle: this `default`
# entry threads it through every backend that ships PhaseTimer
# instrumentation. Drop this entry once the perf chase is over.
default = ["debug-stats"]
# Opt into the project-wide `debug-stats` instrumentation. Routes
# through every dep that has its own `debug-stats` feature, so the
# whole transitive build records into the same
# `runtime_core::debug::record_apply_phase` aggregator.
debug-stats = [
    "runtime-core/debug-stats",
]
# Turn on the SSR build path. Activates the optional `backend-ssr`
# dep + the matching `register_ssr_extensions` impl in `lib.rs`. The
# CLI's `idealyst dev --ssr` / `--static` SSR wrapper sets this
# (`features = ["ssr"]` on its path-dep on the user crate).
ssr = ["dep:backend-ssr"]
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper
# (build-runtime-server). Pulls `dev-server` + the drawer SDK's recording
# handler so `register_extensions_recorder` can register a navigator
# recording handler on the runtime-server recorder backend.
sidecar = ["dep:dev-server", "drawer-navigator/runtime-server"]

# Web target — wasm + DOM. The marketing site's primary surface.
#
# `web-sys` is pulled in directly (alongside the framework's own
# web bindings) so `app()` can reach the document's `<body>` element
# and keep its background in sync with the active theme. The
# framework owns `#app` and below; everything outside that subtree
# is the host page's responsibility.

[target.'cfg(target_arch = "wasm32")'.dependencies]
# `async-driver` brings in `install_async_executor` + `install_render_loop`
# which the embedded `Simulator` component depends on \u{2014} `host_web::mount`
# uses `spawn_async` to drive the wgpu init off the main thread and
# the render loop to tick frames. Without this feature the simulator
# canvas mounts but never paints (the `on_ready` async task is
# queued onto an executor that was never installed).
backend-web = { workspace = true, features = ["async-driver"] }
# NOTE: `lazy! { ... }` no longer requires a direct `wasm-split`
# dependency — the macro aliases runtime-core's re-export into scope
# itself. Author crates only need `runtime-core`.
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement", "CssStyleDeclaration",
    # Needed by `responsive.rs`: imperative backdrop / hamburger
    # buttons + the reactive class-mirror effect.
    "DomTokenList", "EventTarget", "Event", "HtmlButtonElement", "Node",
] }

# iOS / Android targets — proving the cross-platform claim by having
# the site itself ship to mobile. The chrome (sidebar) is web-only,
# native targets render screens raw inside a UINavigationController /
# FragmentManager.
[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
# `async-driver` is the iOS sibling of the same feature on
# `backend-web` (line 72 above): it pulls in `install_async_executor`
# (libdispatch-backed) + `install_render_loop` (NSTimer-backed) so
# the embedded `Simulator` component's `spawn_async` future resolves
# and the wgpu host's per-frame closure fires. Without it
# `host_wgpu::mount` queues onto an executor that was never
# installed, so the welcome app never paints.
backend-ios-mobile = { workspace = true, features = ["async-driver", "debug-stats"] }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

# macOS desktop — AppKit backend. `drawer_navigator::register` resolves
# to its macOS impl (`&mut MacosBackend`) on this host, so the example's
# `register_extensions` must take the same type.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal fallback — all non-mobile, non-wasm, non-macOS hosts build on
# the terminal backend by default, so the website does too.
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android", target_os = "macos")))'.dependencies]
backend-terminal = { workspace = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.idealyst.app]
name      = "Idealyst"
bundle_id = "io.idealyst"
version   = "0.0.1"
targets   = ["web", "ios", "android"]

[package.metadata.idealyst.app.splash]
duration_ms = 0

# Build-time icon pipeline (icon-gen). One base block per the
# common identity, plus a per-platform `[icon.web]` override for the
# favicon — which uses the already-colored outlined glyph so the
# tab-strip thumbnail is legible without a backdrop.
#
# The base `foreground` + `background` pair drives iOS / Android
# home-screen icons: the plain stroked `light.svg` glyph painted
# over a yellow-to-white linear gradient (CSS-style angle, 180° =
# top-to-bottom).
[package.metadata.idealyst.app.icon]
foreground = "assets/light.svg"
background = { kind = "linear", angle = 180, stops = [
    { offset = 0.0, color = "#EFDD74" },
    { offset = 1.0, color = "#ffffff" },
] }

[package.metadata.idealyst.app.icon.web]
source = "assets/light-outlined.svg"

# Preload the Inter weights the marketing site renders above the fold.
# The build (`stage_bundle`) injects `<link rel="preload" as="font" crossorigin>`
# tags into the staged `index.html`, and the dev server (`dev-http`) does
# the same at request time — same set in both, so the dev loop and the
# deployed bundle hit the network the same way.
#
# Explicit list rather than "every font in the project" because the
# tradeoff is real: each preload starts a parallel fetch competing with
# the wasm download. Listing the weights actually used on the landing
# screen keeps wasm fetch unbloated; rarer weights (Thin/ExtraLight/Black)
# resolve later through the runtime `@font-face` swap-in, which is fine.
[package.metadata.idealyst.app.web]
preload_fonts = [
    "fonts/Inter-Regular.ttf",
    "fonts/Inter-Medium.ttf",
    "fonts/Inter-SemiBold.ttf",
    "fonts/Inter-Bold.ttf",
]
