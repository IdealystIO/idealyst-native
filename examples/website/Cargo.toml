[package]
name = "website"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Marketing site for idealyst-native — built with idealyst-native itself. Sidebar nav on web, native stack nav on mobile."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# `async-driver` is required by the embedded `Simulator` component
# (home-page preview that runs `welcome::app()` through the wgpu
# render backend). The Simulator uses `runtime_core::driver::spawn_async`
# to wait on `host_web::mount` without blocking the build walker.
runtime-core = { workspace = true, features = ["async-driver"] }
idea-ui = { workspace = true }
drawer-navigator = { workspace = true }
idea-codeblock = { workspace = true }
# Embedded `welcome` app — the canonical scaffold from `idealyst new`.
# Re-mounted inside the home-page Simulator so visitors can preview
# the scene without installing the CLI. Pure rlib, no platform-specific
# code, compiles the same bytes everywhere.
welcome = { workspace = true }

# Embedded-Simulator preview stack. These crates self-gate their
# wasm-only innards (see e.g. `host-web/src/lib.rs`'s `cfg(target_arch
# = "wasm32")` blocks), so they compile to empty surfaces on
# native targets and the `Simulator` component's compile-time
# imports stay portable. Matches the docs example's Cargo wiring.
host-web = { workspace = true }
render-api = { workspace = true }
ios-sim = { workspace = true }
android-sim = { workspace = true }

# Web target — wasm + DOM. The marketing site's primary surface.
#
# `web-sys` is pulled in directly (alongside the framework's own
# web bindings) so `app()` can reach the document's `<body>` element
# and keep its background in sync with the active theme. The
# framework owns `#app` and below; everything outside that subtree
# is the host page's responsibility.
[dev-dependencies]
# SSR demos: examples/ssr.rs writes each route to a file; examples/serve.rs
# runs the HTTP server (needs the `serve` feature). The drawer chrome
# handler is registered via drawer_navigator::chrome::register.
backend-ssr = { workspace = true, features = ["serve"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# `async-driver` brings in `install_async_executor` + `install_render_loop`
# which the embedded `Simulator` component depends on \u{2014} `host_web::mount`
# uses `spawn_async` to drive the wgpu init off the main thread and
# the render loop to tick frames. Without this feature the simulator
# canvas mounts but never paints (the `on_ready` async task is
# queued onto an executor that was never installed).
backend-web = { workspace = true, features = ["async-driver"] }
# NOTE: `lazy! { ... }` no longer requires a direct `wasm-split`
# dependency — the macro aliases runtime-core's re-export into scope
# itself. Author crates only need `runtime-core`.
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Element", "HtmlElement", "CssStyleDeclaration",
    # Needed by `responsive.rs`: imperative backdrop / hamburger
    # buttons + the reactive class-mirror effect.
    "DomTokenList", "EventTarget", "Event", "HtmlButtonElement", "Node",
] }

# iOS / Android targets — proving the cross-platform claim by having
# the site itself ship to mobile. The chrome (sidebar) is web-only,
# native targets render screens raw inside a UINavigationController /
# FragmentManager.
[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

# macOS desktop — AppKit backend. `drawer_navigator::register` resolves
# to its macOS impl (`&mut MacosBackend`) on this host, so the example's
# `register_extensions` must take the same type.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal fallback — all non-mobile, non-wasm, non-macOS hosts build on
# the terminal backend by default, so the website does too.
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android", target_os = "macos")))'.dependencies]
backend-terminal = { workspace = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.idealyst.app]
name      = "Idealyst"
bundle_id = "ai.truday.idealyst.website"
version   = "0.0.1"
targets   = ["web", "ios", "android"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
