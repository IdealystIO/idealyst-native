<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <base href="/" />
    <title>Idealyst — One Rust codebase, every platform</title>
    <style>
      html, body, #app { height: 100%; margin: 0; }
      /*
       * Body background is set by the app on mount and re-synced
       * whenever the theme swaps (see `sync_body_background_to_theme`
       * in src/lib.rs). The initial value here matches the light
       * theme's `color-background` so first paint doesn't flash a
       * different color before the effect runs.
       */
      /*
       * Inter is loaded by the framework's `typeface!` macro (see
       * src/typeface.rs) and applied via `font_family: &INTER` on
       * the screen root. We list it first in this fallback chain so
       * the brief first-paint flash before the macro registers the
       * face also lands on Inter when it's already cached in the
       * browser; system sans is the graceful fallback otherwise.
       */
      body {
        background: #f7f8fb;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import init from "/pkg/website.js";
      init();
    </script>
  </body>
</html>
