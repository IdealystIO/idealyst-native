[package]
name = "reactive-loops"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Demo of the framework's reactive iteration — `for … in …` written directly in `ui!`, where the iterable's TYPE decides reactivity. A `Signal<Vec<_>>` list rebuilds on add/remove, a `0..count.get()` grid grows/shrinks reactively, and a plain array stays static. No `.get()` heuristic, no wrapper views."

# Pure `rlib` — same scaffold shape as `welcome`/`stack-demo`. The CLI
# generates the per-platform wrapper crates with the cdylib/staticlib
# crate-type + entry points; this crate is platform-agnostic.
[lib]
crate-type = ["rlib"]

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true }

# No backend deps: `register_extensions` is generic over `Backend` (no
# third-party SDKs), so the app crate is platform-agnostic — the CLI
# wrappers bring their own concrete backend.

[package.metadata.idealyst.app]
name      = "Reactive Loops"
bundle_id = "ai.truday.idealyst.reactiveloops"
version   = "0.0.1"
targets   = ["web", "ios", "android"]
