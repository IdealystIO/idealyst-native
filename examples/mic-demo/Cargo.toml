[package]
name = "mic-demo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Microphone SDK demo — opens a live input stream and shows a real-time level meter. Exercises the `microphone` SDK and the capability-based permission injection (declares `microphone` + a reason string)."

# Pure `rlib` — platform-agnostic app crate. The CLI-generated per-target
# wrappers carry the platform crate-type + entry point; this crate has no
# `#[cfg(target_os)]` blocks. `microphone` is internally cfg-gated, so the
# app just calls `Microphone` and the right backend compiles per target.
[lib]
crate-type = ["rlib"]

[features]
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper.
sidecar = ["dep:dev-server"]

[dependencies]
runtime-core = { workspace = true, features = ["async-driver"] }
idea-ui = { workspace = true }
microphone = { workspace = true }
# Recorder backend for the runtime-server sidecar wrapper (host-side only).
dev-server = { workspace = true, optional = true }

# The app declares the *capability* it needs via its dependency on the
# `microphone` SDK (which declares `capabilities = ["microphone"]`), and
# supplies the user-facing *reason* the OS prompt shows here. The CLI walks
# the dep graph at build time and injects NSMicrophoneUsageDescription
# (iOS/macOS) + RECORD_AUDIO (Android) automatically — no hand-edited
# Info.plist / AndroidManifest.
[package.metadata.idealyst.app]
name      = "Mic Demo"
bundle_id = "ai.truday.idealyst.micdemo"
version   = "0.0.1"
targets   = ["web", "ios", "android", "macos"]

[package.metadata.idealyst.app.permissions]
microphone = "Mic Demo visualizes your microphone input as a live level meter."
