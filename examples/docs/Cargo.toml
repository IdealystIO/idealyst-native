[package]
name = "docs"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Idealyst documentation site"

# `cdylib` enables the wasm target (browser load via wasm-bindgen);
# `rlib` lets native wrappers — when generated by the CLI under
# `target/idealyst/<platform>/` — depend on this crate as a library.
[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Connect to a running `idealyst dev` server on startup instead of
# rendering the local `app()` tree. Pulls in the `dev-client` crate
# only when the feature is on, so a release build stays lean.
dev-hot-reload = ["dep:dev-client", "backend-web/runtime-server"]

[dependencies]
# `async-driver` exposes `spawn_async` + `render_loop`. The Simulator
# component delegates wgpu init + per-frame paint through `host-web`,
# which talks to those drivers under the hood.
runtime-core = { workspace = true, features = ["async-driver"] }
idea-ui = { workspace = true }
docs-macro = { workspace = true }
drawer-navigator = { workspace = true }
libc = "0.2"

# Embedded preview stack used by the `Simulator` component:
# - `host-web` does the actual wgpu init, render-loop drive, and
#   browser-event → `EventSink` translation. The Simulator collapses
#   to a single `mount(...).await` call.
# - `render-api` is re-exported by `host-web`, but importing it
#   directly lets the Simulator construct a `DeviceProfile` without
#   piggybacking on the re-export.
# - `ios-sim` provides the default UIKit skin.
host-web = { workspace = true }
render-api = { workspace = true }
ios-sim = { workspace = true }

# Everything web-specific is gated on the wasm32 target. The
# cross-platform `app()` function never touches these — native
# targets compile without ever resolving them.
# iOS-only: docs needs `backend-ios-mobile` (imports as `backend_ios`)
# in scope for the `register_extensions(&mut IosBackend)` hook the
# CLI-generated wrapper invokes before mount.
[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

# Android equivalent for the `register_extensions(&mut AndroidBackend)`
# hook. Same role as the iOS dep above.
[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

# macOS desktop (AppKit) build path. `drawer_navigator::register`
# resolves to its macOS impl (`&mut MacosBackend`) on this host, so the
# example's `register_extensions` takes the same type.
[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal (TTY) build path. Same `register_extensions(&mut TerminalBackend)`
# hook as the other targets — the CLI-generated wrapper at
# `target/idealyst/<app>/terminal/src/main.rs` calls it before mount so
# the drawer navigator (and any other SDKs) install their handler
# factories.
[target.'cfg(not(any(target_arch = "wasm32", target_os = "ios", target_os = "android", target_os = "macos")))'.dependencies]
backend-terminal = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# `async-driver` brings in `install_async_executor` + `install_render_loop`,
# which the docs' wasm entry installs so `host-web::mount` can
# `spawn_async` and `render_loop`.
backend-web = { workspace = true, features = ["async-driver"] }
wasm-bindgen = "0.2"
# `Reflect` lives in `js-sys`; the dev-client shim reads
# `window.IDEALYST_RUNTIME_SERVER_URL` through it.
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
# Smaller WASM allocator — same trade-off as `hello-web`: slightly
# higher per-alloc cost in exchange for a few KB shaved off the bundle.
lol_alloc = "0.4"
# Only pulled in under `dev-hot-reload`. Cargo silently drops the
# activation on non-wasm targets because the dep isn't declared there.
dev-client = { workspace = true, optional = true }

# wasm-opt's bundled binaryen rejects bulk-memory ops emitted by recent
# rustc. The bundle is still LTO'd at link time without the post-pass.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# Idealyst project config. The CLI reads this on `idealyst build`,
# `idealyst sync`, and friends. Per-platform projects (ios/, android/,
# web/) are ephemeral by default — materialize them with
# `idealyst scaffold <platform>` to take ownership.
[package.metadata.idealyst]
app.name      = "Idealyst Docs"
app.bundle_id = "ai.truday.idealyst.docs"
app.version   = "0.0.1"
app.targets   = ["web", "ios"]

# Splash-screen settings. The CLI fills in any missing field with
# sensible defaults — this block is here as a working example.
# Set `duration_ms = 0` to disable the splash; bump to feel out
# longer transitions.
[package.metadata.idealyst.app.splash]
background  = "#1a1a2e"
title       = "Idealyst"
title_color = "#ffffff"
duration_ms = 0
