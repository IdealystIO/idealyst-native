[package]
name = "hello-roku"
version.workspace = true
edition.workspace = true
license.workspace = true

# Plain library — `idealyst build roku` generates the snapshot
# binary that calls `app()` on its own. Authors don't have to write
# a bin target themselves.
[lib]
crate-type = ["rlib"]

[features]
# `robot` mirrors `runtime-core/robot` — when the workspace test
# build activates the framework's `robot` feature transitively (via
# `dev-server`'s dev-deps), the `ui!` macro's `#[cfg(feature =
# "robot")]` gate evaluated in this crate's context needs to see
# `robot` enabled too, otherwise the lowered struct-literal omits
# `Primitive::View.test_id` while the struct definition includes it.
default = ["robot"]
robot = ["runtime-core/robot"]

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true }
backend-roku = { workspace = true }
