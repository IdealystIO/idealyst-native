[package]
name = "server-fn-demo"
version.workspace = true
edition.workspace = true
license.workspace = true

# Full-stack server-functions demo:
#
#   - The web client is an idealyst app — `pub fn app() -> Primitive`,
#     built via `idealyst build --web` into a wasm bundle in `pkg/`.
#   - The server (`--bin server --features server`) hosts the API
#     (`/_srv/*`) AND serves the static bundle at `/`, so the whole
#     app — UI + API — comes from one process at
#     `http://127.0.0.1:3000`.
#   - The `#[server]` macro keys off the `server` cargo feature to
#     emit real fn bodies vs RPC stubs; the wasm build uses default
#     features (stubs); the server bin uses `--features server`
#     (bodies + inventory registration).
#
# A small terminal-only client is retained as `--bin client` for a
# zero-browser sanity check.

[lib]
crate-type = ["rlib"]

[features]
default = []
server = [
    "server/server",
    "dep:axum",
    "dep:tokio",
    "dep:tower-http",
    "dep:futures-util",
]
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper
# (build-runtime-server). Pulls `dev-server` so
# `register_extensions_recorder` is compiled against the recorder backend.
sidecar = ["dep:dev-server"]

[dependencies]
server = { workspace = true }
# Recorder backend for the runtime-server sidecar wrapper. Optional —
# pulled in only by the `sidecar` feature (host-side sidecar build);
# never compiled for device/web targets.
dev-server = { workspace = true, optional = true }
net = { workspace = true }
runtime-core = { workspace = true, features = ["async-driver"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Client-side UI: idea-ui + the framework's reactive primitives.
# `idea-ui` is platform-agnostic; backend selection happens per
# target below.
idea-ui = { workspace = true }

# Server-only deps. Gated by the `server` feature so the wasm build
# never compiles axum/tokio/tower-http.
axum = { version = "0.7", optional = true }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"], optional = true }
tower-http = { version = "0.6", features = ["fs"], optional = true }
# Server-only: builds the timed `Stream` the `#[sse] ticks` endpoint yields.
futures-util = { version = "0.3", optional = true }

# Web-only client extra. `register_extensions` is generic over `Backend`
# (no SDKs), so no backend dep is needed — the CLI wrappers bring their own.
# `web-sys` is still required to read `window.location.origin` for
# `server::configure`.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Location"] }

[[bin]]
name = "server"
path = "src/bin/server.rs"
required-features = ["server"]

[package.metadata.idealyst.app]
name      = "Server Fn Demo"
bundle_id = "ai.truday.idealyst.server_fn_demo"
version   = "0.0.1"
# `ios`/`android` added so the live-SSE demo can be exercised on a
# simulator/emulator (`idealyst dev --ios --local` / `--android --local`),
# which is the only mode that runs `use_sse` on the device's native
# EventSource arm (runtime-server mode runs the tree on the host).
targets   = ["web", "ios", "android"]
# Full-stack: `idealyst dev --web` runs THIS bin instead of the
# default static-file dev server. The bin serves both the wasm
# bundle (from `pkg/`) and the `/_srv/*` API.
server_bin = "server"
