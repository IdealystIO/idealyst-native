[package]
name = "tutorial"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Idealyst tutorial — a step-by-step teacher for the framework's core concepts (reactivity, stylesheets, media queries), built with idealyst-native itself."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# `sidecar`: enabled ONLY by the CLI-generated native sidecar wrapper
# (build-runtime-server). Pulls `dev-server` + the drawer SDK's recording
# handler so `register_extensions_recorder` can register a navigator
# recording handler on the runtime-server recorder backend.
sidecar = ["dep:dev-server", "drawer-navigator/runtime-server"]

# `terminal`: forces the terminal backend. The terminal target builds for
# the HOST triple (it runs in-process in the TTY), so on a macOS host
# `cfg(target_os = "macos")` would otherwise select `backend-macos` —
# there's no target cfg that distinguishes "build the macOS app" from
# "build the terminal app" because they share the same triple. (web /
# ios / android each cross-compile to a distinct triple, so cfg picks
# them unambiguously; terminal is the only one that collides with the
# host.) The CLI's terminal wrapper enables this feature to break the
# tie. Without it, `idealyst dev --terminal` on macOS fails to compile.
terminal = ["dep:backend-terminal", "drawer-navigator/terminal"]

[dependencies]
runtime-core = { workspace = true }
idea-ui = { workspace = true }
drawer-navigator = { workspace = true }
# Recorder backend for the runtime-server sidecar wrapper. Optional —
# pulled in only by the `sidecar` feature (host-side sidecar build);
# never compiled for device/web targets.
dev-server = { workspace = true, optional = true }
# Theme-aware syntax-highlighted code panels (External primitive on web,
# placeholder on native). The lessons lean on readable code blocks.
codeblock = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }

[target.'cfg(all(target_os = "ios", not(target_arch = "wasm32")))'.dependencies]
backend-ios-mobile = { workspace = true }

[target.'cfg(all(target_os = "android", not(target_arch = "wasm32")))'.dependencies]
backend-android-mobile = { workspace = true }

[target.'cfg(all(target_os = "macos", not(target_arch = "wasm32")))'.dependencies]
backend-macos = { workspace = true }

# Terminal backend — pulled in ONLY by the `terminal` feature (which the
# CLI's terminal wrapper enables). It can't be a `target_os` dependency
# like the others: the terminal target builds for the host triple, so on
# a macOS host it shares macOS's triple and would collide with
# `backend-macos`. The feature is the disambiguator. See `[features]`.
[dependencies.backend-terminal]
workspace = true
optional = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.idealyst.app]
name      = "Idealyst Tutorial"
bundle_id = "ai.truday.idealyst.tutorial"
version   = "0.0.1"
targets   = ["web", "ios", "android"]

[package.metadata.idealyst.app.splash]
duration_ms = 0
