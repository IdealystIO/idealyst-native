[package]
name = "hot-reload-test"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Minimal example used by the AAS hot-patch integration tests."

# Tiny test fixture: one `app()` fn, a couple of `#[component]`s,
# no idea-ui or other UI libraries. Lets the hot-reload pipeline
# be exercised end-to-end without dragging in any in-flight UI
# crate work.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Wasm shim connects to the running AAS dev server instead of
# rendering the local `app()` tree. Required by `idealyst dev
# --aas --web`.
dev-hot-reload = ["dep:dev-client", "backend-web/aas-shell"]

[dependencies]
framework-core = { workspace = true }
idea-ui = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
backend-web = { workspace = true }
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
lol_alloc = "0.4"
dev-client = { workspace = true, optional = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.idealyst.app]
name      = "Idealyst Hot-Reload Test"
bundle_id = "ai.truday.idealyst.hot-reload-test"
version   = "0.0.1"

[package.metadata.idealyst.app.splash]
duration_ms = 0
