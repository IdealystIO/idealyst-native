[workspace]
resolver = "2"
members = [
    "crates/framework/core",
    "crates/framework/macros",
    "crates/framework/native-layout",
    "crates/framework/wire",
    "crates/framework/dev-client",
    "crates/framework/dev-server",
    "crates/framework/dev-http",
    "crates/framework/dev-reload",
    "crates/framework/build-ios",
    "crates/framework/run-ios",
    "crates/framework/cli",
    "crates/backend/ios",
    "crates/backend/ios-stack",
    "crates/backend/android",
    "crates/backend/roku",
    "crates/backend/roku-macros",
    "crates/backend/roku-transpile",
    "crates/backend/web",
    "crates/reactive/arena",
    "crates/reactive/refs",
    "crates/ui/idea-ui",
    "crates/ui/idea-ui-docs-derive",
    "crates/ui/icons-lucide",
    "crates/robot-mcp-proxy",
    "examples/hello",
    "examples/hello-web",
    "examples/hello-android",
    "examples/hello-ios",
    "examples/idea-ui-docs",
    "examples/idea-ui-docs-web",
    "examples/hot-reload-demo",
    "examples/hello-ios-aas",
    "examples/docs",
    "arena/idealyst-native/wasm",
]

[workspace.package]
edition = "2021"
version = "0.0.1"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
framework-core = { path = "crates/framework/core" }
framework-macros = { path = "crates/framework/macros" }
native-layout = { path = "crates/framework/native-layout" }
wire = { path = "crates/framework/wire" }
dev-client = { path = "crates/framework/dev-client" }
dev-server = { path = "crates/framework/dev-server" }
dev-http = { path = "crates/framework/dev-http" }
dev-reload = { path = "crates/framework/dev-reload" }
build-ios = { path = "crates/framework/build-ios" }
run-ios = { path = "crates/framework/run-ios" }
backend-ios = { path = "crates/backend/ios" }
backend-ios-stack = { path = "crates/backend/ios-stack" }
backend-android = { path = "crates/backend/android" }
backend-roku = { path = "crates/backend/roku" }
backend-roku-macros = { path = "crates/backend/roku-macros" }
backend-roku-transpile = { path = "crates/backend/roku-transpile" }
backend-web = { path = "crates/backend/web" }
idea-ui = { path = "crates/ui/idea-ui" }
idea-ui-docs-derive = { path = "crates/ui/idea-ui-docs-derive" }
icons-lucide = { path = "crates/ui/icons-lucide" }

# Size-tuned release profile. We optimize for size rather than speed —
# UI workloads aren't CPU-bound, but bytes-over-the-wire matter for the
# WASM target. `format!` and friends are kept; they're too useful.
[profile.release]
opt-level = "z"          # Smallest code (LLVM size-prioritized).
codegen-units = 1        # Maximum cross-module optimization.
lto = true               # Link-time optimization.
panic = "abort"          # Drops unwinding tables (~10-20 KB win).
strip = "symbols"        # Strip symbol info from the final binary.

# Same as release but keeps symbols + DWARF so `twiggy` can attribute
# bytes to specific functions. Build with `--profile release-debug`.
[profile.release-debug]
inherits = "release"
strip = "none"
debug = 1
