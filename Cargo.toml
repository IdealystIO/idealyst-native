    "crates/framework/native-layout",
    "crates/framework/wire",
    "crates/framework/dev-client",
    "crates/framework/reactive/arena",
    "crates/framework/reactive/refs",
    "crates/backend/ios/core",
    "crates/backend/ios/mobile",
    "crates/backend/ios/tv",
    "crates/backend/ios-stack",
    "crates/backend/android/core",
    "crates/backend/android/mobile",
    "crates/backend/android/tv",
    "crates/backend/roku",
    "crates/backend/roku/macros",
    "crates/backend/roku/transpile",
    "crates/backend/web",
    "crates/render/api",
    "crates/render/wgpu",
    "crates/skin/ios-sim",
    "crates/skin/android-sim",
    "crates/host/winit",
    "crates/native/phone",
    "crates/native/tablet",
    "crates/native/tv",
    "crates/backend/aas-shell-native",
    "crates/backend/posix-log-capture",
    "crates/ui/idea-ui",
    "crates/ui/idea-ui-docs-derive",
    "crates/ui/icons-lucide",
    "crates/cli",
    "crates/build/aas",
    "crates/build/android",
    "crates/build/ios",
    "crates/build/roku",
    "crates/run/android",
    "crates/run/ios",
    "crates/run/roku",
    "crates/dev/server",
    "crates/dev/http",
    "crates/dev/reload",
    "crates/dev/web-host",
    "crates/robot-mcp-proxy",
    "examples/hello-world",
    "examples/hello-roku",
    "examples/idea-ui-docs",
    "examples/docs",
    "examples/docs-macro",
    "examples/hot-reload-test",
    "examples/native-test",
