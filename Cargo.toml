[workspace.package]
edition = "2021"
version = "0.0.1"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
framework-core = { path = "crates/framework/core" }
framework-hot = { path = "crates/framework/hot" }
framework-macros = { path = "crates/framework/macros" }
docs-macro = { path = "examples/docs-macro" }
native-layout = { path = "crates/framework/native-layout" }
wire = { path = "crates/framework/wire" }
dev-client = { path = "crates/framework/dev-client" }
dev-server = { path = "crates/dev/server" }
dev-http = { path = "crates/dev/http" }
dev-reload = { path = "crates/dev/reload" }
web-dev-host = { path = "crates/dev/web-host" }
build-ios = { path = "crates/build/ios" }
run-ios = { path = "crates/run/ios" }
build-aas = { path = "crates/build/aas" }
build-android = { path = "crates/build/android" }
run-android = { path = "crates/run/android" }
build-roku = { path = "crates/build/roku" }
run-roku = { path = "crates/run/roku" }
backend-ios-core = { path = "crates/backend/ios/core" }
backend-ios-mobile = { path = "crates/backend/ios/mobile" }
backend-ios-tv = { path = "crates/backend/ios/tv" }
backend-ios-stack = { path = "crates/backend/ios-stack" }
backend-android-core = { path = "crates/backend/android/core" }
backend-android-mobile = { path = "crates/backend/android/mobile" }
backend-android-tv = { path = "crates/backend/android/tv" }
backend-roku = { path = "crates/backend/roku" }
backend-roku-macros = { path = "crates/backend/roku/macros" }
backend-roku-transpile = { path = "crates/backend/roku/transpile" }
backend-web = { path = "crates/backend/web" }
render-api = { path = "crates/render/api" }
render-wgpu = { path = "crates/render/wgpu" }
ios-sim = { path = "crates/skin/ios-sim" }
android-sim = { path = "crates/skin/android-sim" }
host-winit = { path = "crates/host/winit" }
native-phone = { path = "crates/native/phone" }
native-tablet = { path = "crates/native/tablet" }
native-tv = { path = "crates/native/tv" }
aas-shell-native = { path = "crates/backend/aas-shell-native" }
posix-log-capture = { path = "crates/backend/posix-log-capture" }
idea-ui = { path = "crates/ui/idea-ui" }
idea-ui-docs-derive = { path = "crates/ui/idea-ui-docs-derive" }
icons-lucide = { path = "crates/ui/icons-lucide" }

# Dev profile: `opt-level = "z"` works around a wasm OOB seen at
# opt-level = 0 (the default). Root cause is likely an UB somewhere
# in the framework — exposed by unoptimized codegen, masked by even
# minimal optimization. Until that's tracked down, keep dev builds
# at "z" so `wasm-pack build --dev` and `idealyst dev --web`
# produce working bundles.
[profile.dev]
opt-level = "z"

# Size-tuned release profile. We optimize for size rather than speed —
# UI workloads aren't CPU-bound, but bytes-over-the-wire matter for the
# WASM target. `format!` and friends are kept; they're too useful.
[profile.release]
opt-level = "z"          # Smallest code (LLVM size-prioritized).
codegen-units = 1        # Maximum cross-module optimization.
lto = true               # Link-time optimization.
panic = "abort"          # Drops unwinding tables (~10-20 KB win).
strip = "symbols"        # Strip symbol info from the final binary.

# Same as release but keeps symbols + DWARF so `twiggy` can attribute
# bytes to specific functions. Build with `--profile release-debug`.
[profile.release-debug]
inherits = "release"
strip = "none"
debug = 1
