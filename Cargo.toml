[workspace]
resolver = "2"
members = [
    # Runtime — platform-agnostic upper half (above the Backend Interface).
    "crates/runtime/core",
    "crates/runtime/macros",
    "crates/runtime/reactive/arena",
    "crates/runtime/reactive/refs",
    "crates/runtime/layout",

    # Shared StyleRules → CSS conversion (used by web + ssr backends).
    "crates/css",

    # Native backends — implement Backend on top of a platform's UI toolkit.
    "crates/backend/apple/core",
    "crates/backend/macos",
    "crates/backend/ios/core",
    "crates/backend/ios/mobile",
    "crates/backend/ios/rs-shell",
    "crates/backend/ios/tv",
    "crates/backend/ios-stack",
    "crates/backend/android/core",
    "crates/backend/android/mobile",
    "crates/backend/android/tv",
    "crates/backend/roku",
    "crates/backend/roku/macros",
    "crates/backend/roku/transpile",
    "crates/backend/terminal",
    "crates/backend/cpu",
    "crates/backend/web",
    "crates/backend/ssr",
    "crates/backend/windows",
    "crates/backend/linux",
    "crates/backend/posix-log-capture",

    # GPU Backend — composed of Host + Painter + Engine.
    "crates/gpu-backend/api",
    "crates/gpu-backend/engine",
    "crates/gpu-backend/host/winit",
    "crates/gpu-backend/host/web",
    "crates/gpu-backend/host/ios-mobile",
    "crates/gpu-backend/host/android-mobile",
    "crates/gpu-backend/host/wgpu",
    "crates/gpu-backend/host/appkit",
    "crates/gpu-backend/host/terminal",
    "crates/gpu-backend/host/wgpu-accesskit",
    "crates/gpu-backend/painter/ios-sim",
    "crates/gpu-backend/painter/android-sim",
    "crates/gpu-backend/variant/phone",
    "crates/gpu-backend/variant/tablet",
    "crates/gpu-backend/variant/tv",

    # Dev mode — wire protocol, hot reload, dev server, app-side replayer.
    "crates/dev/wire",
    "crates/dev/hot",
    "crates/dev/client",
    "crates/dev/server",
    "crates/dev/http",
    "crates/dev/reload",
    "crates/dev/web-host",
    "crates/dev/runtime-server-shell",
    "crates/dev/mock-backend",
    "crates/dev/headless-screenshot",
    "crates/dev/robot-e2e",

    # MCP — project-aware catalog + stdio server (catalog + Robot tools).
    "crates/mcp/catalog",
    "crates/mcp/server",

    # UI — component library + extras.
    "crates/ui/idea-theme",
    "crates/ui/idea-ui",
    "crates/ui/idea-ui-docs-derive",
    "crates/ui/icons-lucide",

    # SDK — third-party extension primitives (Primitive::External).
    # `maps` is an umbrella crate; its per-backend leaves are nested
    # under it (core/ios/web) so the flat sdk/ listing shows the SDK
    # feature, not its platform implementations.
    "crates/sdk/maps",
    "crates/sdk/maps/core",
    "crates/sdk/maps/web",
    "crates/sdk/maps/ios",
    "crates/sdk/codeblock",
    "crates/sdk/markdown",
    "crates/sdk/webview",
    "crates/sdk/video",
    "crates/sdk/svg",
    # `canvas` 2D-drawing SDK: umbrella facade + renderer-agnostic core.
    # Renderer crates (canvas-vello / canvas-native) added in later phases.
    "crates/sdk/canvas",
    "crates/sdk/canvas/core",
    "crates/sdk/canvas/native",
    "crates/sdk/canvas/vello",
    "crates/sdk/toolbar",
    "crates/sdk/pdf",
    "crates/sdk/form",
    "crates/sdk/table",
    "crates/sdk/virtualized",
    "crates/sdk/menu",

    # SDK — utility (non-primitive) crates.
    "crates/sdk/net",
    "crates/sdk/storage",
    "crates/sdk/sync",
    "crates/sdk/graphql",
    "crates/sdk/pan",
    "crates/sdk/zoom",
    "crates/sdk/gesture",
    "crates/sdk/dnd",
    "crates/sdk/microphone",
    "crates/sdk/camera",
    "crates/sdk/media-stream",
    "crates/sdk/media-writer",
    "crates/sdk/denoise",
    "crates/sdk/video-decode",
    "crates/sdk/file-export",
    "crates/sdk/file-picker",
    "crates/sdk/offload",
    "crates/sdk/offload-macro",
    "crates/sdk/credentials",
    "crates/sdk/biometrics",
    "crates/sdk/screen-recorder",
    "crates/sdk/files",
    "crates/sdk/i18n",
    "crates/sdk/i18n/macros",

    # SDK — device / platform-integration capability crates (Tier 1).
    # `permissions` is the shared runtime-grant substrate the others
    # (notifications, location) build on.
    "crates/sdk/permissions",
    "crates/sdk/notifications",
    "crates/sdk/clipboard",
    "crates/sdk/location",
    "crates/sdk/share",
    "crates/sdk/deep-link",
    "crates/sdk/connectivity",
    "crates/sdk/haptics",
    "crates/sdk/audio",

    # API — full-stack server-functions layer (server fns, transport,
    # auth/middleware, storage). See crates/api/server/DESIGN.md.
    "crates/api/server",
    "crates/api/server-macros",

    # SDK — navigator-kind extensions (Primitive::NavigatorExt).
    # Grouped under navigators/: the three SDK features (stack/tab/
    # drawer) plus the shared per-platform machinery in helpers/ that
    # all three depend on.
    "crates/sdk/navigators/stack",
    "crates/sdk/navigators/tab",
    "crates/sdk/navigators/drawer",
    "crates/sdk/navigators/helpers/web",
    "crates/sdk/navigators/helpers/ios",
    "crates/sdk/navigators/helpers/android",

    # Tools — CLI + per-platform build/run + source porters.
    "crates/tools/cli",
    # Source linter engine — `idealyst lint` + rust-analyzer overrideCommand.
    "crates/tools/lint",
    # wasm-split toolchain (vendored from DioxusLabs/dioxus alpha-0.8.0
    # — we own the snapshot, fix bugs as they fire on our codebase).
    # See `crates/tools/wasm-split/README.md`.
    "crates/tools/wasm-split/wasm-split",
    "crates/tools/wasm-split/wasm-split-cli",
    "crates/tools/wasm-split/wasm-split-macro",
    "crates/tools/wasm-split/wasm-used",
    "crates/tools/icon-gen",
    "crates/tools/build/runtime-server",
    "crates/tools/build/android",
    "crates/tools/build/ios",
    "crates/tools/build/roku",
    "crates/tools/build/sim",
    "crates/tools/build/web",
    "crates/tools/build/macos",
    "crates/tools/build/ssr",
    "crates/tools/build/terminal",
    "crates/tools/dev-tui",
    "crates/tools/docs-app",
    "crates/tools/run/android",
    "crates/tools/run/ios",
    "crates/tools/run/roku",
    "crates/tools/run/macos",
    "crates/tools/run/terminal",
    "crates/tools/port/core",
    "crates/tools/port/tsx",
    "crates/tools/port/react",
    "crates/tools/port/solid",
    "crates/tools/port/vue",
    "crates/tools/port/svelte",
    "crates/tools/port/project",
    "crates/tools/port/preview",
    "examples/hello-roku",
    "examples/idea-ui-docs",
    "examples/docs",
    "examples/docs-macro",
    "examples/animation-test",
    "examples/welcome",
    "examples/external-export-demo",
    "examples/external-export-suite",
    "examples/stack-demo",
    "examples/screenshot-demo",
    "examples/robot-e2e-demo",
    "examples/conformance",
    "examples/inspector",
    "examples/server-fn-demo",
    "examples/mic-demo",
    "examples/denoise-demo",
    "examples/container-demo",
    "examples/screen-recorder-demo",
    "examples/camera-demo",
    "examples/camera-preview-demo",
    "examples/canvas-demo",
    "examples/pdf-demo",
    "examples/markdown-demo",
    "examples/screenshare-preview-demo",
    "examples/media-sources-demo",
    "examples/media-recorder-demo",
    "examples/file-picker-demo",
    "examples/login-demo",
    "examples/mcp-demo",
    "examples/fiddle",
    "examples/website",
    "examples/tutorial",
    "examples/hydration-demo",
    "examples/toolbar-demo",
    "examples/menu-demo",
    "examples/reactive-loops",
    "examples/icon-gallery",
    "examples/i18n-demo",
    "examples/whiteboard-demo",
    "examples/modal-demo",
    "examples/todo-sync-demo",
    "examples/graphql-demo",
    "examples/dnd-demo",
    "examples/kanban-demo",
    "examples/sortable-demo",
    "benchmark",
    "benchmark/idealyst-native/wasm",
    "benchmark/idealyst-native-anim/wasm",

    # Framework regression test apps. See tests/README.md.
    "tests/vtable-dispatch",
    "tests/theme-swap",
    "tests/lazy-chunk-handoff",
