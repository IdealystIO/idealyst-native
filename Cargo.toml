# Gzip for the web build's `--gzip` flag (idealyst build --web --gzip).
# Already in the dep graph transitively (reqwest, ureq, etc.) so adding
# it as a direct dep of build-web doesn't widen the workspace.
flate2 = "1"

# Code-splitting toolchain — vendored from DioxusLabs/dioxus into
# `crates/tools/wasm-split/`. The published-crate equivalents
# (`wasm-splitter`, `wasm-split-macro`, `wasm-split-cli`, `wasm-used`)
# fall over on idealyst-shaped wasm — heavy generics, deep trait
# dispatch — so we own the source and patch as bugs surface.
#
# The runtime crate's published name is `wasm-splitter` (because
# Google owns `wasm-split` on crates.io). We keep the alias via
# `package =` so the `#[wasm_split]` macro's emitted `wasm_split::…`
# paths resolve to our vendored copy.
wasm-split = { path = "crates/tools/wasm-split/wasm-split", package = "wasm-splitter" }
wasm-split-macro = { path = "crates/tools/wasm-split/wasm-split-macro" }
wasm-split-cli = { path = "crates/tools/wasm-split/wasm-split-cli" }
wasm-used = { path = "crates/tools/wasm-split/wasm-used" }

# Third-party deps the vendored wasm-split crates need from the
# workspace. Keep these in one place so version bumps land
# atomically across all four.
anyhow = "1"
itertools = "0.13"
walrus = { version = "0.23", features = ["parallel"] }
wasmparser = "0.224"
id-arena = "2"
rayon = "1.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
clap = { version = "4", features = ["derive"] }
async-once-cell = { version = "0.5", features = ["std"] }
base16 = "0.2"
digest = "0.10"
sha2 = "0.10"
quote = "1"
syn = { version = "2", features = ["full"] }
proc-macro2 = "1"

# Dev profile: `opt-level = "z"` works around a wasm OOB seen at
# opt-level = 0 (the default). Root cause is likely an UB somewhere
# in the framework — exposed by unoptimized codegen, masked by even
# minimal optimization. Until that's tracked down, keep dev builds
# at "z" so `wasm-pack build --dev` and `idealyst dev --web`
# produce working bundles.
[profile.dev]
opt-level = "z"

# Size-tuned release profile. We optimize for size rather than speed —
# UI workloads aren't CPU-bound, but bytes-over-the-wire matter for the
# WASM target. `format!` and friends are kept; they're too useful.
[profile.release]
opt-level = "z"          # Smallest code (LLVM size-prioritized).
codegen-units = 1        # Maximum cross-module optimization.
lto = true               # Link-time optimization.
panic = "abort"          # Drops unwinding tables (~10-20 KB win).
strip = "symbols"        # Strip symbol info from the final binary.

# Same as release but keeps symbols + DWARF so `twiggy` can attribute
# bytes to specific functions. Build with `--profile release-debug`.
[profile.release-debug]
inherits = "release"
strip = "none"
debug = 1
