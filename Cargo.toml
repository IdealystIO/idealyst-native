# Sub-crates under `examples/fiddle/` that have their own `[workspace]`
# section (template + webapp) so cargo doesn't try to merge them in.
# Listing them in `exclude` documents the intent; without it cargo
# walks the file system at `cargo check`-time and is fine either way.
exclude = [
    "examples/fiddle/template",
    "examples/fiddle/webapp",
    # ESP32-C3 firmware — target = `riscv32imc-esp-espidf`,
    # requires the espup-installed toolchain + esp-idf SDK. Lives
    # outside the host workspace entirely; see its README for the
    # standalone build flow.
    "examples/esp32-ili9341",
]

[workspace.package]
edition = "2021"
version = "0.0.1"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
runtime-core = { path = "crates/runtime/core" }
# Fast non-cryptographic integer hasher (rustc's own FxHash). Used in the
# reactive core's hot-path collections keyed by internal Signal/Effect ids,
# which are never attacker-controlled — SipHash's DoS-resistance is pure
# overhead there.
rustc-hash = "2"
css = { path = "crates/css" }
dev-hot = { path = "crates/dev/hot" }
runtime-macros = { path = "crates/runtime/macros" }
mcp-catalog = { path = "crates/mcp/catalog" }
