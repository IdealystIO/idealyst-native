services:
  dev:
    image: mcr.microsoft.com/devcontainers/rust:1
    volumes:
      - ../..:/workspaces:cached
      - claude-home:/home/vscode/.claude
    command: sleep infinity
    networks:
      - devnet
    environment:
      PLAYWRIGHT_WS_ENDPOINT: ws://chrome:3000

  chrome:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    networks:
      - devnet
    ports:
      - "3000:3000"
    # /dev/shm defaults to 64MB inside the container, which Chromium will
    # exhaust on pages with thousands of DOM nodes; expanding to 2g matches
    # what Playwright's own docker image uses.
    shm_size: 2gb
    # Bench pages mount 1000–10000 styled rows; the browser tab needs
    # plenty of RAM to survive repeated rebuilds without the OOM killer
    # tearing down the renderer mid-test.
    mem_limit: 8g
    mem_reservation: 2g
    environment:
      CONCURRENT: "5"
      TOKEN: ""
      MAX_QUEUE_LENGTH: "10"
      # Bump per-tab timeouts: the rebuild suite holds a single connection
      # open for ~20s while it runs 10 measured iterations.
      CONNECTION_TIMEOUT: "300000"
      # Allow large `evaluate`/`snapshot` payloads — the bench page returns
      # multi-MB JSON when the DOM is fully expanded.
      MAX_PAYLOAD_SIZE: "100000000"

networks:
  devnet:
    driver: bridge

volumes:
  claude-home:
